<!DOCTYPE html><html lang="fr"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Contact — BotMatic</title><link rel="stylesheet" href="/assets/clean.css"/></head><body>
<header><div class="container nav">
  <div class="brand"><div class="logo"></div><strong>BotMatic</strong></div>
  <nav><a href="/fr/">Accueil</a><a href="/fr/pricing.html">Tarifs</a><a href="/fr/faq.html">FAQ</a></nav>

<main><div class="container">
  <h1>Demander un devis</h1>
  <div class="card">
    <form method="post" action="mailto:hello@botmatic.be" enctype="text/plain">
      <p><label>Votre nom<br><input type="text" name="name" required></label></p>
      <p><label>E‑mail<br><input type="email" name="email" required></label></p>
      <p><label>Message<br><textarea name="message" rows="6" placeholder="Canaux, objectifs, délai…"></textarea></label></p>
      <p><button style="all:unset" type="submit"><a class="primary" style="padding:.6rem 1rem;border-radius:.55rem;background:#2563eb;color:#fff;display:inline-block">Envoyer</a></button></p>
    </form>
  </div>
</div></main>
<footer><div class="container">© BotMatic</div></footer>
</body></html>
