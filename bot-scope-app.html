<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BotMatic - Bot Inbox</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#f6f7fb;--panel:#fff;--soft:#f1f3f8;--line:#e2e6f0;--text:#181a2f;--muted:#70778b;--accent:#7c3aed;--accent2:#db2777;--wa:#16a34a;--tg:#0284c7;--ig:#be185d;--ms:#2563eb}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
    .app{display:grid;grid-template-columns:320px 1fr;min-height:100vh}
    .sidebar{background:var(--panel);border-right:1px solid var(--line);padding:24px 18px;display:flex;flex-direction:column;gap:18px}
    .brand{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .side-title{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700}
    .bot-groups{display:grid;gap:14px}
    .group{display:grid;gap:8px}
    .group-name{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700}
    .bot-btn{width:100%;text-align:left;padding:13px 14px;border:1px solid var(--line);background:var(--soft);border-radius:14px;cursor:pointer;font:inherit;font-weight:700;color:var(--text)}
    .bot-btn.active{background:rgba(124,58,237,.08);border-color:rgba(124,58,237,.22);color:var(--accent)}
    .main{display:grid;grid-template-rows:auto 1fr;min-width:0}
    .topbar{padding:24px 28px;border-bottom:1px solid var(--line);background:var(--panel)}
    .page-title{font-family:'Syne',sans-serif;font-size:34px;font-weight:800}
    .page-sub{margin-top:8px;color:var(--muted);font-size:14px}
    .workspace-line{margin-top:12px;font-size:14px;color:var(--text);font-weight:700}
    .workspace-line span{color:var(--muted);font-weight:500}
    .content{padding:20px 28px}
    .workspace{display:grid;grid-template-columns:360px 1fr;gap:16px;min-height:760px}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden}
    .panel-head{padding:16px 18px;border-bottom:1px solid var(--line);background:var(--soft)}
    .panel-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700}
    .panel-head input{width:100%;margin-top:12px;padding:11px 12px;border:1px solid var(--line);border-radius:12px;background:var(--panel);outline:none;font:inherit}
    .panel-head input:focus,.composer textarea:focus{border-color:var(--accent)}
    .chat-list{max-height:700px;overflow:auto}
    .chat-item{padding:16px 18px;border-bottom:1px solid var(--line);cursor:pointer}
    .chat-item:hover{background:var(--soft)}
    .chat-item.active{background:rgba(124,58,237,.08);border-left:4px solid var(--accent);padding-left:14px}
    .chat-top{display:flex;justify-content:space-between;gap:12px}.chat-name{font-size:18px;font-weight:800}.chat-time{font-size:12px;color:var(--muted)}
    .chat-preview{margin-top:8px;font-size:13px;color:var(--muted);line-height:1.45}
    .chat-meta{margin-top:10px;font-size:12px;font-weight:700;color:var(--text)}
    .badge{display:inline-flex;align-items:center;padding:5px 9px;border-radius:999px;font-size:11px;font-weight:700;margin-top:10px}
    .wa{background:#dcfce7;color:var(--wa)}.tg{background:#e0f2fe;color:var(--tg)}.ig{background:#fce7f3;color:var(--ig)}.ms{background:#dbeafe;color:var(--ms)}
    .thread{display:grid;grid-template-rows:auto 1fr auto;min-height:760px}
    .thread-head{padding:18px;border-bottom:1px solid var(--line);background:var(--soft)}
    .thread-name{font-family:'Syne',sans-serif;font-size:24px;font-weight:700}
    .thread-meta{margin-top:10px;font-size:13px;color:var(--muted);line-height:1.5}
    .thread-meta strong{color:var(--text)}
    .messages{padding:20px;background:linear-gradient(180deg,#fafbff 0%,#f4f6fb 100%);overflow:auto;display:flex;flex-direction:column;gap:16px}
    .day{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:11px;text-transform:uppercase}.day:before,.day:after{content:'';height:1px;flex:1;background:var(--line)}
    .msg-wrap{display:flex;flex-direction:column;gap:4px;max-width:74%}.msg-wrap.in{align-self:flex-start}.msg-wrap.out{align-self:flex-end;align-items:flex-end}
    .msg-label{font-size:11px;text-transform:uppercase;color:var(--muted);font-weight:700}
    .msg{padding:13px 15px;border-radius:16px;font-size:15px;line-height:1.55;white-space:pre-wrap;word-break:break-word}.msg.in{background:var(--panel);border:1px solid var(--line);border-bottom-left-radius:6px}.msg.out{background:linear-gradient(135deg,var(--accent),#6d28d9);color:#fff;border-bottom-right-radius:6px}
    .msg-time{font-size:10px;color:var(--muted)}
    .composer{display:flex;gap:10px;align-items:flex-end;padding:16px 18px;border-top:1px solid var(--line);background:var(--panel)}
    .composer textarea{flex:1;min-height:56px;max-height:140px;resize:vertical;padding:12px 14px;border:1px solid var(--line);background:var(--soft);border-radius:14px;outline:none;font:inherit}
    .send{padding:12px 18px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--accent),#6d28d9);color:#fff;font-weight:700;cursor:pointer}
    .empty{padding:42px 20px;text-align:center;color:var(--muted)}
    @media (max-width:1260px){.app,.workspace{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">BotMatic</div>
      <div class="side-title">Bots</div>
      <div class="bot-groups" id="botGroups"></div>
    </aside>
    <main class="main">
      <div class="topbar">
        <div class="page-title" id="pageTitle">Choose a bot</div>
        <div class="page-sub">Only one bot at a time. No mixed inbox.</div>
        <div class="workspace-line" id="workspaceLine"></div>
      </div>
      <div class="content">
        <div class="workspace">
          <section class="panel">
            <div class="panel-head">
              <div class="panel-title">Conversations</div>
              <input id="searchInput" placeholder="Search customer or number" />
            </div>
            <div class="chat-list" id="conversationList"></div>
          </section>
          <section class="panel thread">
            <div class="thread-head" id="threadHead"><div class="empty">Pick a conversation</div></div>
            <div class="messages" id="messageList"><div class="empty">Only messages for the selected bot will appear here.</div></div>
            <div class="composer">
              <textarea id="replyInput" placeholder="Reply as selected bot..."></textarea>
              <button class="send" id="sendBtn" type="button">Send</button>
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>
<script>
const state={bots:[],selectedBot:null,selectedClient:null,selectedChannels:[],chats:[],filteredChats:[],activeChat:null,messages:[]};
const params=new URLSearchParams(location.search);
const esc=(s)=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const ago=(v)=>{if(!v)return '—';const d=Date.now()-new Date(v).getTime();const m=Math.max(0,Math.floor(d/60000));if(m<1)return 'just now';if(m<60)return `${m}m ago`;const h=Math.floor(m/60);if(h<24)return `${h}h ago`;return `${Math.floor(h/24)}d ago`;};
const fmt=(v)=>v?new Date(v).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'—';
const chClass=(t)=>({whatsapp:'wa',telegram:'tg',instagram:'ig',messenger:'ms'}[t]||'');
const chLabel=(t)=>({whatsapp:'WhatsApp',telegram:'Telegram',instagram:'Instagram',messenger:'Messenger'}[t]||t||'Unknown');
async function api(url,opt){const r=await fetch(url,opt);const d=await r.json();if(!r.ok||d.ok===false) throw new Error(d.error||'Request failed');return d;}
async function load(){
  const clientsRes=await api('/api/admin/clients');
  const clients=clientsRes.clients||[];
  const details=await Promise.all(clients.map(async(client)=>{try{return await api(`/api/admin/clients/${encodeURIComponent(client.id)}`)}catch{return {client,bots:[],channels:[]}}}));
  state.bots=details.flatMap((detail)=>{
    const client=detail.client; const channels=detail.channels||[];
    const bots=(detail.bots||[]).length?detail.bots:[{id:client.workspace_bot_id||client.id,name:client.workspace_bot_name||client.company,prompt:'',knowledge_base:'',version:1,synthetic:true}];
    return bots.map((bot)=>({id:bot.id,name:bot.name||client.company,client,channels,channelTypes:[...new Set(channels.map((c)=>c.type).filter(Boolean))]}));
  }).filter((b)=>b.id).sort((a,b)=>a.name.localeCompare(b.name));
  renderBots();
  const wanted=params.get('botId');
  const first=state.bots.find((b)=>b.id===wanted||b.name===wanted)||state.bots[0]||null;
  if(first) await selectBot(first.id);
}
function renderBots(){
  const host=document.getElementById('botGroups');
  const groups=[['WhatsApp',state.bots.filter((b)=>b.channelTypes.includes('whatsapp'))],['Telegram',state.bots.filter((b)=>b.channelTypes.includes('telegram'))],['Instagram',state.bots.filter((b)=>b.channelTypes.includes('instagram'))],['Other',state.bots.filter((b)=>!b.channelTypes.length)]].filter(([,arr])=>arr.length);
  host.innerHTML=groups.map(([name,arr])=>`<div class="group"><div class="group-name">${esc(name)}</div>${arr.map((bot)=>`<button class="bot-btn ${state.selectedBot?.id===bot.id?'active':''}" data-id="${esc(bot.id)}">${esc(bot.name)}</button>`).join('')}</div>`).join('');
  host.querySelectorAll('.bot-btn').forEach((btn)=>btn.addEventListener('click',()=>selectBot(btn.dataset.id)));
}
async function selectBot(botId){
  const bot=state.bots.find((b)=>b.id===botId); if(!bot)return;
  state.selectedBot=bot; state.selectedClient=bot.client; state.selectedChannels=bot.channels||[]; state.activeChat=null; state.messages=[];
  const q=new URLSearchParams(location.search); q.set('botId',botId); history.replaceState({},'',`${location.pathname}?${q.toString()}`);
  renderBots(); renderHeader(); await loadChats();
}
function renderHeader(){
  document.getElementById('pageTitle').textContent=state.selectedBot?.name||'Choose a bot';
  document.getElementById('workspaceLine').innerHTML=state.selectedBot?`<span>Workspace:</span> ${esc(state.selectedClient?.company||'—')}<span> · Channel:</span> ${esc((state.selectedChannels||[]).map((c)=>chLabel(c.type)).join(', ')||'None')}`:'';
}
async function loadChats(){
  const res=await api(`/api/admin/chats?botId=${encodeURIComponent(state.selectedBot.id)}`);
  state.chats=res.chats||[]; state.filteredChats=[...state.chats]; state.activeChat=null;
  renderList(); renderThreadEmpty('Pick a conversation');
}
function renderList(){
  const host=document.getElementById('conversationList');
  if(!state.filteredChats.length){host.innerHTML='<div class="empty">No conversations for this bot.</div>';return;}
  host.innerHTML=state.filteredChats.map((chat)=>`<div class="chat-item ${state.activeChat?.id===chat.id?'active':''}" data-id="${esc(chat.id)}"><div class="chat-top"><div class="chat-name">${esc(chat.sender_name||chat.sender_id)}</div><div class="chat-time">${esc(ago(chat.last_message_at))}</div></div><div class="chat-preview">${esc(chat.last_message_text||chat.sender_id)}</div><div class="chat-meta">${esc(state.selectedBot.name)}</div><span class="badge ${chClass(chat.channel)}">${esc(chLabel(chat.channel))}</span></div>`).join('');
  host.querySelectorAll('.chat-item').forEach((el)=>el.addEventListener('click',()=>openChat(el.dataset.id)));
}
function renderThreadEmpty(text){document.getElementById('threadHead').innerHTML=`<div class="empty">${esc(text)}</div>`;document.getElementById('messageList').innerHTML=`<div class="empty">${esc(text)}</div>`;}
async function openChat(chatId){
  const chat=state.chats.find((c)=>c.id===chatId); if(!chat)return; state.activeChat=chat; renderList();
  document.getElementById('threadHead').innerHTML=`<div class="thread-name">${esc(chat.sender_name||chat.sender_id)}</div><div class="thread-meta"><strong>Bot:</strong> ${esc(state.selectedBot.name)}<br><strong>Workspace:</strong> ${esc(state.selectedClient.company)}<br><strong>Channel:</strong> ${esc(chLabel(chat.channel))}<br><strong>Customer:</strong> ${esc(chat.sender_id)}</div>`;
  const res=await api(`/api/admin/chats/${encodeURIComponent(chat.id)}/messages`); state.messages=res.messages||[]; renderMessages();
}
function renderMessages(){
  const host=document.getElementById('messageList'); if(!state.messages.length){host.innerHTML='<div class="empty">No messages in this conversation.</div>';return;}
  let last=''; host.innerHTML=state.messages.map((msg)=>{const day=new Date(msg.created_at||msg.timestamp||Date.now()).toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short'});const divider=day!==last?`<div class="day">${esc(day)}</div>`:'';last=day;const out=msg.direction==='out';return `${divider}<div class="msg-wrap ${out?'out':'in'}"><div class="msg-label">${out?`Bot · ${esc(state.selectedBot.name)}`:`Customer · ${esc(msg.sender_name||msg.sender_id)}`}</div><div class="msg ${out?'out':'in'}">${esc(msg.text||'[interactive]')}</div><div class="msg-time">${esc(fmt(msg.created_at||msg.timestamp))}</div></div>`;}).join(''); host.scrollTop=host.scrollHeight;
}
function filterChats(term){const q=String(term||'').trim().toLowerCase();state.filteredChats=!q?[...state.chats]:state.chats.filter((chat)=>[chat.sender_name,chat.sender_id,chat.last_message_text].some((v)=>String(v||'').toLowerCase().includes(q)));renderList();}
async function sendReply(){if(!state.activeChat)return;const input=document.getElementById('replyInput');const text=input.value.trim();if(!text)return;const btn=document.getElementById('sendBtn');btn.disabled=true;try{const res=await fetch('/api/admin/send-message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:state.activeChat.id,text})});const data=await res.json();if(!res.ok||data.ok===false) throw new Error(data.error||'Send failed');input.value='';await loadChats();await openChat(state.activeChat.id);}catch(e){alert(e.message)}finally{btn.disabled=false}}
async function init(){document.getElementById('searchInput').addEventListener('input',(e)=>filterChats(e.target.value));document.getElementById('sendBtn').addEventListener('click',sendReply);document.getElementById('replyInput').addEventListener('keydown',(e)=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendReply()}});await load()}
init().catch((e)=>{console.error(e);document.getElementById('conversationList').innerHTML=`<div class="empty">${esc(e.message||'Failed to load')}</div>`})
</script>
</body>
</html>
