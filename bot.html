<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BotMatic — Bot Overview</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f5f9; --surface: #ffffff; --surface2: #f0f1f6; --surface3: #e8eaf2;
      --border: #e2e4ed; --accent: #7c3aed; --text: #1a1a2e; --muted: #6b7280;
      --green: #059669; --yellow: #d97706; --red: #dc2626; --blue: #2563eb;
      --ig: #e1306c; --tg: #0088cc; --wa: #25d366;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 220px; flex-shrink: 0; background: var(--surface);
      border-right: 1px solid var(--border); padding: 24px 0;
      display: flex; flex-direction: column; gap: 4px;
    }
    .sidebar-logo {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      padding: 0 20px 20px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px; color: var(--muted); text-decoration: none;
      font-size: 14px; transition: all .15s;
    }
    .nav-item:hover { color: var(--text); background: var(--surface2); }
    .nav-item.active { color: var(--accent); background: rgba(124,108,252,0.1); border-left: 2px solid var(--accent); }
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 28px; border-bottom: 1px solid var(--border);
      background: var(--surface); position: sticky; top: 0; z-index: 10;
    }
    .top-left { display: flex; flex-direction: column; gap: 4px; }
    .top-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; }
    .top-meta { font-size: 13px; color: var(--muted); }
    .top-actions { display: flex; gap: 10px; align-items: center; }
    .btn {
      padding: 9px 14px; border-radius: 9px; font-size: 13px; font-weight: 600;
      text-decoration: none; border: 1px solid var(--border); color: var(--text);
      background: var(--surface);
    }
    .btn-primary { background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #fff; border-color: transparent; }
    .content { padding: 24px 28px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .stat {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 18px 20px;
    }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
    .stat-value { font-family: 'Outfit', sans-serif; font-size: 34px; font-weight: 800; line-height: 1; }
    .shell { padding: 0 28px 28px; display: grid; grid-template-columns: 360px 1fr; gap: 16px; min-height: 0; flex: 1; }
    .panel {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      overflow: hidden; display: flex; flex-direction: column; min-height: 0;
    }
    .panel-head {
      padding: 14px 16px; border-bottom: 1px solid var(--border); background: var(--surface2);
      font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
    }
    .workspace-list { overflow: auto; }
    .workspace-item {
      padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer;
      transition: background .12s;
    }
    .workspace-item:hover { background: var(--surface2); }
    .workspace-item.active { background: rgba(124,58,237,.08); border-left: 3px solid var(--accent); }
    .workspace-name { font-weight: 700; font-size: 14px; }
    .workspace-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .workspace-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 600;
      background: var(--surface3); color: var(--muted); border: 1px solid var(--border);
    }
    .b-wa { background: #dcfce7; color: #15803d; border-color: #bbf7d0; }
    .b-ig { background: #fce7f3; color: #be185d; border-color: #fbcfe8; }
    .b-tg { background: #e0f2fe; color: #0369a1; border-color: #bae6fd; }
    .b-ms { background: #dbeafe; color: #1d4ed8; border-color: #bfdbfe; }
    .detail { display: grid; grid-template-rows: auto auto 1fr; min-height: 0; }
    .workspace-summary {
      padding: 16px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
    }
    .summary-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
    .summary-meta { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .summary-grid {
      padding: 16px 18px; border-bottom: 1px solid var(--border);
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    }
    .mini {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px;
    }
    .mini-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
    .mini-value { font-size: 13px; font-weight: 600; }
    .chat-wrap { display: grid; grid-template-columns: 320px 1fr; min-height: 0; }
    .chat-list { border-right: 1px solid var(--border); overflow: auto; }
    .chat-item {
      padding: 12px 14px; border-bottom: 1px solid var(--border); cursor: pointer;
      transition: background .12s;
    }
    .chat-item:hover { background: var(--surface2); }
    .chat-item.active { background: rgba(124,58,237,.08); }
    .chat-name { font-weight: 700; font-size: 13px; }
    .chat-preview { font-size: 12px; color: var(--muted); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-meta { font-size: 11px; color: var(--muted); margin-top: 6px; }
    .messages { overflow: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; background: var(--bg); }
    .msg-group { display: flex; flex-direction: column; gap: 4px; }
    .msg-group.out { align-items: flex-end; }
    .msg-sender { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; }
    .msg {
      max-width: 70%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg.in { background: var(--surface); border: 1px solid var(--border); border-radius: 12px 12px 12px 3px; }
    .msg.out { background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #fff; border-radius: 12px 12px 3px 12px; }
    .msg-time { font-size: 10px; color: var(--muted); }
    .empty { padding: 40px; text-align: center; color: var(--muted); }
    @media (max-width: 1200px) {
      .content { grid-template-columns: repeat(2, 1fr); }
      .shell { grid-template-columns: 1fr; }
      .chat-wrap { grid-template-columns: 1fr; }
      .chat-list { border-right: none; border-bottom: 1px solid var(--border); max-height: 260px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-logo">BotMatic</div>
      <a href="/admin/clients" class="nav-item">Workspaces</a>
      <a href="/dashboard" class="nav-item">Dashboard</a>
      <a href="/bots" class="nav-item active">Bots</a>
      <a href="#" class="nav-item" id="sidebarInboxLink">Inbox</a>
      <a href="/auth/connect" class="nav-item">Channels</a>
      <a href="/analytics" class="nav-item">Analytics</a>
    </nav>
    <div class="main">
      <div class="topbar">
        <div class="top-left">
          <div class="top-title" id="botName">Loading…</div>
          <div class="top-meta" id="botMeta">Bot overview</div>
        </div>
        <div class="top-actions">
          <a class="btn" id="channelsBtn" href="/auth/connect">Channels</a>
          <a class="btn btn-primary" id="inboxBtn" href="/inbox">Open Scoped Inbox</a>
        </div>
      </div>
      <div class="content">
        <div class="stat"><div class="stat-label">Workspaces</div><div class="stat-value" id="stWorkspaces">0</div></div>
        <div class="stat"><div class="stat-label">Chats</div><div class="stat-value" id="stChats">0</div></div>
        <div class="stat"><div class="stat-label">Messages</div><div class="stat-value" id="stMessages">0</div></div>
        <div class="stat"><div class="stat-label">Connected Channels</div><div class="stat-value" id="stChannels">0</div></div>
      </div>
      <div class="shell">
        <div class="panel">
          <div class="panel-head">Clients / Workspaces In This Bot</div>
          <div id="workspaceList" class="workspace-list"><div class="empty">Loading…</div></div>
        </div>
        <div class="panel detail">
          <div id="workspaceSummary" class="workspace-summary"><div class="empty">Select a workspace</div></div>
          <div id="workspaceMetrics" class="summary-grid"></div>
          <div class="chat-wrap">
            <div id="chatList" class="chat-list"><div class="empty">No chats</div></div>
            <div id="messages" class="messages"><div class="empty">Choose a chat to view messages</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    const botId = new URLSearchParams(location.search).get('id') || 'main';
    const S = { bot: null, channels: null, workspaces: [], chats: [], activeWorkspace: null, activeChat: null };
    const esc = (s) => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const norm = (s) => String(s || '').toLowerCase().replace(/[^a-z0-9]+/g, '');
    const ago = (v) => {
      if (!v) return '—';
      const m = Math.floor((Date.now() - new Date(v).getTime()) / 60000);
      if (m < 1) return 'just now';
      if (m < 60) return `${m}m ago`;
      const h = Math.floor(m / 60);
      return h < 24 ? `${h}h ago` : `${Math.floor(h / 24)}d ago`;
    };
    const badgeCls = (t) => ({ whatsapp:'b-wa', instagram:'b-ig', telegram:'b-tg', messenger:'b-ms' }[t] || '');
    const icon = (t) => ({ whatsapp:'WA', instagram:'IG', telegram:'TG', messenger:'MS' }[t] || t);

    function matchWorkspaceToBot(workspace, bot) {
      const linkedId = String(workspace.workspace_bot_id || '');
      const linkedName = norm(workspace.workspace_bot_name || '');
      return workspace.id === bot.id
        || linkedId === bot.id
        || linkedName === norm(bot.id)
        || linkedName === norm(bot.name);
    }

    function renderStats() {
      const channelCount = ['instagram','messenger','telegram','whatsapp'].filter((k) => S.channels?.[k]?.connected).length;
      const messageCount = S.chats.reduce((sum, c) => sum + (c.message_count || 0), 0);
      document.getElementById('stWorkspaces').textContent = S.workspaces.length;
      document.getElementById('stChats').textContent = S.chats.length;
      document.getElementById('stMessages').textContent = messageCount;
      document.getElementById('stChannels').textContent = channelCount;
    }

    function renderWorkspaces() {
      const el = document.getElementById('workspaceList');
      if (!S.workspaces.length) {
        el.innerHTML = '<div class="empty">No workspaces linked to this bot yet.</div>';
        return;
      }
      el.innerHTML = S.workspaces.map((w) => {
        const active = S.activeWorkspace?.id === w.id ? ' active' : '';
        const channelTypes = String(w.channel_types || '').split(',').filter(Boolean);
        const route = [w.contact_name, w.contact_phone].filter(Boolean).join(' · ') || 'No route';
        return `<div class="workspace-item${active}" data-id="${esc(w.id)}">
          <div class="workspace-name">${esc(w.company)}</div>
          <div class="workspace-meta">Workspace ID: ${esc(w.id)}</div>
          <div class="workspace-meta">Route: ${esc(route)}</div>
          <div class="workspace-badges">
            ${channelTypes.map((t) => `<span class="badge ${badgeCls(t)}">${icon(t)}</span>`).join('') || '<span class="badge">manual</span>'}
          </div>
        </div>`;
      }).join('');
      el.querySelectorAll('.workspace-item').forEach((node) => node.addEventListener('click', () => openWorkspace(node.dataset.id)));
    }

    function renderWorkspaceSummary() {
      const summary = document.getElementById('workspaceSummary');
      const metrics = document.getElementById('workspaceMetrics');
      if (!S.activeWorkspace) {
        summary.innerHTML = '<div class="empty">Select a workspace</div>';
        metrics.innerHTML = '';
        return;
      }
      const w = S.activeWorkspace;
      const chats = S.chats.filter((c) => c.client_id === w.id);
      summary.innerHTML = `<div>
        <div class="summary-title">${esc(w.company)}</div>
        <div class="summary-meta">Workspace ID: ${esc(w.id)} · Bot: ${esc(S.bot.name)}</div>
      </div>
      <a class="btn" href="/admin/client?id=${encodeURIComponent(w.id)}">Open Workspace</a>`;
      metrics.innerHTML = `
        <div class="mini"><div class="mini-label">Clients / Chats</div><div class="mini-value">${chats.length}</div></div>
        <div class="mini"><div class="mini-label">Last Activity</div><div class="mini-value">${esc(chats[0]?.last_message_at ? ago(chats[0].last_message_at) : '—')}</div></div>
        <div class="mini"><div class="mini-label">Goal</div><div class="mini-value">${esc(w.goal || '—')}</div></div>
      `;
    }

    function renderChatList() {
      const el = document.getElementById('chatList');
      if (!S.activeWorkspace) {
        el.innerHTML = '<div class="empty">Select a workspace first</div>';
        return;
      }
      const chats = S.chats.filter((c) => c.client_id === S.activeWorkspace.id);
      if (!chats.length) {
        el.innerHTML = '<div class="empty">No chats for this workspace</div>';
        return;
      }
      el.innerHTML = chats.map((c) => {
        const active = S.activeChat?.id === c.id ? ' active' : '';
        return `<div class="chat-item${active}" data-id="${esc(c.id)}">
          <div class="chat-name">${esc(c.sender_name || c.sender_id)}</div>
          <div class="chat-preview">${esc(c.last_message_text || '—')}</div>
          <div class="chat-meta">${esc(c.channel)} · ${ago(c.last_message_at)}</div>
        </div>`;
      }).join('');
      el.querySelectorAll('.chat-item').forEach((node) => node.addEventListener('click', () => openChat(node.dataset.id)));
    }

    async function openWorkspace(id) {
      S.activeWorkspace = S.workspaces.find((w) => w.id === id) || null;
      S.activeChat = null;
      renderWorkspaces();
      renderWorkspaceSummary();
      renderChatList();
      document.getElementById('messages').innerHTML = '<div class="empty">Choose a chat to view messages</div>';
      const firstChat = S.chats.find((c) => c.client_id === id);
      if (firstChat) await openChat(firstChat.id);
    }

    async function openChat(id) {
      const chat = S.chats.find((c) => c.id === id);
      if (!chat) return;
      S.activeChat = chat;
      renderChatList();
      const data = await fetch(`/api/admin/chats/${encodeURIComponent(id)}/messages?limit=200`).then((r) => r.json());
      const messages = Array.isArray(data.messages) ? data.messages : [];
      const el = document.getElementById('messages');
      if (!messages.length) {
        el.innerHTML = '<div class="empty">No messages yet</div>';
        return;
      }
      el.innerHTML = messages.map((m) => {
        const dir = m.direction === 'out' ? 'out' : 'in';
        const sender = dir === 'out' ? `Bot · ${S.bot.name}` : `Client · ${chat.sender_name || chat.sender_id}`;
        return `<div class="msg-group ${dir}">
          <div class="msg-sender">${esc(sender)}</div>
          <div class="msg ${dir}">${esc(m.text || '')}</div>
          <div class="msg-time">${esc(ago(m.created_at))}</div>
        </div>`;
      }).join('');
      el.scrollTop = el.scrollHeight;
    }

    async function load() {
      const [botsData, channelsData, workspacesData, chatsData] = await Promise.all([
        fetch(`/auth/api/bots?botId=${encodeURIComponent(botId)}`).then((r) => r.json()),
        fetch(`/auth/api/channels?botId=${encodeURIComponent(botId)}`).then((r) => r.json()),
        fetch('/api/admin/clients').then((r) => r.json()),
        fetch('/api/admin/chats').then((r) => r.json()),
      ]);

      S.bot = (botsData.bots || []).find((b) => b.id === botId) || channelsData.bot || { id: botId, name: botId };
      S.channels = channelsData;
      S.workspaces = (workspacesData.clients || []).filter((w) => matchWorkspaceToBot(w, S.bot));
      S.chats = (chatsData.chats || []).filter((c) => S.workspaces.some((w) => w.id === c.client_id));

      document.title = `BotMatic — ${S.bot.name}`;
      document.getElementById('botName').textContent = S.bot.name;
      document.getElementById('botMeta').textContent = `Bot ID: ${S.bot.id}`;
      document.getElementById('channelsBtn').href = `/auth/connect?botId=${encodeURIComponent(S.bot.id)}`;
      const scopedInboxUrl = `/inbox?botId=${encodeURIComponent(S.bot.id)}`;
      document.getElementById('inboxBtn').href = scopedInboxUrl;
      document.getElementById('sidebarInboxLink').href = scopedInboxUrl;

      renderStats();
      renderWorkspaces();
      renderWorkspaceSummary();
      renderChatList();
      if (S.workspaces[0]) openWorkspace(S.workspaces[0].id);
    }

    load().catch((e) => {
      document.getElementById('workspaceList').innerHTML = `<div class="empty">${esc(e.message)}</div>`;
    });
  </script>
</body>
</html>
