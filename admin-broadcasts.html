<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BotMatic — Broadcasts</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root { --bg:#0a0a0f;--surface:#13131a;--border:#1e1e2e;--accent:#7c6cfc;--text:#e0e0e0;--muted:#666;--red:#ef4444;--green:#10b981;--yellow:#f59e0b; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); display:flex; min-height:100vh; }
  .sidebar { width:220px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:20px 0; flex-shrink:0; }
  .logo { font-family:'Syne',sans-serif; font-size:18px; font-weight:700; color:#fff; padding:0 20px 24px; }
  .nav-item { display:flex; align-items:center; gap:10px; padding:10px 20px; color:var(--muted); font-size:14px; text-decoration:none; cursor:pointer; transition:.15s; }
  .nav-item:hover,.nav-item.active { color:#fff; background:#ffffff08; }
  .nav-item.active { border-left:2px solid var(--accent); }
  .main { flex:1; display:flex; flex-direction:column; min-width:0; }
  .topbar { padding:20px 32px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .topbar h1 { font-family:'Syne',sans-serif; font-size:22px; font-weight:700; }
  .content { padding:32px; display:flex; gap:24px; flex:1; }
  .panel { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:24px; }
  .panel-title { font-family:'Syne',sans-serif; font-weight:600; font-size:15px; margin-bottom:16px; }
  .btn { padding:8px 16px; border-radius:8px; border:none; font-size:13px; font-weight:600; cursor:pointer; transition:.15s; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { opacity:.85; }
  .btn-danger { background:#ef444422; color:var(--red); border:1px solid #ef444433; }
  .btn-danger:hover { background:#ef444433; }
  .btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border); }
  .btn-ghost:hover { color:var(--text); border-color:#444; }
  .btn-green { background:#10b98122; color:var(--green); border:1px solid #10b98133; }
  .btn-green:hover { background:#10b98133; }
  input, textarea, select { background:#0d0d14; border:1px solid var(--border); color:var(--text); border-radius:8px; padding:9px 12px; font-size:13px; font-family:inherit; width:100%; outline:none; }
  input:focus, textarea:focus, select:focus { border-color:var(--accent); }
  textarea { resize:vertical; min-height:100px; }
  label { font-size:12px; color:var(--muted); margin-bottom:5px; display:block; }
  .form-group { margin-bottom:14px; }
  .bc-list { display:flex; flex-direction:column; gap:10px; }
  .bc-card { background:#0d0d14; border:1px solid var(--border); border-radius:10px; padding:14px 16px; cursor:pointer; transition:.15s; }
  .bc-card:hover { border-color:#333; }
  .bc-card.active { border-color:var(--accent); }
  .bc-name { font-weight:600; font-size:14px; }
  .bc-meta { font-size:12px; color:var(--muted); margin-top:4px; display:flex; gap:12px; }
  .badge { padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; }
  .badge-draft    { background:#ffffff11; color:var(--muted); }
  .badge-sending  { background:#f59e0b22; color:var(--yellow); }
  .badge-sent     { background:#10b98122; color:var(--green); }
  .contacts-list  { max-height:220px; overflow-y:auto; display:flex; flex-direction:column; gap:6px; margin:10px 0; }
  .contact-item   { display:flex; align-items:center; gap:8px; padding:6px 10px; background:#0d0d14; border-radius:8px; font-size:13px; }
  .contact-item input[type=checkbox] { width:auto; }
  .recip-list { display:flex; flex-direction:column; gap:6px; max-height:200px; overflow-y:auto; }
  .recip-row { display:flex; justify-content:space-between; align-items:center; font-size:12px; padding:5px 8px; background:#0d0d14; border-radius:6px; }
  .stat-row { display:flex; gap:16px; margin:12px 0; }
  .stat-box { flex:1; background:#0d0d14; border-radius:8px; padding:10px 14px; text-align:center; }
  .stat-num { font-size:22px; font-weight:700; }
  .stat-lbl { font-size:11px; color:var(--muted); margin-top:2px; }
  .empty { text-align:center; color:var(--muted); padding:40px 20px; font-size:14px; }
  .divider { height:1px; background:var(--border); margin:16px 0; }
  .progress-bar { height:6px; background:#1e1e2e; border-radius:3px; overflow:hidden; margin-top:6px; }
  .progress-fill { height:100%; background:var(--green); border-radius:3px; transition:width .4s; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">BotMatic</div>
  <a class="nav-item" href="/admin/clients">👥 Workspaces</a>
  <a class="nav-item" href="/dashboard">📊 Dashboard</a>
  <a class="nav-item" href="/bots">🤖 Bots</a>
  <a class="nav-item" href="/inbox">💬 Inbox</a>
  <a class="nav-item" href="/channels">🔗 Channels</a>
  <a class="nav-item active" href="/broadcasts">📢 Broadcasts</a>
  <a class="nav-item" href="/analytics">📈 Analytics</a>
  <a class="nav-item" href="/settings">⚙️ Settings</a>
</div>

<div class="main">
  <div class="topbar">
    <h1>📢 Broadcasts</h1>
    <button class="btn btn-primary" onclick="openCreate()">+ New Broadcast</button>
  </div>

  <div class="content">
    <!-- Left: list -->
    <div class="panel" style="width:340px;flex-shrink:0">
      <div class="panel-title">Broadcasts</div>
      <div id="bcList" class="bc-list"><div class="empty">No broadcasts yet</div></div>
    </div>

    <!-- Right: detail / create -->
    <div class="panel" style="flex:1" id="detailPanel">
      <div class="empty" style="margin-top:60px">← Select a broadcast or create new</div>
    </div>
  </div>
</div>

<script>
const API = '/api/admin';
let S = { broadcasts:[], clients:[], contacts:[], current:null, mode:'view' };

async function load() {
  const [bcData, clData] = await Promise.all([
    fetch(`${API}/broadcasts`).then(r=>r.json()),
    fetch(`${API}/clients`).then(r=>r.json()),
  ]);
  S.broadcasts = bcData.broadcasts || [];
  S.clients    = clData.clients || [];
  renderList();
}

function renderList() {
  const el = document.getElementById('bcList');
  if (!S.broadcasts.length) { el.innerHTML = '<div class="empty">No broadcasts yet</div>'; return; }
  el.innerHTML = S.broadcasts.map(bc => `
    <div class="bc-card ${S.current?.id===bc.id?'active':''}" onclick="selectBC('${bc.id}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="bc-name">${esc(bc.name)}</div>
        <span class="badge badge-${bc.status}">${bc.status}</span>
      </div>
      <div class="bc-meta">
        <span>📱 ${bc.channel}</span>
        ${bc.sent_count ? `<span>✅ ${bc.sent_count} sent</span>` : ''}
        ${bc.fail_count ? `<span>❌ ${bc.fail_count} failed</span>` : ''}
        <span>${fmtDate(bc.created_at)}</span>
      </div>
      <div style="color:#aaa;font-size:12px;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(bc.message.slice(0,60))}${bc.message.length>60?'…':''}</div>
    </div>`).join('');
}

async function selectBC(id) {
  S.current = S.broadcasts.find(b=>b.id===id);
  S.mode = 'view';
  renderList();
  await renderDetail();
}

async function renderDetail() {
  const bc = S.current;
  if (!bc) return;
  const recipData = await fetch(`${API}/broadcasts/${bc.id}/recipients`).then(r=>r.json());
  const recips = recipData.recipients || [];
  const client = S.clients.find(c=>c.id===bc.client_id);
  const total = recips.length;
  const sent  = recips.filter(r=>r.status==='sent').length;
  const fail  = recips.filter(r=>r.status==='failed').length;
  const pct   = total ? Math.round(sent/total*100) : 0;

  document.getElementById('detailPanel').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
      <div>
        <div style="font-family:Syne,sans-serif;font-size:17px;font-weight:700">${esc(bc.name)}</div>
        <div style="font-size:12px;color:#666;margin-top:4px">
          ${client?`Workspace: <b style="color:#aaa">${esc(client.company)}</b> · `:''}
          Channel: <b style="color:#aaa">${bc.channel}</b> ·
          <span class="badge badge-${bc.status}">${bc.status}</span>
        </div>
      </div>
      <div style="display:flex;gap:8px">
        ${bc.status==='draft' ? `
          <button class="btn btn-ghost" onclick="openEdit()">✏️ Edit</button>
          <button class="btn btn-green" onclick="openSend('${bc.id}')">🚀 Send</button>
        ` : ''}
        <button class="btn btn-danger" onclick="deleteBC('${bc.id}')">🗑 Delete</button>
      </div>
    </div>

    <div class="panel-title" style="margin-top:8px">Message</div>
    <div style="background:#0d0d14;border-radius:8px;padding:12px 14px;font-size:13px;color:#e0e0e0;white-space:pre-wrap;margin-bottom:16px">${esc(bc.message)}</div>

    ${total ? `
      <div class="stat-row">
        <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-lbl">Recipients</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--green)">${sent}</div><div class="stat-lbl">Sent ✅</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--red)">${fail}</div><div class="stat-lbl">Failed ❌</div></div>
        <div class="stat-box"><div class="stat-num">${pct}%</div><div class="stat-lbl">Success rate</div></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="divider"></div>
      <div class="panel-title">Recipients</div>
      <div class="recip-list">
        ${recips.map(r=>`
          <div class="recip-row">
            <span>+${r.phone}</span>
            <span class="${r.status==='sent'?'':''}">
              ${r.status==='sent'?'✅ Sent':r.status==='failed'?`❌ ${r.error||'Failed'}`:'⏳ Pending'}
            </span>
          </div>`).join('')}
      </div>
    ` : `<div class="empty">No recipients yet. Click 🚀 Send to start.</div>`}
  `;
}

function openCreate() {
  S.current = null;
  S.mode = 'create';
  renderList();
  document.getElementById('detailPanel').innerHTML = `
    <div class="panel-title">New Broadcast</div>
    ${bcForm()}
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-primary" onclick="saveBC()">Save draft</button>
      <button class="btn btn-ghost" onclick="document.getElementById('detailPanel').innerHTML='<div class=\\'empty\\' style=\\'margin-top:60px\\'>← Select a broadcast or create new</div>'">Cancel</button>
    </div>`;
  loadClientsSelect();
}

function openEdit() {
  const bc = S.current;
  document.getElementById('detailPanel').innerHTML = `
    <div class="panel-title">Edit Broadcast</div>
    ${bcForm(bc)}
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-primary" onclick="updateBC('${bc.id}')">Save</button>
      <button class="btn btn-ghost" onclick="renderDetail()">Cancel</button>
    </div>`;
  loadClientsSelect(bc.client_id);
  document.getElementById('bcName').value = bc.name;
  document.getElementById('bcMsg').value  = bc.message;
  document.getElementById('bcChannel').value = bc.channel;
}

function bcForm(bc) {
  return `
    <div class="form-group"><label>Workspace</label>
      <select id="bcClient">${S.clients.map(c=>`<option value="${c.id}" ${bc?.client_id===c.id?'selected':''}>${esc(c.company)}</option>`).join('')}</select>
    </div>
    <div class="form-group"><label>Name</label><input id="bcName" placeholder="e.g. March promo" value="${esc(bc?.name||'')}"/></div>
    <div class="form-group"><label>Channel</label>
      <select id="bcChannel">
        <option value="whatsapp" ${bc?.channel==='whatsapp'?'selected':''}>WhatsApp</option>
        <option value="telegram" ${bc?.channel==='telegram'?'selected':''}>Telegram</option>
      </select>
    </div>
    <div class="form-group"><label>Message</label><textarea id="bcMsg" placeholder="Type your message…">${esc(bc?.message||'')}</textarea></div>`;
}

function loadClientsSelect(selectedId) {
  const sel = document.getElementById('bcClient');
  if (!sel) return;
  sel.innerHTML = S.clients.map(c=>`<option value="${c.id}" ${c.id===selectedId?'selected':''}>${esc(c.company)}</option>`).join('');
}

async function saveBC() {
  const client_id = document.getElementById('bcClient')?.value;
  const name      = document.getElementById('bcName')?.value.trim();
  const message   = document.getElementById('bcMsg')?.value.trim();
  const channel   = document.getElementById('bcChannel')?.value || 'whatsapp';
  if (!name || !message) return alert('Name and message required');
  const r = await fetch(`${API}/broadcasts`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ client_id, name, message, channel })
  }).then(r=>r.json());
  if (!r.ok) return alert(r.error);
  S.broadcasts.unshift(r.broadcast);
  S.current = r.broadcast;
  renderList();
  await renderDetail();
}

async function updateBC(id) {
  const name    = document.getElementById('bcName')?.value.trim();
  const message = document.getElementById('bcMsg')?.value.trim();
  const channel = document.getElementById('bcChannel')?.value || 'whatsapp';
  if (!name || !message) return alert('Name and message required');
  const r = await fetch(`${API}/broadcasts/${id}`, {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ name, message, channel })
  }).then(r=>r.json());
  if (!r.ok) return alert(r.error);
  const idx = S.broadcasts.findIndex(b=>b.id===id);
  if (idx>=0) S.broadcasts[idx] = r.broadcast;
  S.current = r.broadcast;
  renderList();
  await renderDetail();
}

async function deleteBC(id) {
  if (!confirm('Delete this broadcast?')) return;
  await fetch(`${API}/broadcasts/${id}`, { method:'DELETE' });
  S.broadcasts = S.broadcasts.filter(b=>b.id!==id);
  S.current = null;
  renderList();
  document.getElementById('detailPanel').innerHTML = '<div class="empty" style="margin-top:60px">← Select a broadcast or create new</div>';
}

async function openSend(id) {
  const bc = S.broadcasts.find(b=>b.id===id);
  // Load contacts for this client
  const cd = await fetch(`${API}/clients/${bc.client_id}/contacts`).then(r=>r.json());
  const contacts = cd.contacts || [];
  if (!contacts.length) return alert('No contacts found for this workspace. Contacts are collected automatically when people message the bot.');

  document.getElementById('detailPanel').innerHTML = `
    <div class="panel-title">🚀 Send Broadcast: ${esc(bc.name)}</div>
    <div style="background:#10b98111;border:1px solid #10b98133;border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px">
      📢 This will send the message to the selected contacts via ${bc.channel}.
    </div>
    <div style="font-size:13px;color:#aaa;margin-bottom:8px">Select recipients (${contacts.length} contacts available):</div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="btn btn-ghost" style="font-size:12px;padding:4px 10px" onclick="toggleAll(true)">Select all</button>
      <button class="btn btn-ghost" style="font-size:12px;padding:4px 10px" onclick="toggleAll(false)">Deselect all</button>
    </div>
    <div class="contacts-list" id="contactsList">
      ${contacts.map(c=>`
        <label class="contact-item">
          <input type="checkbox" class="contact-cb" value="${c.phone}" checked/>
          <span>+${c.phone}</span>
          <span style="color:#666;font-size:11px;margin-left:auto">${fmtDate(c.last_seen)}</span>
        </label>`).join('')}
    </div>
    <div class="divider"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-green" onclick="sendBC('${id}')">🚀 Send now</button>
      <button class="btn btn-ghost" onclick="renderDetail()">Cancel</button>
    </div>`;
}

function toggleAll(val) {
  document.querySelectorAll('.contact-cb').forEach(cb => cb.checked = val);
}

async function sendBC(id) {
  const phones = [...document.querySelectorAll('.contact-cb:checked')].map(cb=>cb.value);
  if (!phones.length) return alert('Select at least one recipient');
  const r = await fetch(`${API}/broadcasts/${id}/send`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ phones })
  }).then(r=>r.json());
  if (!r.ok) return alert(r.error);
  const idx = S.broadcasts.findIndex(b=>b.id===id);
  if (idx>=0) S.broadcasts[idx].status = 'sending';
  S.current = S.broadcasts[idx] || S.current;
  renderList();
  await renderDetail();
  // Poll for completion
  const poll = setInterval(async () => {
    const d = await fetch(`${API}/broadcasts`).then(r=>r.json());
    S.broadcasts = d.broadcasts || [];
    S.current = S.broadcasts.find(b=>b.id===id);
    renderList();
    if (S.current?.status === 'sent') { clearInterval(poll); await renderDetail(); }
  }, 2000);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(s) { if (!s) return ''; const d=new Date(s); return d.toLocaleDateString([], {day:'numeric',month:'short'}); }

// Add page to nav
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.nav-item').forEach(a => {
    a.classList.toggle('active', a.getAttribute('href') === location.pathname);
  });
});

load();
</script>
</body>
</html>
