<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BotMatic — Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#f4f5f9;--surface:#fff;--surface2:#f0f1f6;--surface3:#e8eaf2;
      --border:#e2e4ed;--accent:#7c3aed;--accent2:#db2777;
      --text:#1a1a2e;--muted:#6b7280;--green:#059669;--yellow:#d97706;--red:#dc2626;--blue:#2563eb;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
    .layout{display:flex;min-height:100vh;}
    .sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:24px 0;display:flex;flex-direction:column;gap:4px;}
    .sidebar-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;background:linear-gradient(135deg,#7c3aed,#db2777);-webkit-background-clip:text;-webkit-text-fill-color:transparent;padding:0 20px 20px;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--muted);text-decoration:none;font-size:14px;transition:all .15s;}
    .nav-item:hover{color:var(--text);background:var(--surface2);}
    .nav-item.active{color:var(--accent);background:rgba(124,108,252,.1);border-left:2px solid var(--accent);}
    .main{flex:1;overflow-y:auto;}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 32px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10;}
    .topbar h1{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;}
    .content{padding:28px 32px;}
    .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
    .stat-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
    .stat-value{font-family:'Outfit',sans-serif;font-size:32px;font-weight:800;margin-bottom:4px;letter-spacing:-1px;font-variant-numeric:tabular-nums;}
    .stat-value.accent{background:linear-gradient(135deg,#7c3aed,#db2777);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .stat-value.green{color:var(--green);} .stat-value.blue{color:var(--blue);} .stat-value.yellow{color:var(--yellow);}
    .stat-sub{font-size:12px;color:var(--muted);}
    .section-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:16px;margin-top:8px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:20px;}
    .card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
    .card-header h3{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:14px;}
    thead th{text-align:left;padding:10px 16px;font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);background:var(--surface2);}
    tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
    tbody tr:last-child{border-bottom:none;}
    tbody tr:hover{background:var(--surface2);}
    td{padding:12px 16px;vertical-align:middle;}
    .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;}
    .badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;}
    .badge-new{color:#a0a0c0;background:rgba(160,160,192,.12);}
    .badge-brief{color:var(--blue);background:rgba(96,165,250,.12);}
    .badge-connecting{color:var(--yellow);background:rgba(251,191,36,.12);}
    .badge-setup{color:#c084fc;background:rgba(192,132,252,.12);}
    .badge-test{color:var(--yellow);background:rgba(251,191,36,.12);}
    .badge-live{color:var(--green);background:rgba(74,222,128,.12);}
    .badge-support{color:var(--blue);background:rgba(96,165,250,.12);}
    .bar-cell{display:flex;align-items:center;gap:8px;}
    .mini-bar{height:6px;border-radius:3px;background:linear-gradient(90deg,#7c3aed,#db2777);min-width:4px;}
    .ch-icons{display:flex;gap:4px;}
    .ch-dot{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;}
    .ch-ig{background:rgba(252,108,143,.15);color:#db2777;}
    .ch-ms{background:rgba(96,165,250,.15);color:var(--blue);}
    .ch-tg{background:rgba(56,189,248,.12);color:#38bdf8;}
    .ch-wa{background:rgba(74,222,128,.12);color:var(--green);}
    .empty-state{padding:40px;text-align:center;color:var(--muted);font-size:14px;}
    .act-item{display:flex;align-items:flex-start;gap:12px;padding:11px 20px;border-bottom:1px solid var(--border);}
    .act-item:last-child{border-bottom:none;}
    .act-item:hover{background:var(--surface2);}
    .act-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
    .dot-p{background:var(--accent);} .dot-g{background:var(--green);} .dot-b{background:var(--blue);} .dot-y{background:var(--yellow);} .dot-gr{background:var(--muted);}
    .act-action{font-size:13px;}
    .act-meta{font-size:11px;color:var(--muted);margin-top:2px;}
    .activity-list{max-height:400px;overflow-y:auto;}
  </style>
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-logo">BotMatic</div>
    <a href="/admin/clients" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Workspaces
    </a>
    <a href="/dashboard" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="/bots" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>
      Bots
    </a>
    <a href="/inbox" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Inbox
    </a>
    <a href="/auth/connect" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v2"/><path d="M8 20H6a2 2 0 0 1-2-2v-2"/><path d="M20 16v2a2 2 0 0 1-2 2h-2"/><path d="M4 8V6a2 2 0 0 1 2-2h2"/><circle cx="12" cy="12" r="3"/></svg>
      Channels
    </a>
    <a href="/analytics" class="nav-item active">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Analytics
    </a>
  </nav>

  <div class="main">
    <div class="topbar">
      <h1>Analytics</h1>
      <span style="font-size:13px;color:var(--muted)" id="topDate"></span>
    </div>

    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><div class="stat-label">Total Workspaces</div><div class="stat-value accent" id="st-total">—</div><div class="stat-sub">in database</div></div>
        <div class="stat-card"><div class="stat-label">Live</div><div class="stat-value green" id="st-live">—</div><div class="stat-sub">active</div></div>
        <div class="stat-card"><div class="stat-label">Channels</div><div class="stat-value blue" id="st-ch">—</div><div class="stat-sub">connected</div></div>
        <div class="stat-card"><div class="stat-label">Tasks</div><div class="stat-value yellow" id="st-tasks">—</div><div class="stat-sub">open</div></div>
      </div>

      <!-- Workspaces table -->
      <div class="card">
        <div class="card-header"><h3>All Workspaces</h3></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Company</th>
                <th>Niche</th>
                <th>Status</th>
                <th>Channels</th>
                <th>Tasks</th>
                <th>Priority</th>
              </tr>
            </thead>
            <tbody id="clientsTable">
              <tr><td colspan="6" class="empty-state">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Activity log -->
      <div class="card">
        <div class="card-header"><h3>Activity Log</h3></div>
        <div class="activity-list" id="actList"><div class="empty-state">Loading...</div></div>
      </div>
    </div>
  </div>
</div>

<script>
const SL={new:'New',brief:'Brief',connecting:'Connecting',setup:'Setup',test:'Test',live:'Live',support:'Support'};
const PRI={high:'🔴 High',normal:'🟡 Normal',low:'⚪ Low'};
const AL={client_created:'🆕 New Client',client_updated:'✏️ Updated',client_deleted:'🗑️ Deleted',
  status_changed:'🔄 Status Changed',bot_created:'🤖 Bot Created',bot_updated:'🤖 Bot Saved',
  flow_updated:'🔧 Flow Updated',channel_connected:'🔗 Channel Connected',channel_disconnected:'❌ Channel Disconnected'};

document.getElementById('topDate').textContent =
  new Date().toLocaleDateString('en-US',{weekday:'long',day:'numeric',month:'long'});

const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function ago(ds){
  const m=Math.floor((Date.now()-new Date(ds.includes('T')?ds:ds+' UTC'))/60000);
  if(m<1) return 'just now';
  if(m<60) return `${m} min ago`;
  const h=Math.floor(m/60);
  return h<24?`${h} h ago`:`${Math.floor(h/24)} days ago`;
}
function dotCls(a){
  if(a.includes('creat')||a.includes('connect')) return 'dot-p';
  if(a.includes('delet')||a.includes('disconnect')) return 'dot-y';
  if(a.includes('status')) return 'dot-g';
  if(a.includes('flow')||a.includes('bot')) return 'dot-b';
  return 'dot-gr';
}

async function load(){
  try{
    const [s,c]=await Promise.all([
      fetch('/api/admin/stats').then(r=>r.json()),
      fetch('/api/admin/clients').then(r=>r.json()),
    ]);
    document.getElementById('st-total').textContent=s.overview.total_clients;
    document.getElementById('st-live').textContent=s.overview.live_clients;
    document.getElementById('st-ch').textContent=s.overview.connected_channels;
    document.getElementById('st-tasks').textContent=s.overview.open_tasks;

    const clients=c.clients||[];
    const maxTasks=Math.max(1,...clients.map(cl=>cl.tasks_open||0));
    document.getElementById('clientsTable').innerHTML=clients.length
      ?clients.map(cl=>`<tr onclick="location='/admin/client?id=${cl.id}'" style="cursor:pointer">
          <td><b>${esc(cl.company)}</b>${cl.niche?'<br><span style="font-size:12px;color:var(--muted)">'+esc(cl.niche)+'</span>':''}</td>
          <td style="color:var(--muted);font-size:13px">${esc(cl.niche||'—')}</td>
          <td><span class="badge badge-${cl.status}">${SL[cl.status]||cl.status}</span></td>
          <td>
            <div class="ch-icons">
              ${cl.channels_connected>0?'<span class="ch-dot ch-ig" title="Есть подключённые каналы">✓</span>':'<span style="font-size:12px;color:var(--muted)">—</span>'}
            </div>
          </td>
          <td>
            <div class="bar-cell">
              <div class="mini-bar" style="width:${Math.round((cl.tasks_open||0)/maxTasks*60)}px"></div>
              <span style="font-size:13px">${cl.tasks_open||0}</span>
            </div>
          </td>
          <td style="font-size:12px">${PRI[cl.priority]||cl.priority||'—'}</td>
        </tr>`).join('')
      :'<tr><td colspan="6" class="empty-state">No workspaces</td></tr>';

    const acts=(s.activity||[]).slice(0,30);
    document.getElementById('actList').innerHTML=acts.length
      ?acts.map(a=>`<div class="act-item">
          <div class="act-dot ${dotCls(a.action)}"></div>
          <div><div class="act-action">${AL[a.action]||a.action}${a.company?' · <b>'+esc(a.company)+'</b>':''}</div>
          <div class="act-meta">${esc(a.details||'')} · ${ago(a.created_at)}</div></div>
        </div>`).join('')
      :'<div class="empty-state">No activity</div>';
  }catch(e){console.error(e);}
}

load();
setInterval(load,30000);
</script>
</body>
</html>
