<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#0d1f17"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Green glow top-right -->
  <ellipse cx="1050" cy="80" rx="300" ry="200" fill="url(#greenGlow)"/>

  <!-- Green accent bar left -->
  <rect x="0" y="0" width="8" height="630" fill="#16a34a"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="530" r="120" fill="#16a34a" opacity="0.06"/>
  <circle cx="1100" cy="530" r="70" fill="#16a34a" opacity="0.08"/>

  <!-- Green dot top right -->
  <circle cx="1140" cy="80" r="12" fill="#16a34a"/>
  <circle cx="1160" cy="55" r="7" fill="#16a34a" opacity="0.5"/>
  <circle cx="1115" cy="55" r="5" fill="#16a34a" opacity="0.4"/>

  <!-- Main logo text: BotMatic -->
  <text x="80" y="290"
    font-family="Arial Black, Arial, sans-serif"
    font-size="96"
    font-weight="900"
    fill="white"
    letter-spacing="-2">BotMatic</text>

  <!-- Green dot after logo -->
  <circle cx="690" cy="255" r="12" fill="#16a34a"/>

  <!-- Tagline -->
  <text x="80" y="360"
    font-family="Arial, sans-serif"
    font-size="32"
    font-weight="400"
    fill="#94a3b8">De chatbot die klantvragen beantwoordt. Automatisch, 24/7.</text>

  <!-- Divider line -->
  <rect x="80" y="400" width="60" height="4" rx="2" fill="#16a34a"/>

  <!-- Sub info -->
  <text x="80" y="460"
    font-family="Arial, sans-serif"
    font-size="24"
    fill="#64748b">WhatsApp · Instagram · Messenger · en meer</text>

  <!-- Badge -->
  <rect x="80" y="500" width="220" height="44" rx="22" fill="#16a34a" opacity="0.15"/>
  <text x="190" y="528"
    font-family="Arial, sans-serif"
    font-size="18"
    fill="#16a34a"
    text-anchor="middle">Belgische KMO-focus</text>

  <!-- URL -->
  <text x="1120" y="590"
    font-family="Arial, sans-serif"
    font-size="20"
    fill="#475569"
    text-anchor="end">botmatic.be</text>
</svg>
