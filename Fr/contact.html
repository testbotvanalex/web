<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Contact — BotMatic</title>
  <meta name="description" content="Contactez-nous pour une démo ou un devis."/>
  <link rel="alternate" hreflang="nl" href="https://www.botmatic.be/nl/contact.html">
  <link rel="alternate" hreflang="en" href="https://www.botmatic.be/en/contact.html">
  <link rel="alternate" hreflang="fr" href="https://www.botmatic.be/fr/contact.html">
  <link rel="alternate" hreflang="x-default" href="https://www.botmatic.be/en/contact.html">
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
<header class="site-header">
  <div class="container row space">
    <a class="logo" href="/fr/"><img src="/assets/logo.svg" alt="BotMatic" height="28"/></a>
    <nav class="nav">
      <a href="/fr/tarifs.html">Tarifs</a>
      <a href="/fr/faq.html">FAQ</a>
      <a href="/fr/contact.html" class="active">Contact</a>
    </nav>
    <div class="lang">
      <a class="btn btn--ghost" href="/">NL</a>
      <a class="btn btn--ghost" href="/fr/contact.html">FR</a>
      <a class="btn btn--ghost" href="/en/contact.html">EN</a>
    </div>
  </div>
</header>

<main class="section">
  <div class="container">
    <h1>Contact</h1>
    <form class="form" name="contact-fr" method="post" data-netlify="true">
      <div class="form-row"><label>Nom<input type="text" name="name" required></label></div>
      <div class="form-row"><label>Email<input type="email" name="email" required></label></div>
      <div class="form-row"><label>Message<textarea name="message" required></textarea></label></div>
      <button class="btn" type="submit">Envoyer</button>
    </form>
  </div>
</main>

<footer class="site-footer"><div class="container row space"><div class="muted tiny">© <span id="y"></span> BotMatic</div></div></footer>
<script>document.getElementById('y').textContent=new Date().getFullYear()</script>

</html>
