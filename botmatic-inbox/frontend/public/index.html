<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BotMatic Inbox</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="app">
      <section id="login-screen" class="screen">
        <div class="auth-card">
          <h1>BotMatic Inbox</h1>
          <p>Sign in to manage your WhatsApp conversations.</p>
          <form id="login-form">
            <label>
              Email
              <input type="email" name="email" required />
            </label>
            <label>
              Password
              <input type="password" name="password" required />
            </label>
            <button type="submit">Sign in</button>
            <p class="hint">Demo login: owner@botmatic.test / demo12345</p>
            <p id="login-error" class="error"></p>
          </form>
        </div>
      </section>

      <section id="dashboard-screen" class="screen hidden">
        <header class="topbar">
          <div>
            <h1>Inbox</h1>
            <p id="company-name"></p>
          </div>
          <button id="logout-button" class="ghost-button">Logout</button>
        </header>

        <main class="layout">
          <aside class="chat-sidebar">
            <div class="sidebar-controls">
              <input
                id="chat-search"
                type="search"
                placeholder="Search by name or phone"
              />
              <div class="filters">
                <button class="filter-button active" data-filter="all">All</button>
                <button class="filter-button" data-filter="open">Open</button>
                <button class="filter-button" data-filter="bot">Bot</button>
                <button class="filter-button" data-filter="human">Human</button>
              </div>
            </div>
            <div id="chat-list" class="chat-list"></div>
          </aside>

          <section class="chat-panel">
            <div id="empty-state" class="empty-state">
              Select a chat to open the conversation.
            </div>

            <div id="chat-view" class="chat-view hidden">
              <header class="chat-header">
                <div>
                  <h2 id="chat-title"></h2>
                  <p id="chat-meta"></p>
                </div>
                <div class="chat-actions">
                  <button id="takeover-button">Take over</button>
                  <button id="release-button" class="ghost-button">
                    Release to bot
                  </button>
                </div>
              </header>

              <div id="message-list" class="message-list"></div>

              <form id="message-form" class="message-form">
                <textarea
                  id="message-input"
                  rows="2"
                  placeholder="Type a reply"
                  required
                ></textarea>
                <button type="submit">Send</button>
              </form>
            </div>
          </section>
        </main>
      </section>
    </div>

    <script src="/app.js" defer></script>
  </body>
  </html>
