<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BotMatic — Flow Constructor</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface2: #1c1c26;
            --border: rgba(255, 255, 255, 0.07);
            --accent: #7c6cfc;
            --accent-glow: rgba(124, 108, 252, 0.15);
            --text: #f0f0f8;
            --muted: #7070a0;
            --grid-size: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            height: 64px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-small {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 18px;
            text-decoration: none;
            color: var(--text);
        }

        .logo-icon-small {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .btn-save {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-save:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        /* Main Area */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
        }

        .sidebar-title {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 800;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 16px;
        }

        .component-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .component-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: grab;
            transition: all 0.2s;
            user-select: none;
        }

        .component-item:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: #23232f;
        }

        .comp-icon {
            font-size: 18px;
        }

        .comp-info h4 {
            font-size: 14px;
            font-weight: 500;
        }

        /* Canvas */
        #canvas {
            flex: 1;
            position: relative;
            background-image:
                radial-gradient(circle, var(--border) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            overflow: hidden;
            cursor: crosshair;
        }

        /* Properties Panel */
        .props-panel {
            width: 320px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            position: absolute;
            right: 0;
            bottom: 0;
            top: 0;
            z-index: 50;
        }

        .props-panel.active {
            transform: translateX(0);
        }

        /* Nodes */
        .node {
            position: absolute;
            width: 220px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            cursor: move;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: border-color 0.2s;
        }

        .node:hover {
            border-color: var(--accent);
        }

        .node-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
        }

        .node-body {
            font-size: 14px;
            line-height: 1.4;
            color: var(--text);
        }

        .port {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            border: 2px solid var(--bg);
        }

        .port-in {
            top: -6px;
        }

        .port-out {
            bottom: -6px;
        }

        /* Connections SVG layer */
        svg#connections {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        path.connection {
            fill: none;
            stroke: var(--accent);
            stroke-width: 2;
            stroke-dasharray: 4;
            animation: dash 20s linear infinite;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: 1000;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="header-left">
            <a href="/dashboard" class="logo-small">
                <div class="logo-icon-small">⚡</div>
                BotMatic
            </a>
            <div style="width:1px; height:24px; background:var(--border);"></div>
            <span id="flowTitle" style="font-size: 14px; font-weight: 500;">Bot Flow Constructor</span>
        </div>
        <div class="header-right" style="display:flex;gap:10px;align-items:center;">
            <a id="backBtn" href="/admin" style="display:none;background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:8px 16px;border-radius:10px;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;text-decoration:none;">← Назад к клиенту</a>
            <button type="button" class="btn-save" id="saveFlow">Опубликовать</button>
        </div>
    </header>

    <div class="main">
        <div class="sidebar">
            <div class="sidebar-title">Building Blocks</div>
            <div class="component-list">
                <div class="component-item" draggable="true" data-type="text">
                    <span class="comp-icon">💬</span>
                    <div class="comp-info">
                        <h4>Text Reply</h4>
                    </div>
                </div>
                <div class="component-item" draggable="true" data-type="buttons">
                    <span class="comp-icon">🔘</span>
                    <div class="comp-info">
                        <h4>Buttons</h4>
                    </div>
                </div>
                <div class="component-item" draggable="true" data-type="media">
                    <span class="comp-icon">🖼️</span>
                    <div class="comp-info">
                        <h4>Media</h4>
                    </div>
                </div>
                <div class="component-item" draggable="true" data-type="input">
                    <span class="comp-icon">⌨️</span>
                    <div class="comp-info">
                        <h4>User Input</h4>
                    </div>
                </div>
                <div class="component-item" draggable="true" data-type="ai">
                    <span class="comp-icon">🧠</span>
                    <div class="comp-info">
                        <h4>AI Agent</h4>
                    </div>
                </div>
            </div>
        </div>

        <div id="canvas">
            <svg id="connections"></svg>
            <!-- Nodes will be injected here -->
        </div>

        <div class="props-panel" id="propsPanel">
            <div class="sidebar-title">Properties</div>
            <div id="propsContent">
                <p style="color:var(--muted); font-size:13px;">Select a block to edit its properties.</p>
            </div>
        </div>
    </div>

    <script>
        // --- ON-SCREEN ERROR LOGGER FOR DEBUGGING ---
        window.onerror = function(message, source, lineno, colno, error) {
            const errDiv = document.createElement('div');
            errDiv.style = "position:fixed; top:10px; left:10px; background:rgba(255,0,0,0.8); color:white; padding:10px; z-index:9999; border-radius:5px; font-family:monospace; max-width:80%; word-wrap:break-word;";
            errDiv.textContent = `Error: ${message} at ${source}:${lineno}:${colno}`;
            document.body.appendChild(errDiv);
            return false;
        };
        window.addEventListener('unhandledrejection', function(event) {
            const errDiv = document.createElement('div');
            errDiv.style = "position:fixed; top:70px; left:10px; background:rgba(255,100,0,0.8); color:white; padding:10px; z-index:9999; border-radius:5px; font-family:monospace; max-width:80%; word-wrap:break-word;";
            errDiv.textContent = `Unhandled Promise Rejection: ${event.reason}`;
            document.body.appendChild(errDiv);
        });
        // --------------------------------------------
    </script>
    <script>
        const canvas = document.getElementById('canvas');
        let nodes = [];
        let connections = [];
        let isDragging = false;
        let activeNode = null;
        let dragOffset = { x: 0, y: 0 };
        let activeLink = null; // Currently dragging line

        const svg = document.getElementById('connections');

        // SVG Connection Helper
        function getPortPos(nodeId, type, portId) {
            const el = document.getElementById(nodeId);
            const selector = portId ? `.port[data-port-id="${portId}"]` : `.port-${type}`;
            const port = el.querySelector(selector);
            const rect = port.getBoundingClientRect();
            const crect = canvas.getBoundingClientRect();
            return {
                x: rect.left + rect.width / 2 - crect.left,
                y: rect.top + rect.height / 2 - crect.top
            };
        }

        function drawBezier(x1, y1, x2, y2) {
            const dx = Math.abs(x1 - x2) * 0.5;
            return `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`;
        }

        function updateConnections() {
            svg.innerHTML = '';
            connections.forEach(conn => {
                const p1 = getPortPos(conn.from, 'out', conn.fromPort);
                const p2 = getPortPos(conn.to, 'in', conn.toPort);
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', drawBezier(p1.x, p1.y, p2.x, p2.y));
                path.setAttribute('class', 'connection');
                svg.appendChild(path);
            });

            if (activeLink) {
                const p1 = getPortPos(activeLink.from, 'out', activeLink.fromPort);
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', drawBezier(p1.x, p1.y, activeLink.tx, activeLink.ty));
                path.setAttribute('class', 'connection');
                path.style.opacity = '0.5';
                svg.appendChild(path);
            }
        }

        // Simple Node Creation
        function createNode(type, x, y) {
            const id = 'node_' + Date.now();
            const node = {
                id,
                type,
                x,
                y,
                data: {
                    text: type === 'ai' ? 'Hello! I am your AI assistant.' : 'Hello! This is a ' + type + ' message.',
                    buttons: type === 'buttons' ? [{ id: 'opt1', text: 'Option 1' }] : [],
                    mediaUrl: type === 'media' ? 'https://via.placeholder.com/150' : ''
                }
            };
            nodes.push(node);
            renderNode(node);
        }

        function showProperties(node) {
            const panel = document.getElementById('propsPanel');
            const content = document.getElementById('propsContent');
            panel.classList.add('active');

            let html = `
      <div style="margin-bottom:20px;">
        <label style="display:block; font-size:12px; color:var(--muted); margin-bottom:8px;">Block ID</label>
        <code style="background:var(--surface2); padding:4px 8px; border-radius:6px; font-size:12px;">${node.id}</code>
      </div>
      <div style="margin-bottom:20px;">
        <label style="display:block; font-size:12px; color:var(--muted); margin-bottom:8px;">Message Content</label>
        <textarea id="propText" style="width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px; color:var(--text); font-family:inherit; min-height:100px;">${node.data.text}</textarea>
      </div>
    `;

            if (node.type === 'buttons') {
                html += `
        <div style="margin-bottom:20px;">
          <label style="display:block; font-size:12px; color:var(--muted); margin-bottom:8px;">Buttons</label>
          <div id="btnList">
            ${node.data.buttons.map((b, i) => `
              <div style="display:flex; gap:8px; margin-bottom:8px;">
                <input type="text" value="${b.text}" data-index="${i}" class="btn-input" style="background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:6px 10px; color:var(--text); flex:1;">
                <button class="btn-remove" data-index="${i}" style="background:none; border:none; color:#ff4d4d; cursor:pointer;">✕</button>
              </div>
            `).join('')}
          </div>
          <button id="addBtn" style="width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--muted); padding:8px; border-radius:8px; font-size:12px; cursor:pointer; margin-top:8px;">+ Add Button</button>
        </div>
      `;
            }

            if (node.type === 'media') {
                html += `
        <div style="margin-bottom:20px;">
          <label style="display:block; font-size:12px; color:var(--muted); margin-bottom:8px;">Media URL (Image/Video)</label>
          <input type="text" id="propMedia" value="${node.data.mediaUrl}" style="width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px; color:var(--text); font-family:inherit;">
        </div>
      `;
            }

            content.innerHTML = html;

            // Live update
            const propTextEl = document.getElementById('propText');
            if (propTextEl) {
                propTextEl.oninput = (e) => {
                    node.data.text = e.target.value;
                    const nodeBody = document.querySelector(`#${node.id} .node-body`);
                    if (nodeBody) nodeBody.textContent = e.target.value;
                };
            }

            if (node.type === 'buttons') {
                const addBtnEl = document.getElementById('addBtn');
                if (addBtnEl) {
                    addBtnEl.onclick = () => {
                        const newId = 'opt' + Date.now();
                        node.data.buttons.push({ id: newId, text: 'New Button' });
                        showProperties(node);
                        renderNodes(); // Refresh all nodes to show new ports
                    };
                }

                document.querySelectorAll('.btn-input').forEach(input => {
                    input.oninput = (e) => {
                        const idx = e.target.dataset.index;
                        node.data.buttons[idx].text = e.target.value;
                        renderNodes();
                    };
                });

                document.querySelectorAll('.btn-remove').forEach(btn => {
                    btn.onclick = (e) => {
                        const idx = e.target.dataset.index;
                        const btnId = node.data.buttons[idx].id;
                        node.data.buttons.splice(idx, 1);
                        connections = connections.filter(c => !(c.from === node.id && c.fromPort === btnId));
                        showProperties(node);
                        renderNodes();
                    };
                });
            }

            if (node.type === 'media') {
                const propMediaEl = document.getElementById('propMedia');
                if (propMediaEl) {
                    propMediaEl.oninput = (e) => {
                        node.data.mediaUrl = e.target.value;
                        renderNodes();
                    };
                }
            }
        }

        function renderNodes() {
            const canvasNodes = canvas.querySelectorAll('.node');
            canvasNodes.forEach(n => n.remove());
            nodes.forEach(renderNode);
            updateConnections();
        }

        function renderNode(node) {
            const div = document.createElement('div');
            div.className = 'node';
            div.id = node.id;
            div.style.left = node.x + 'px';
            div.style.top = node.y + 'px';

            let bodyHtml = `<div class="node-body">${node.data.text}</div>`;
            let portsHtml = `<div class="port port-in"></div>`;

            if (node.type === 'buttons') {
                bodyHtml = `
                    <div class="node-body" style="margin-bottom:10px;">${node.data.text}</div>
                    <div class="node-buttons" style="display:flex; flex-direction:column; gap:6px;">
                        ${node.data.buttons.map(b => `
                            <div style="position:relative; background:rgba(255,255,255,0.05); padding:6px 10px; border-radius:6px; font-size:12px; text-align:center; border:1px solid var(--border);">
                                ${b.text}
                                <div class="port port-out" data-port-id="${b.id}" style="right:-15px; top:50%; transform:translateY(-50%); left:auto;"></div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if (node.type === 'media') {
                bodyHtml = `
                    <div class="node-body" style="margin-bottom:10px;">${node.data.text}</div>
                    <div style="width:100%; height:80px; background:var(--surface2); border-radius:8px; overflow:hidden; border:1px solid var(--border);">
                        <img src="${node.data.mediaUrl}" style="width:100%; height:100%; object-fit:cover;" onerror="this.src='https://via.placeholder.com/150?text=No+Media'">
                    </div>
                `;
                portsHtml += `<div class="port port-out"></div>`;
            } else {
                portsHtml += `<div class="port port-out"></div>`;
            }

            div.innerHTML = `
                ${portsHtml}
                <div class="node-header">${node.type.toUpperCase()} BLOCK</div>
                ${bodyHtml}
            `;

            div.addEventListener('mousedown', (e) => {
                if (e.target.classList.contains('port')) return;

                document.querySelectorAll('.node').forEach(n => n.style.borderColor = '');
                div.style.borderColor = 'var(--accent)';

                isDragging = true;
                activeNode = node;
                dragOffset.x = e.clientX - div.offsetLeft;
                dragOffset.y = e.clientY - div.offsetTop;

                showProperties(node);
            });

            // Port handling
            div.querySelectorAll('.port-out').forEach(port => {
                port.addEventListener('mousedown', (e) => {
                    e.stopPropagation();
                    const crect = canvas.getBoundingClientRect();
                    const portId = port.dataset.portId || null;
                    activeLink = { from: node.id, fromPort: portId, tx: e.clientX - crect.left, ty: e.clientY - crect.top };
                });
            });

            const portIn = div.querySelector('.port-in');
            portIn.addEventListener('mouseup', (e) => {
                if (activeLink && activeLink.from !== node.id) {
                    // Remove existing connection from the same port if it's a single-output port
                    if (activeLink.fromPort) {
                        connections = connections.filter(c => !(c.from === activeLink.from && c.fromPort === activeLink.fromPort));
                    } else {
                        connections = connections.filter(c => !(c.from === activeLink.from && !c.fromPort));
                    }

                    connections.push({
                        from: activeLink.from,
                        fromPort: activeLink.fromPort,
                        to: node.id
                    });
                    activeLink = null;
                    updateConnections();
                }
            });

            canvas.appendChild(div);
        }

        document.addEventListener('mousemove', (e) => {
            const crect = canvas.getBoundingClientRect();
            if (isDragging && activeNode) {
                const div = document.getElementById(activeNode.id);
                activeNode.x = e.clientX - dragOffset.x;
                activeNode.y = e.clientY - dragOffset.y;
                div.style.left = activeNode.x + 'px';
                div.style.top = activeNode.y + 'px';
                updateConnections();
            }

            if (activeLink) {
                activeLink.tx = e.clientX - crect.left;
                activeLink.ty = e.clientY - crect.top;
                updateConnections();
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            activeLink = null;
            updateConnections();
        });

        // Drag and Drop from Sidebar
        canvas.addEventListener('dragover', e => e.preventDefault());
        canvas.addEventListener('drop', e => {
            const type = e.dataTransfer.getData('text/plain');
            if (type) {
                const rect = canvas.getBoundingClientRect();
                createNode(type, e.clientX - rect.left - 110, e.clientY - rect.top - 40);
            }
        });

        document.querySelectorAll('.component-item').forEach(item => {
            item.addEventListener('dragstart', e => {
                e.dataTransfer.setData('text/plain', item.dataset.type);
            });
        });

        // ── Init ──────────────────────────────────────────────────────────────────
        const urlParams = new URLSearchParams(window.location.search);
        const BOT_ID    = urlParams.get('botId') || null;
        const CLIENT_ID = urlParams.get('clientId') || null;
        const flowKey   = 'flow_' + (BOT_ID || 'main');

        // Back button
        if (CLIENT_ID) {
            const btn = document.getElementById('backBtn');
            btn.href = `/admin/client?id=${CLIENT_ID}`;
            btn.style.display = 'inline-flex';
        }

        // ── Local helpers ─────────────────────────────────────────────────────────
        function getFlowData() {
            return {
                nodes: nodes.map(n => ({ id: n.id, type: n.type, data: n.data, x: n.x, y: n.y })),
                connections
            };
        }

        function applyFlowData(data) {
            nodes = [];
            connections = data.connections || [];
            (data.nodes || []).forEach(n => { nodes.push(n); renderNode(n); });
            updateConnections();
        }

        function saveLocal() {
            localStorage.setItem(flowKey, JSON.stringify(getFlowData()));
        }

        function loadLocal() {
            try {
                const raw = localStorage.getItem(flowKey);
                if (!raw) return false;
                applyFlowData(JSON.parse(raw));
                return true;
            } catch { return false; }
        }

        // ── API save/load (only when botId provided) ──────────────────────────────
        async function saveToApi() {
            if (!BOT_ID) return false;
            try {
                const r = await fetch(`/api/admin/bots/${BOT_ID}/flow`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ flow: getFlowData() })
                });
                return (await r.json()).ok;
            } catch { return false; }
        }

        async function loadFromApi() {
            if (!BOT_ID) return false;
            try {
                const r = await fetch(`/api/admin/bots/${BOT_ID}/flow`);
                const j = await r.json();
                if (j.ok && j.flow) { applyFlowData(j.flow); return true; }
                return false;
            } catch { return false; }
        }

        // ── Publish button ────────────────────────────────────────────────────────
        document.getElementById('saveFlow').addEventListener('click', async () => {
            const btn = document.getElementById('saveFlow');
            btn.textContent = '...';
            btn.disabled = true;
            saveLocal();
            const apiOk = await saveToApi();
            btn.textContent = apiOk ? '✓ Сохранён в БД' : '✓ Сохранён локально';
            btn.style.background = '#059669';
            setTimeout(() => { btn.textContent = 'Опубликовать'; btn.style.background = ''; btn.disabled = false; }, 2000);
        });

        // Auto-save locally on every mouseup (drag/connect)
        canvas.addEventListener('mouseup', () => { if (nodes.length) saveLocal(); });

        // ── Startup: API first, then localStorage, else default ───────────────────
        (async () => {
            if (BOT_ID) {
                // Update title with bot name if possible
                try {
                    const r = await fetch(`/api/admin/clients/${CLIENT_ID || '_'}/bots`).catch(()=>null);
                    // simpler: just show botId
                    document.getElementById('flowTitle').textContent = `Flow: ${BOT_ID.slice(0,12)}…`;
                } catch {}
            }
            const loaded = await loadFromApi();
            if (!loaded && !loadLocal()) createNode('text', 300, 150);
        })();
    </script>
