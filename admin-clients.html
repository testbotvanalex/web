<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BotMatic</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #18181f;
      --surface2: #22222c;
      --surface3: #2a2a36;
      --border: rgba(255,255,255,0.07);
      --accent: #7c6cfc;
      --accent-soft: rgba(124,108,252,0.15);
      --text: #f0f0f5;
      --muted: #6b6b80;
      --green: #22c55e;
      --yellow: #f59e0b;
      --red: #ef4444;
      --blue: #3b82f6;
      --wa: #25d366;
      --tg: #2aabee;
      --ig: #e1306c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; display: flex; }

    /* ── LEFT SIDEBAR ── */
    .sidebar {
      width: 260px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      height: 100vh;
    }
    .sidebar-logo {
      padding: 20px 18px 16px;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px;
      background: linear-gradient(135deg, #7c6cfc, #db2777);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .client-list {
      flex: 1; overflow-y: auto; padding: 10px 8px;
    }
    .client-list::-webkit-scrollbar { width: 4px; }
    .client-list::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

    .section-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
      color: var(--muted); padding: 8px 10px 4px; font-weight: 600;
    }

    .client-card {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 10px; border-radius: 10px;
      cursor: pointer; transition: all .15s;
      margin-bottom: 2px; border: 1px solid transparent;
    }
    .client-card:hover { background: var(--surface2); }
    .client-card.active {
      background: var(--accent-soft);
      border-color: rgba(124,108,252,0.3);
    }
    .client-avatar {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #db2777);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; flex-shrink: 0;
      font-family: 'Syne', sans-serif;
    }
    .client-avatar.demo { background: linear-gradient(135deg, #7c6cfc, #3b82f6); }
    .client-avatar.green { background: linear-gradient(135deg, #059669, #22c55e); }
    .client-avatar.orange { background: linear-gradient(135deg, #d97706, #f59e0b); }
    .client-info { flex: 1; min-width: 0; }
    .client-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .client-channels { display: flex; gap: 4px; margin-top: 3px; }
    .ch-badge {
      font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: .3px;
    }
    .ch-badge.wa { background: rgba(37,211,102,.15); color: var(--wa); }
    .ch-badge.tg { background: rgba(42,171,238,.15); color: var(--tg); }
    .ch-badge.ig { background: rgba(225,48,108,.15); color: var(--ig); }
    .ch-badge.off { background: var(--surface3); color: var(--muted); }

    .client-unread {
      background: var(--accent); color: white;
      font-size: 10px; font-weight: 700;
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .add-client-btn {
      margin: 0 8px 8px; padding: 10px;
      border: 1px dashed var(--border); border-radius: 10px;
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; color: var(--muted); font-size: 13px;
      transition: all .15s; background: none;
      width: calc(100% - 16px);
    }
    .add-client-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

    /* ── MAIN AREA ── */
    .main {
      flex: 1; display: flex; flex-direction: column;
      height: 100vh; overflow: hidden;
    }

    /* Empty state */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--muted); gap: 12px;
    }
    .empty-state svg { opacity: .3; }
    .empty-state h2 { font-family: 'Syne', sans-serif; font-size: 18px; color: var(--text); opacity: .4; }
    .empty-state p { font-size: 13px; }

    /* Client header */
    .client-header {
      padding: 16px 24px; border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
      display: flex; align-items: center; gap: 14px;
    }
    .client-header-avatar {
      width: 42px; height: 42px; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #db2777);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px; font-family: 'Syne', sans-serif;
    }
    .client-header-info { flex: 1; }
    .client-header-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; }
    .client-header-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .client-header-channels { display: flex; gap: 6px; }
    .ch-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1px solid transparent;
    }
    .ch-pill.wa { background: rgba(37,211,102,.1); color: var(--wa); border-color: rgba(37,211,102,.2); }
    .ch-pill.tg { background: rgba(42,171,238,.1); color: var(--tg); border-color: rgba(42,171,238,.2); }
    .ch-pill.ig { background: rgba(225,48,108,.1); color: var(--ig); border-color: rgba(225,48,108,.2); }
    .ch-pill.off { background: var(--surface2); color: var(--muted); border-color: var(--border); }
    .ch-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    /* Tabs */
    .tabs {
      display: flex; gap: 0; border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0; padding: 0 24px;
    }
    .tab {
      padding: 12px 16px; font-size: 13px; font-weight: 500;
      color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
      transition: all .15s; display: flex; align-items: center; gap: 6px;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Tab content */
    .tab-content { flex: 1; overflow-y: auto; display: none; }
    .tab-content.active { display: flex; flex-direction: column; }
    .tab-content::-webkit-scrollbar { width: 4px; }
    .tab-content::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

    /* ── INBOX TAB ── */
    .inbox-layout { display: flex; flex: 1; overflow: hidden; }
    .chat-list { width: 300px; flex-shrink: 0; border-right: 1px solid var(--border); overflow-y: auto; }
    .chat-list::-webkit-scrollbar { width: 3px; }
    .chat-list::-webkit-scrollbar-thumb { background: var(--surface3); }
    .chat-item {
      padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border);
      transition: background .1s; display: flex; gap: 10px; align-items: flex-start;
    }
    .chat-item:hover { background: var(--surface2); }
    .chat-item.active { background: var(--accent-soft); }
    .chat-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--surface3); display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0; font-weight: 600;
    }
    .chat-info { flex: 1; min-width: 0; }
    .chat-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-preview { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .chat-meta { flex-shrink: 0; text-align: right; }
    .chat-time { font-size: 11px; color: var(--muted); }
    .chat-ch { font-size: 10px; font-weight: 700; margin-top: 3px; }
    .chat-ch.wa { color: var(--wa); }
    .chat-ch.tg { color: var(--tg); }
    .chat-ch.ig { color: var(--ig); }
    .chat-unread {
      background: var(--accent); color: white; font-size: 10px; font-weight: 700;
      padding: 1px 6px; border-radius: 10px; margin-top: 3px; display: inline-block;
    }

    .messages-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .messages-header {
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      background: var(--surface); display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .messages-header-name { font-weight: 600; font-size: 14px; }
    .messages-header-meta { font-size: 12px; color: var(--muted); }
    .messages-list { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
    .messages-list::-webkit-scrollbar { width: 3px; }
    .messages-list::-webkit-scrollbar-thumb { background: var(--surface3); }
    .msg { display: flex; gap: 8px; max-width: 75%; }
    .msg.out { align-self: flex-end; flex-direction: row-reverse; }
    .msg-bubble {
      padding: 9px 13px; border-radius: 12px;
      font-size: 13px; line-height: 1.5;
      background: var(--surface2); border: 1px solid var(--border);
    }
    .msg.out .msg-bubble { background: var(--accent-soft); border-color: rgba(124,108,252,.3); }
    .msg-time { font-size: 10px; color: var(--muted); margin-top: 4px; padding: 0 4px; align-self: flex-end; }
    .msg-input-area {
      padding: 12px 16px; border-top: 1px solid var(--border);
      background: var(--surface); display: flex; gap: 10px; flex-shrink: 0;
    }
    .msg-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; color: var(--text);
      font-family: inherit; font-size: 13px; resize: none; outline: none;
      transition: border-color .15s;
    }
    .msg-input:focus { border-color: var(--accent); }
    .msg-send-btn {
      background: var(--accent); color: white; border: none; border-radius: 10px;
      padding: 0 16px; cursor: pointer; font-size: 13px; font-weight: 600;
      font-family: inherit; transition: opacity .15s;
    }
    .msg-send-btn:hover { opacity: .85; }

    .no-chat {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--muted); flex-direction: column; gap: 8px;
    }

    /* ── BOT TAB ── */
    .bot-form { padding: 24px; max-width: 720px; display: flex; flex-direction: column; gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .form-textarea {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px; color: var(--text);
      font-family: inherit; font-size: 13px; resize: vertical; outline: none;
      min-height: 120px; transition: border-color .15s; line-height: 1.6;
    }
    .form-textarea:focus { border-color: var(--accent); }
    .form-input {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; color: var(--text);
      font-family: inherit; font-size: 13px; outline: none; transition: border-color .15s;
    }
    .form-input:focus { border-color: var(--accent); }
    .save-btn {
      background: var(--accent); color: white; border: none; border-radius: 10px;
      padding: 11px 22px; cursor: pointer; font-size: 13px; font-weight: 600;
      font-family: inherit; align-self: flex-start; transition: opacity .15s;
    }
    .save-btn:hover { opacity: .85; }
    .save-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── CHANNELS TAB ── */
    .channels-grid { padding: 24px; display: flex; flex-direction: column; gap: 16px; max-width: 600px; }
    .channel-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 20px;
      display: flex; align-items: center; gap: 16px;
    }
    .channel-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center; font-size: 20px;
      flex-shrink: 0;
    }
    .channel-icon.wa { background: rgba(37,211,102,.1); }
    .channel-icon.tg { background: rgba(42,171,238,.1); }
    .channel-icon.ig { background: rgba(225,48,108,.1); }
    .channel-info { flex: 1; }
    .channel-title { font-weight: 600; font-size: 14px; }
    .channel-status { font-size: 12px; margin-top: 3px; }
    .channel-status.connected { color: var(--green); }
    .channel-status.disconnected { color: var(--muted); }
    .channel-btn {
      padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: all .15s; border: 1px solid;
    }
    .channel-btn.connect { background: var(--accent); color: white; border-color: var(--accent); }
    .channel-btn.connect:hover { opacity: .85; }
    .channel-btn.disconnect { background: transparent; color: var(--red); border-color: rgba(239,68,68,.3); }
    .channel-btn.disconnect:hover { background: rgba(239,68,68,.1); }
    .channel-btn.copy { background: var(--surface3); color: var(--text); border-color: var(--border); }
    .channel-btn.copy:hover { border-color: var(--accent); color: var(--accent); }

    /* ── SETTINGS TAB ── */
    .settings-form { padding: 24px; max-width: 500px; display: flex; flex-direction: column; gap: 18px; }
    .status-select {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; color: var(--text);
      font-family: inherit; font-size: 13px; outline: none;
      cursor: pointer; transition: border-color .15s;
    }
    .status-select:focus { border-color: var(--accent); }

    /* ── ADD CLIENT MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.6);
      display: none; align-items: center; justify-content: center; z-index: 100;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px; width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
    .btn-ghost {
      padding: 9px 18px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--text); cursor: pointer;
      font-family: inherit; font-size: 13px; transition: all .15s;
    }
    .btn-ghost:hover { border-color: var(--accent); }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 18px; font-size: 13px;
      box-shadow: 0 8px 24px rgba(0,0,0,.3); z-index: 200;
      transform: translateY(80px); opacity: 0; transition: all .3s;
      display: flex; align-items: center; gap: 8px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(34,197,94,.3); }
    .toast.error { border-color: rgba(239,68,68,.3); }

    .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>

<!-- LEFT SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-logo">BotMatic</div>
  <div class="client-list" id="clientList">
    <div class="loading">Загрузка...</div>
  </div>
  <button class="add-client-btn" onclick="openAddModal()">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    Новый клиент
  </button>
</div>

<!-- MAIN AREA -->
<div class="main" id="mainArea">
  <div class="empty-state">
    <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
    <h2>Выбери клиента</h2>
    <p>Кликни на клиента слева чтобы открыть</p>
  </div>
</div>

<!-- ADD CLIENT MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-title">Новый клиент</div>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div class="form-group">
        <div class="form-label">Название компании</div>
        <input class="form-input" id="newClientName" placeholder="Dock KZ" />
      </div>
      <div class="form-group">
        <div class="form-label">Ниша</div>
        <input class="form-input" id="newClientNiche" placeholder="Нотариус, ресторан, магазин..." />
      </div>
      <div class="form-group">
        <div class="form-label">Контакт (имя или телефон)</div>
        <input class="form-input" id="newClientContact" placeholder="+7 777 123 45 67" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeAddModal()">Отмена</button>
      <button class="save-btn" onclick="createClient()">Создать</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  const API = '/api/admin';
  let clients = [];
  let activeClient = null;
  let activeTab = 'inbox';
  let chats = [];
  let activeChat = null;

  // ── COLORS FOR AVATARS ──
  const avatarColors = ['demo', 'green', 'orange', ''];
  function getAvatarClass(id) {
    const classes = ['demo', 'green', 'orange', ''];
    let hash = 0;
    for (let c of (id || '')) hash = (hash * 31 + c.charCodeAt(0)) % classes.length;
    return classes[hash];
  }
  function getInitials(name) {
    return (name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  }

  // ── CHANNEL ICONS ──
  const chIcon = { wa: '💬', tg: '✈️', ig: '📸', messenger: '💬' };
  const chLabel = { wa: 'WA', tg: 'TG', ig: 'IG', messenger: 'FB' };

  // ── TOAST ──
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
    el.className = `toast show ${type}`;
    setTimeout(() => el.className = 'toast', 3000);
  }

  // ── LOAD CLIENTS ──
  async function loadClients() {
    const r = await fetch(`${API}/clients`);
    const data = await r.json();
    clients = data.clients || data;
    renderClientList();
  }

  function clientChannels(c) { return c._channels || c.channels || []; }
  function clientName(c) { return c.company || c.company_name || '?'; }

  function renderClientList() {
    const el = document.getElementById('clientList');
    if (!clients.length) {
      el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">Нет клиентов</div>';
      return;
    }
    el.innerHTML = clients.map(c => {
      const channels = clientChannels(c);
      const hasWa = channels.find(ch => ch.type === 'whatsapp' && ch.status === 'active');
      const hasTg = channels.find(ch => ch.type === 'telegram' && ch.status === 'active');
      const hasIg = channels.find(ch => ch.type === 'instagram' && ch.status === 'active');
      const isActive = activeClient?.id === c.id;
      return `<div class="client-card ${isActive ? 'active' : ''}" onclick="selectClient('${c.id}')">
        <div class="client-avatar ${getAvatarClass(c.id)}">${getInitials(clientName(c))}</div>
        <div class="client-info">
          <div class="client-name">${clientName(c)}</div>
          <div class="client-channels">
            ${hasWa ? '<span class="ch-badge wa">WA</span>' : ''}
            ${hasTg ? '<span class="ch-badge tg">TG</span>' : ''}
            ${hasIg ? '<span class="ch-badge ig">IG</span>' : ''}
            ${!hasWa && !hasTg && !hasIg ? '<span class="ch-badge off">нет каналов</span>' : ''}
          </div>
        </div>
        ${c.unread_count ? `<div class="client-unread">${c.unread_count}</div>` : ''}
      </div>`;
    }).join('');
  }

  // ── SELECT CLIENT ──
  async function selectClient(id) {
    const r = await fetch(`${API}/clients/${id}`);
    const data = await r.json();
    // API returns { client, bots, channels, ... } OR just the client object
    activeClient = data.client || data;
    activeClient._channels = data.channels || activeClient.channels || [];
    activeClient._bots = data.bots || [];
    activeTab = 'inbox';
    renderClientList();
    renderMain();
    loadInbox();
  }

  // ── RENDER MAIN ──
  function renderMain() {
    if (!activeClient) return;
    const c = activeClient;
    const channels = clientChannels(c);
    const hasWa = channels.find(ch => ch.type === 'whatsapp' && ch.status === 'active');
    const hasTg = channels.find(ch => ch.type === 'telegram' && ch.status === 'active');
    const hasIg = channels.find(ch => ch.type === 'instagram' && ch.status === 'active');

    document.getElementById('mainArea').innerHTML = `
      <div class="client-header">
        <div class="client-header-avatar ${getAvatarClass(c.id)}" style="background:linear-gradient(135deg,var(--accent),#db2777)">${getInitials(clientName(c))}</div>
        <div class="client-header-info">
          <div class="client-header-name">${clientName(c)}</div>
          <div class="client-header-meta">${c.niche || ''} ${c.contact_name ? '· ' + c.contact_name : ''}</div>
        </div>
        <div class="client-header-channels">
          <div class="ch-pill ${hasWa ? 'wa' : 'off'}"><div class="ch-dot"></div>WhatsApp</div>
          <div class="ch-pill ${hasTg ? 'tg' : 'off'}"><div class="ch-dot"></div>Telegram</div>
          <div class="ch-pill ${hasIg ? 'ig' : 'off'}"><div class="ch-dot"></div>Instagram</div>
        </div>
      </div>
      <div class="tabs">
        <div class="tab ${activeTab==='inbox'?'active':''}" data-tab="inbox" onclick="switchTab('inbox')">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
          Инбокс
        </div>
        <div class="tab ${activeTab==='bot'?'active':''}" data-tab="bot" onclick="switchTab('bot')">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
          Бот
        </div>
        <div class="tab ${activeTab==='channels'?'active':''}" data-tab="channels" onclick="switchTab('channels')">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"/></svg>
          Каналы
        </div>
        <div class="tab ${activeTab==='settings'?'active':''}" data-tab="settings" onclick="switchTab('settings')">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          Настройки
        </div>
      </div>
      <div class="tab-content ${activeTab==='inbox'?'active':''}" id="tab-inbox"></div>
      <div class="tab-content ${activeTab==='bot'?'active':''}" id="tab-bot"></div>
      <div class="tab-content ${activeTab==='channels'?'active':''}" id="tab-channels"></div>
      <div class="tab-content ${activeTab==='settings'?'active':''}" id="tab-settings"></div>
    `;

    if (activeTab === 'bot') loadBot();
    if (activeTab === 'channels') loadChannels();
    if (activeTab === 'settings') loadSettings();
  }

  function switchTab(tab) {
    activeTab = tab;
    activeChat = null;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab[data-tab="${tab}"]`)?.classList.add('active');
    document.getElementById(`tab-${tab}`)?.classList.add('active');
    if (tab === 'inbox') loadInbox();
    if (tab === 'bot') loadBot();
    if (tab === 'channels') loadChannels();
    if (tab === 'settings') loadSettings();
  }

  // ── INBOX ──
  async function loadInbox() {
    const el = document.getElementById('tab-inbox');
    if (!el) return;
    el.innerHTML = '<div class="loading">Загрузка чатов...</div>';
    const r = await fetch(`${API}/chats?client_id=${activeClient.id}`);
    chats = await r.json();
    renderInbox();
  }

  function renderInbox() {
    const el = document.getElementById('tab-inbox');
    if (!el) return;
    el.innerHTML = `<div class="inbox-layout">
      <div class="chat-list" id="chatList">${renderChatList()}</div>
      <div class="messages-area" id="messagesArea">
        <div class="no-chat">
          <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
          <span style="font-size:13px;color:var(--muted)">Выбери чат</span>
        </div>
      </div>
    </div>`;
  }

  function renderChatList() {
    if (!chats.length) return '<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">Нет диалогов</div>';
    return chats.map(ch => {
      const channel = ch.channel || 'wa';
      const name = ch.sender_name || ch.sender_id || 'Пользователь';
      const preview = ch.last_message || '...';
      const time = ch.last_at ? new Date(ch.last_at).toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit'}) : '';
      return `<div class="chat-item ${activeChat?.id === ch.id ? 'active' : ''}" onclick="openChat('${ch.id}')">
        <div class="chat-avatar">${name[0]?.toUpperCase() || '?'}</div>
        <div class="chat-info">
          <div class="chat-name">${name}</div>
          <div class="chat-preview">${preview}</div>
        </div>
        <div class="chat-meta">
          <div class="chat-time">${time}</div>
          <div class="chat-ch ${channel}">${chLabel[channel] || channel.toUpperCase()}</div>
          ${ch.unread_count ? `<div class="chat-unread">${ch.unread_count}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  async function openChat(chatId) {
    activeChat = chats.find(c => c.id === chatId);
    document.getElementById('chatList').innerHTML = renderChatList();
    const area = document.getElementById('messagesArea');
    area.innerHTML = '<div class="loading">Загрузка...</div>';
    const r = await fetch(`${API}/chats/${chatId}/messages`);
    const msgs = await r.json();
    const name = activeChat?.sender_name || activeChat?.sender_id || 'Пользователь';
    const ch = activeChat?.channel || 'wa';
    area.innerHTML = `
      <div class="messages-header">
        <div class="chat-avatar" style="width:32px;height:32px;font-size:12px">${name[0]?.toUpperCase() || '?'}</div>
        <div>
          <div class="messages-header-name">${name}</div>
          <div class="messages-header-meta">${chLabel[ch] || ch} · ${activeChat?.sender_id || ''}</div>
        </div>
      </div>
      <div class="messages-list" id="msgList">
        ${msgs.map(m => `<div class="msg ${m.direction === 'out' ? 'out' : ''}">
          <div class="msg-bubble">${m.text || ''}</div>
          <div class="msg-time">${new Date(m.created_at || m.ts || 0).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'})}</div>
        </div>`).join('')}
      </div>
      <div class="msg-input-area">
        <textarea class="msg-input" id="msgInput" rows="2" placeholder="Написать сообщение..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
        <button class="msg-send-btn" onclick="sendMsg()">Отправить</button>
      </div>`;
    const list = document.getElementById('msgList');
    if (list) list.scrollTop = list.scrollHeight;
  }

  async function sendMsg() {
    const input = document.getElementById('msgInput');
    const text = input?.value?.trim();
    if (!text || !activeChat) return;
    input.value = '';
    await fetch(`${API}/send-message`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ chat_id: activeChat.id, text, client_id: activeClient.id })
    });
    await openChat(activeChat.id);
  }

  // ── BOT ──
  async function loadBot() {
    const el = document.getElementById('tab-bot');
    if (!el) return;
    el.innerHTML = '<div class="loading">Загрузка...</div>';
    const r = await fetch(`${API}/clients/${activeClient.id}/bots`);
    const bots = await r.json();
    const bot = Array.isArray(bots) ? bots[0] : bots;
    if (!bot) {
      el.innerHTML = '<div class="loading">Бот не найден</div>';
      return;
    }
    el.innerHTML = `<div class="bot-form">
      <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:16px">Настройки бота</div>
      <div class="form-group">
        <div class="form-label">Системный промпт</div>
        <textarea class="form-textarea" id="botPrompt" rows="8" placeholder="Ты — ИИ-ассистент компании...">${bot.prompt || ''}</textarea>
      </div>
      <div class="form-group">
        <div class="form-label">База знаний</div>
        <textarea class="form-textarea" id="botKnowledge" rows="6" placeholder="Часы работы, цены, контакты...">${bot.knowledge_base || ''}</textarea>
      </div>
      <button class="save-btn" id="saveBotBtn" onclick="saveBot('${bot.id}')">Сохранить</button>
    </div>`;
  }

  async function saveBot(botId) {
    const btn = document.getElementById('saveBotBtn');
    btn.disabled = true; btn.textContent = 'Сохраняю...';
    const r = await fetch(`${API}/bots/${botId}`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        prompt: document.getElementById('botPrompt').value,
        knowledge_base: document.getElementById('botKnowledge').value
      })
    });
    btn.disabled = false; btn.textContent = 'Сохранить';
    if (r.ok) toast('Бот сохранён');
    else toast('Ошибка сохранения', 'error');
  }

  // ── CHANNELS ──
  async function loadChannels() {
    const el = document.getElementById('tab-channels');
    if (!el) return;
    el.innerHTML = '<div class="loading">Загрузка...</div>';
    const r = await fetch(`${API}/clients/${activeClient.id}/channels`);
    const data = await r.json();
    const channels = data.channels || data;

    const types = [
      { type: 'whatsapp', label: 'WhatsApp', cls: 'wa', icon: '💬' },
      { type: 'telegram', label: 'Telegram', cls: 'tg', icon: '✈️' },
      { type: 'instagram', label: 'Instagram', cls: 'ig', icon: '📸' },
    ];

    el.innerHTML = `<div class="channels-grid">
      <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:16px">Каналы</div>
      ${types.map(t => {
        const ch = channels.find(c => c.type === t.type);
        const connected = ch?.status === 'connected' || ch?.status === 'active';
        const connectUrl = t.type === 'whatsapp'
          ? `/whatsapp-connect?client_id=${activeClient.id}`
          : `/auth/${t.type}/connect?client_id=${activeClient.id}`;
        return `<div class="channel-card">
          <div class="channel-icon ${t.cls}">${t.icon}</div>
          <div class="channel-info">
            <div class="channel-title">${t.label}</div>
            <div class="channel-status ${connected ? 'connected' : 'disconnected'}">
              ${connected ? '● Подключено' + (ch.page_name ? ' · ' + ch.page_name : '') : '○ Не подключено'}
            </div>
          </div>
          <div style="display:flex;gap:8px">
            ${connected
              ? `<button class="channel-btn copy" onclick="copyLink('${connectUrl}')">Ссылка</button>
                 <button class="channel-btn disconnect" onclick="disconnectChannel('${ch.id}')">Отключить</button>`
              : `<button class="channel-btn copy" onclick="copyLink(window.location.origin+'${connectUrl}')">📋 Скопировать ссылку</button>
                 <button class="channel-btn connect" onclick="${t.type === 'whatsapp' ? 'connectWhatsApp()' : `window.open('${connectUrl}','_blank')`}">Подключить</button>`
            }
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  function copyLink(url) {
    navigator.clipboard.writeText(url);
    toast('Ссылка скопирована');
  }

  async function disconnectChannel(chId) {
    if (!confirm('Отключить канал?')) return;
    await fetch(`${API}/channels/${chId}/disconnect`, { method: 'PATCH' });
    toast('Канал отключён');
    loadChannels();
    selectClient(activeClient.id);
  }

  // ── SETTINGS ──
  async function loadSettings() {
    const el = document.getElementById('tab-settings');
    if (!el || !activeClient) return;
    const c = activeClient;
    el.innerHTML = `<div class="settings-form">
      <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:16px">Настройки клиента</div>
      <div class="form-group">
        <div class="form-label">Название компании</div>
        <input class="form-input" id="settingName" value="${clientName(c)}" />
      </div>
      <div class="form-group">
        <div class="form-label">Ниша</div>
        <input class="form-input" id="settingNiche" value="${c.niche || ''}" />
      </div>
      <div class="form-group">
        <div class="form-label">Контакт</div>
        <input class="form-input" id="settingContact" value="${c.contact_name || ''}" />
      </div>
      <div class="form-group">
        <div class="form-label">Статус</div>
        <select class="status-select" id="settingStatus">
          ${['new','brief','connecting','setup','test','live','support'].map(s =>
            `<option value="${s}" ${(c.pipeline_status||c.status) === s ? 'selected' : ''}>${s}</option>`
          ).join('')}
        </select>
      </div>
      <button class="save-btn" onclick="saveSettings()">Сохранить</button>

      <div style="padding-top:20px;border-top:1px solid var(--border);margin-top:8px">
        <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:14px;margin-bottom:12px;color:var(--text-muted)">ДОСТУП КЛИЕНТА</div>
        <div class="form-group">
          <div class="form-label">Логин</div>
          <input class="form-input" id="portalLogin" value="${c.portal_login || ''}" placeholder="email или логин" />
        </div>
        <div class="form-group">
          <div class="form-label">Пароль</div>
          <input class="form-input" id="portalPassword" value="${c.portal_password || ''}" placeholder="задайте пароль" />
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="save-btn" onclick="savePortal()" style="flex:1">Сохранить доступ</button>
          ${c.portal_login ? `<button class="channel-btn" onclick="copyPortalLink()" style="font-size:12px;padding:8px 12px">📋 Ссылка</button>` : ''}
        </div>
        ${c.portal_login ? `<div style="font-size:11px;color:var(--text-muted);margin-top:6px">Ссылка: <a href="/client/login" target="_blank" style="color:var(--accent)">/client/login</a></div>` : ''}
      </div>

      <div style="padding-top:12px;border-top:1px solid var(--border)">
        <button class="channel-btn disconnect" style="font-size:13px" onclick="deleteClient()">Удалить клиента</button>
      </div>
    </div>`;
  }

  async function saveSettings() {
    const r = await fetch(`${API}/clients/${activeClient.id}`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        company: document.getElementById('settingName').value,
        niche: document.getElementById('settingNiche').value,
        contact_name: document.getElementById('settingContact').value,
        status: document.getElementById('settingStatus').value
      })
    });
    if (r.ok) {
      toast('Настройки сохранены');
      await selectClient(activeClient.id);
    } else toast('Ошибка', 'error');
  }

  async function savePortal() {
    const login = document.getElementById('portalLogin').value.trim();
    const password = document.getElementById('portalPassword').value.trim();
    if (!login || !password) return toast('Заполни логин и пароль', 'error');
    const r = await fetch(`/api/admin/clients/${activeClient.id}/portal`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ portal_login: login, portal_password: password })
    });
    if (r.ok) {
      toast('Доступ сохранён ✓');
      await selectClient(activeClient.id);
    } else toast('Ошибка', 'error');
  }

  function copyPortalLink() {
    const url = `${location.origin}/client/login`;
    navigator.clipboard.writeText(url).then(() => toast('Ссылка скопирована'));
  }

  async function deleteClient() {
    if (!confirm(`Удалить клиента "${activeClient.company_name}"? Это нельзя отменить.`)) return;
    const r = await fetch(`${API}/clients/${activeClient.id}`, { method: 'DELETE' });
    if (r.ok) {
      toast('Клиент удалён');
      activeClient = null;
      document.getElementById('mainArea').innerHTML = `<div class="empty-state">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
        <h2>Выбери клиента</h2><p>Кликни на клиента слева</p></div>`;
      loadClients();
    }
  }

  // ── ADD CLIENT MODAL ──
  function openAddModal() { document.getElementById('addModal').classList.add('open'); }
  function closeAddModal() { document.getElementById('addModal').classList.remove('open'); }

  async function createClient() {
    const name = document.getElementById('newClientName').value.trim();
    if (!name) return;
    const r = await fetch(`${API}/clients`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        company: name,
        niche: document.getElementById('newClientNiche').value,
        contact_name: document.getElementById('newClientContact').value,
        status: 'new'
      })
    });
    if (r.ok) {
      const data = await r.json();
      const client = data.client || data;
      closeAddModal();
      document.getElementById('newClientName').value = '';
      document.getElementById('newClientNiche').value = '';
      document.getElementById('newClientContact').value = '';
      toast(`Клиент создан`);
      await loadClients();
      selectClient(client.id);
    } else toast('Ошибка создания', 'error');
  }

  // ── SSE for real-time updates ──
  function connectSSE() {
    const es = new EventSource(`${API}/sse`);
    es.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        if (data.type === 'new_message') {
          if (activeClient && data.client_id === activeClient.id && activeTab === 'inbox') {
            loadInbox();
          }
          loadClients();
        }
      } catch {}
    };
    es.onerror = () => setTimeout(connectSSE, 5000);
  }

  // ── WHATSAPP EMBEDDED SIGNUP ──
  window.fbAsyncInit = function() {
    FB.init({ appId: '2379887685742138', autoLogAppEvents: true, xfbml: true, version: 'v23.0' });
  };

  async function connectWhatsApp() {
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = 'Открываем...';

    FB.login(async function(response) {
      if (!response.authResponse?.code) {
        btn.disabled = false;
        btn.textContent = 'Подключить';
        toast('Отменено', 'error');
        return;
      }
      btn.textContent = 'Подключаем...';
      try {
        const r = await fetch('/api/whatsapp/embedded-signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: response.authResponse.code, client_id: activeClient.id })
        });
        const data = await r.json();
        if (data.success) {
          toast('✅ WhatsApp подключён!');
          await selectClient(activeClient.id);
          switchTab('channels');
        } else {
          toast('Ошибка: ' + (data.error || 'неизвестная'), 'error');
          btn.disabled = false;
          btn.textContent = 'Подключить';
        }
      } catch(e) {
        toast('Ошибка сети', 'error');
        btn.disabled = false;
        btn.textContent = 'Подключить';
      }
    }, {
      config_id: '1447475470090009',
      response_type: 'code',
      override_default_response_type: true,
      extras: { setup: {}, featureType: '', sessionInfoVersion: '3' }
    });
  }

  // ── INIT ──
  loadClients();
  connectSSE();
</script>
<script async defer src="https://connect.facebook.net/en_US/sdk.js"></script>
</body>
</html>
