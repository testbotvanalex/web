<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BotMatic Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sb-bg: #18181b;
      --sb-hover: rgba(255,255,255,0.05);
      --sb-active: rgba(255,255,255,0.08);
      --sb-active-border: #fafaf9;
      --sb-text: #f4f4f5;
      --sb-muted: #a1a1aa;
      --sb-border: rgba(255,255,255,0.07);
      --bg: #f5f5f4;
      --surface: #ffffff;
      --surface2: #fafaf9;
      --surface3: #ececeb;
      --border: #e4e4e7;
      --text: #18181b;
      --muted: #71717a;
      --accent: #18181b;
      --accent-soft: rgba(24,24,27,0.06);
      --green: #10b981;
      --red: #ef4444;
      --yellow: #f59e0b;
      --wa: #25d366; --tg: #229ED9; --ig: #e1306c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; font-size: 14px; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px; flex-shrink: 0;
      background: var(--sb-bg);
      border-right: 1px solid var(--sb-border);
      display: flex; flex-direction: column; height: 100vh;
    }
    .sb-logo {
      padding: 16px 14px 13px;
      border-bottom: 1px solid var(--sb-border);
      display: flex; align-items: center; gap: 9px;
      font-weight: 700; font-size: 15px; color: #fff; flex-shrink: 0;
    }
    .sb-logo-icon {
      width: 27px; height: 27px; border-radius: 7px;
      background: #27272a;
      display: flex; align-items: center; justify-content: center; font-size: 13px;
    }
    .sb-search {
      padding: 9px 10px; border-bottom: 1px solid var(--sb-border); flex-shrink: 0;
    }
    .sb-search input {
      width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 7px; padding: 6px 10px; color: var(--sb-text);
      font-family: inherit; font-size: 12px; outline: none;
    }
    .sb-search input::placeholder { color: var(--sb-muted); }
    .sb-search input:focus { border-color: rgba(108,92,231,0.4); background: rgba(255,255,255,0.08); }

    .client-list { flex: 1; overflow-y: auto; padding: 6px; }
    .client-list::-webkit-scrollbar { width: 3px; }
    .client-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

    .client-card {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 9px; border-radius: 8px;
      cursor: pointer; transition: background .1s;
      border-left: 2px solid transparent; margin-bottom: 1px;
    }
    .client-card:hover { background: var(--sb-hover); }
    .client-card.active { background: var(--sb-active); border-left-color: var(--sb-active-border); }

    .client-avatar {
      width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
      background: #27272a;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 11px; color: #fff;
    }
    .client-avatar.c1,
    .client-avatar.c2,
    .client-avatar.c3,
    .client-avatar.c4 { background: #3f3f46; }

    .client-info { flex: 1; min-width: 0; }
    .client-name { font-size: 12.5px; font-weight: 500; color: var(--sb-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .client-tags { display: flex; gap: 3px; margin-top: 2px; }
    .ch-dot {
      font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; text-transform: uppercase;
    }
    .ch-dot.wa { background: rgba(37,211,102,.15); color: #25d366; }
    .ch-dot.tg { background: rgba(34,158,217,.15); color: #229ED9; }
    .ch-dot.ig { background: rgba(225,48,108,.15); color: #e1306c; }
    .ch-dot.off { background: rgba(255,255,255,.05); color: var(--sb-muted); }

    .client-badge {
      background: var(--accent); color: #fff;
      font-size: 9px; font-weight: 700; min-width: 16px; height: 16px;
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      padding: 0 4px; flex-shrink: 0;
    }

    .sb-add {
      margin: 8px; padding: 8px 10px;
      border: 1px dashed rgba(255,255,255,0.1); border-radius: 8px;
      display: flex; align-items: center; gap: 7px;
      cursor: pointer; color: var(--sb-muted); font-size: 12px; font-weight: 500;
      transition: all .15s; background: none; font-family: inherit; width: calc(100% - 16px);
      flex-shrink: 0;
    }
    .sb-add:hover { border-color: rgba(255,255,255,0.18); color: #fff; background: rgba(255,255,255,0.05); }

    /* ── MAIN ── */
    .main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; min-height: 0; }

    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px; color: var(--muted);
    }
    .empty-state h3 { font-size: 15px; font-weight: 600; color: var(--text); opacity: .45; }
    .empty-state p { font-size: 13px; }

    /* Client header */
    .cl-header {
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
      display: flex; align-items: center; gap: 12px;
    }
    .cl-header-avatar {
      width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
      background: #27272a;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; color: #fff;
    }
    .cl-header-info { flex: 1; }
    .cl-header-name { font-weight: 600; font-size: 14px; }
    .cl-header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .cl-header-pills { display: flex; gap: 6px; }
    .cl-header-pills { flex-wrap: wrap; justify-content: flex-end; }
    .ch-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
      border: 1px solid transparent;
    }
    .ch-pill-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
    .ch-pill.wa { background: rgba(37,211,102,.08); color: #16a34a; border-color: rgba(37,211,102,.2); }
    .ch-pill.tg { background: rgba(34,158,217,.08); color: #0284c7; border-color: rgba(34,158,217,.2); }
    .ch-pill.ig { background: rgba(225,48,108,.08); color: #e1306c; border-color: rgba(225,48,108,.2); }
    .ch-pill.off { background: var(--surface2); color: var(--muted); border-color: var(--border); }

    /* Tabs */
    .tabs {
      display: flex; border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0; padding: 0 20px;
      flex-wrap: wrap;
    }
    .tab {
      padding: 10px 12px; font-size: 13px; font-weight: 500;
      color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
      transition: all .12s; display: flex; align-items: center; gap: 5px;
      margin-bottom: -1px; white-space: nowrap;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    .tab-badge {
      background: var(--accent); color: #fff;
      font-size: 9px; font-weight: 700; min-width: 15px; height: 15px;
      border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 0 4px;
    }

    /* Tab panels */
    .tab-panel { flex: 1; overflow: hidden; display: none; min-height: 0; }
    .tab-panel.active { display: flex; flex-direction: column; min-height: 0; overflow-y: auto; }
    .tab-panel.active::-webkit-scrollbar { width: 10px; }
    .tab-panel.active::-webkit-scrollbar-track { background: transparent; }
    .tab-panel.active::-webkit-scrollbar-thumb {
      background: #d4d8e6; border-radius: 999px; border: 2px solid transparent; background-clip: padding-box;
    }
    .tab-panel.active::-webkit-scrollbar-thumb:hover {
      background: #b8bfd4; border: 2px solid transparent; background-clip: padding-box;
    }

    /* ── INBOX ── */
    .inbox-wrap { display: flex; flex: 1; overflow: hidden; }
    .chat-list {
      width: 270px; flex-shrink: 0; border-right: 1px solid var(--border);
      overflow-y: auto; background: var(--surface);
    }
    .chat-list::-webkit-scrollbar { width: 3px; }
    .chat-list::-webkit-scrollbar-thumb { background: var(--surface3); }

    .chat-item {
      padding: 11px 14px; cursor: pointer; border-bottom: 1px solid var(--border);
      transition: background .1s; display: flex; gap: 9px; align-items: flex-start;
    }
    .chat-item:hover { background: var(--surface2); }
    .chat-item.active { background: var(--accent-soft); }
    .chat-av {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      background: var(--surface3); display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; color: var(--muted); border: 1px solid var(--border);
    }
    .chat-info { flex: 1; min-width: 0; }
    .chat-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-id-line { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
    .chat-preview { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
    .chat-preview-row { display:flex; align-items:center; gap:6px; margin-top:1px; min-width:0; }
    .chat-quick-flag {
      flex-shrink:0; display:inline-flex; align-items:center; justify-content:center;
      min-width:52px; height:20px; padding:0 8px; border-radius:999px; background:rgba(37,211,102,.08);
      color:#128c7e; border:1px solid rgba(37,211,102,.18); font-size:10px; font-weight:700;
    }
    .chat-meta { flex-shrink: 0; text-align: right; }
    .chat-time { font-size: 10px; color: var(--muted); }
    .chat-ch { font-size: 9px; font-weight: 700; margin-top: 2px; }
    .chat-ch.wa { color: var(--wa); } .chat-ch.tg { color: var(--tg); } .chat-ch.ig { color: var(--ig); }
    .chat-unread { background: var(--accent); color: #fff; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 8px; margin-top: 2px; display: inline-block; }
    .no-chats { padding: 32px 16px; text-align: center; color: var(--muted); font-size: 12px; }

    /* Messages */
    .msgs-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
    .msgs-header {
      padding: 11px 18px; border-bottom: 1px solid var(--border);
      background: var(--surface); display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .msgs-header-name { font-weight: 600; font-size: 13px; }
    .msgs-header-sub { font-size: 11px; color: var(--muted); }
    .chat-head-tools { display:flex; align-items:center; gap:8px; margin-left:auto; }

    /* Mode toggle */
    .mode-toggle {
      display: flex; align-items: center; gap: 8px;
    }
    .mode-label { font-size: 11px; color: var(--muted); }
    .toggle-btn {
      width: 36px; height: 20px; border-radius: 10px;
      background: var(--surface3); border: 1px solid var(--border);
      cursor: pointer; position: relative; transition: background .2s; flex-shrink: 0;
    }
    .toggle-btn.on { background: var(--accent); border-color: var(--accent); }
    .toggle-btn::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px; border-radius: 7px; background: #fff;
      transition: left .2s; box-shadow: 0 1px 3px rgba(0,0,0,.15);
    }
    .toggle-btn.on::after { left: 18px; }

    .msgs-list { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 6px; }
    .msgs-list::-webkit-scrollbar { width: 3px; }
    .msgs-list::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

    .msg { display: flex; max-width: 72%; gap: 6px; }
    .msg.out { align-self: flex-end; flex-direction: row-reverse; }
    .msg-bubble {
      padding: 8px 12px; border-radius: 11px;
      font-size: 13px; line-height: 1.5;
      background: var(--surface); border: 1px solid var(--border);
    }
    .msg.out .msg-bubble { background: var(--accent); color: #fff; border-color: var(--accent); }
    .msg-actions { display:flex; flex-direction:column; gap:6px; margin-top:8px; }
    .msg-action {
      display:flex; align-items:center; justify-content:center;
      min-height:34px; padding:8px 12px; border-radius:10px;
      border:1px solid rgba(37,211,102,.24); background:#fff; color:#128c7e;
      font-size:13px; font-weight:600;
    }
    .msg-action.list { justify-content:flex-start; text-align:left; min-height:auto; }
    .msg-action small { display:block; font-size:11px; color:#5b6b82; font-weight:500; margin-top:2px; }
    .msg-time { font-size: 10px; color: var(--muted); margin-top: 3px; align-self: flex-end; padding: 0 2px; }
    .msg-who { font-size: 9px; color: var(--muted); margin-bottom: 2px; text-transform: uppercase; letter-spacing: .3px; }

    .no-chat-sel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--muted); }
    .no-chat-sel svg { opacity: .2; }

    .input-area {
      padding: 10px 14px; border-top: 1px solid var(--border);
      background: var(--surface); display: flex; gap: 8px; flex-shrink: 0; align-items: flex-end;
    }
    .msg-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 9px; padding: 9px 12px; color: var(--text);
      font-family: inherit; font-size: 13px; resize: none; outline: none;
      transition: border-color .15s; line-height: 1.4; max-height: 120px;
    }
    .msg-input:focus { border-color: var(--accent); background: #fff; }
    .send-btn {
      background: var(--accent); color: #fff; border: none; border-radius: 9px;
      padding: 9px 16px; cursor: pointer; font-size: 13px; font-weight: 600;
      font-family: inherit; transition: background .15s; flex-shrink: 0;
      display: flex; align-items: center; gap: 6px;
    }
    .send-btn:hover { background: #27272a; }
    .send-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── CHANNELS TAB ── */
    .channels-wrap { padding: 20px 20px 36px; display: flex; flex-direction: column; gap: 10px; max-width: 560px; overflow: visible; min-height: 0; flex: 0 0 auto; scrollbar-gutter: stable; }
    .channels-wrap::-webkit-scrollbar,
    .bot-wrap::-webkit-scrollbar,
    .settings-wrap::-webkit-scrollbar,
    .dash-wrap::-webkit-scrollbar,
    .platform-wrap::-webkit-scrollbar { width: 10px; }
    .channels-wrap::-webkit-scrollbar-track,
    .bot-wrap::-webkit-scrollbar-track,
    .settings-wrap::-webkit-scrollbar-track,
    .dash-wrap::-webkit-scrollbar-track,
    .platform-wrap::-webkit-scrollbar-track { background: transparent; }
    .channels-wrap::-webkit-scrollbar-thumb,
    .bot-wrap::-webkit-scrollbar-thumb,
    .settings-wrap::-webkit-scrollbar-thumb,
    .dash-wrap::-webkit-scrollbar-thumb,
    .platform-wrap::-webkit-scrollbar-thumb { background: #d4d8e6; border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
    .channels-wrap::-webkit-scrollbar-thumb:hover,
    .bot-wrap::-webkit-scrollbar-thumb:hover,
    .settings-wrap::-webkit-scrollbar-thumb:hover,
    .dash-wrap::-webkit-scrollbar-thumb:hover,
    .platform-wrap::-webkit-scrollbar-thumb:hover { background: #b8bfd4; border: 2px solid transparent; background-clip: padding-box; }
    .ch-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 18px;
      display: flex; align-items: center; gap: 14px;
    }
    .ch-icon {
      width: 42px; height: 42px; border-radius: 11px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .ch-icon.wa { background: rgba(37,211,102,.1); }
    .ch-icon.tg { background: rgba(34,158,217,.1); }
    .ch-icon.ig { background: rgba(225,48,108,.1); }
    .ch-info { flex: 1; }
    .ch-name { font-weight: 600; font-size: 14px; }
    .ch-detail { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .ch-status-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .ch-status-dot.on { background: var(--green); box-shadow: 0 0 6px rgba(16,185,129,.4); }
    .ch-status-dot.off { background: var(--muted); }
    .ch-actions { display:flex; align-items:center; gap:8px; margin-left:auto; }
    .ch-meta-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
    .ch-meta-tag {
      display:inline-flex; align-items:center; gap:5px; padding:4px 8px;
      border-radius:999px; background:rgba(255,255,255,.76); border:1px solid rgba(15,23,42,.08);
      color:var(--muted); font-size:11px; font-weight:600;
    }
    .ch-connect-note { font-size:12px; color:var(--muted); line-height:1.5; margin-top:8px; }

    /* ── BOT TAB ── */
    .bot-wrap { padding: 20px 20px 40px; display: flex; flex-direction: column; gap: 16px; max-width: 700px; overflow: visible; min-height: 0; flex: 0 0 auto; scrollbar-gutter: stable; }
    .bot-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .bot-section-head {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
      background: var(--surface2);
    }
    .bot-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
    .bot-section-body { padding: 14px 16px; }
    .bot-text {
      font-size: 13px; line-height: 1.7; color: var(--text);
      white-space: pre-wrap; font-family: 'Inter', sans-serif;
    }
    .bot-empty { font-size: 13px; color: var(--muted); font-style: italic; }
    .bot-toolbar { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
    .bot-toolbar-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .bot-meta-pills { display:flex; gap:8px; flex-wrap:wrap; }
    .bot-pill {
      display:inline-flex; align-items:center; gap:6px; padding:5px 9px;
      border-radius:999px; background:var(--surface2); border:1px solid var(--border);
      color:var(--muted); font-size:11px; font-weight:600;
    }
    .bot-field { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
    .bot-field:last-child { margin-bottom:0; }
    .bot-label {
      font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--muted);
    }
    .bot-input, .bot-textarea {
      width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px;
      color:var(--text); font-family:inherit; font-size:13px; outline:none; transition:border-color .15s, background .15s;
    }
    .bot-input { padding:10px 12px; }
    .bot-textarea { padding:12px; resize:vertical; min-height:96px; line-height:1.55; }
    .bot-textarea.prompt { min-height:180px; }
    .bot-textarea.kb { min-height:220px; }
    .bot-textarea.test { min-height:88px; }
    .bot-input:focus, .bot-textarea:focus { border-color:var(--accent); background:#fff; }
    .bot-hint { font-size:12px; color:var(--muted); line-height:1.45; }
    .bot-chip-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .bot-chip {
      border:1px solid var(--border); background:var(--surface2); color:var(--text);
      border-radius:999px; padding:6px 10px; font-size:12px; cursor:pointer; font-family:inherit;
    }
    .bot-chip:hover { border-color:var(--accent); color:var(--accent); background:#fff; }
    .preset-grid { display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:8px; }
    .preset-card {
      border:1px solid var(--border); background:rgba(255,255,255,.7); border-radius:12px; padding:12px;
      cursor:pointer; transition:all .15s;
    }
    .preset-card:hover { border-color:var(--accent); transform:translateY(-1px); box-shadow:0 10px 24px rgba(23,105,255,.08); }
    .preset-card strong { display:block; font-size:13px; margin-bottom:5px; }
    .preset-card span { display:block; font-size:12px; color:var(--muted); line-height:1.45; }
    .btn-secondary {
      padding:8px 14px; border-radius:8px; border:1px solid var(--border);
      background:var(--surface2); color:var(--text); cursor:pointer; font-family:inherit; font-size:13px; font-weight:600;
    }
    .btn-secondary:hover { border-color:var(--accent); color:var(--accent); background:#fff; }
    .btn-primary.subtle { background:#fff; color:var(--accent); border:1px solid rgba(108,92,231,.2); }
    .btn-danger {
      padding:8px 14px; border-radius:8px; border:1px solid rgba(220,38,38,.18);
      background:rgba(220,38,38,.08); color:#b91c1c; cursor:pointer; font-family:inherit; font-size:13px; font-weight:700;
    }
    .btn-danger:hover { background:rgba(220,38,38,.12); border-color:rgba(220,38,38,.28); }
    .bot-btn-preview { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .bot-btn-preview .mini {
      display:inline-flex; align-items:center; padding:5px 10px; border-radius:999px;
      background:rgba(37,211,102,.08); color:#128c7e; border:1px solid rgba(37,211,102,.18); font-size:12px; font-weight:600;
    }
    .bot-setup-note {

    .flow-block-list, .flow-block-editor, .flow-raw-box {

    .flow-block-kicker { font-size:10px; font-weight:800; letter-spacing:.5px; text-transform:uppercase; color:var(--accent); margin-bottom:6px; }

    /* ── SETTINGS TAB ── */
    .settings-wrap { padding: 20px 20px 36px; display: flex; flex-direction: column; gap: 14px; max-width: 480px; overflow: visible; min-height: 0; flex: 0 0 auto; scrollbar-gutter: stable; }

    /* ── MODAL ── */

    .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }

    .bot-cardx-chips { display:flex; gap:8px; flex-wrap:wrap; }
    .bot-mini-chip {
      display:inline-flex; align-items:center; gap:4px; border-radius:10px; padding:4px 8px; font-size:11px; font-weight:700;
    }
    .bot-mini-chip.wa { background:#dcfce7; color:#16a34a; }
    .bot-mini-chip.tg { background:#dbeafe; color:#2563eb; }
    .bot-mini-chip.ig { background:#fce7f3; color:#db2777; }
    .bot-mini-chip.off { background:var(--surface2); color:var(--muted); }
    .bot-cardx-metrics { padding:16px 18px; display:grid; grid-template-columns:repeat(3,1fr); gap:12px; border-bottom:1px solid var(--border); }
    .bot-metric { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:12px 14px; }
    .bot-metric-lbl { font-size:11px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.04em; margin-bottom:8px; }
    .bot-metric-val { font-size:14px; font-weight:700; color:var(--text); }
    .bot-cardx-client { padding:16px 18px; border-bottom:1px solid var(--border); }
    .bot-cardx-client .client-pill {
      display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px;
      background:#e0f2fe; color:#0284c7; font-size:12px; font-weight:700; margin-top:10px;
    }
    .bot-cardx-actions { padding:16px 18px; display:flex; gap:10px; flex-wrap:wrap; }
    .bot-link-btn {
      border:none; border-radius:12px; padding:10px 14px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit;
    }
    .bot-link-btn.primary { background:var(--accent); color:#fff; }
    .bot-link-btn.soft { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
    .bots-empty {
      background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:40px; text-align:center; color:var(--muted);
    }

    /* ── PLATFORM SETTINGS ── */
    .platform-wrap { padding: 24px 28px 40px; overflow-y: auto; flex: 1; min-height: 0; max-width: 700px; scrollbar-gutter: stable; }
    .platform-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 16px; overflow: hidden; }
    .platform-section-hdr { padding: 14px 18px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 8px; }
    .platform-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; border-bottom: 1px solid var(--surface2); }
    .platform-row:last-child { border-bottom: none; }
    .platform-row-lbl { font-size: 13px; font-weight: 500; }
    .platform-row-val { font-size: 12px; color: var(--muted); font-family: monospace; background: var(--surface2); padding: 3px 8px; border-radius: 5px; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .platform-status { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; }
    .platform-status.ok { color: var(--green); }
    .platform-status.warn { color: var(--yellow); }
    .platform-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    .numbers-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .numbers-table th { text-align: left; padding: 9px 14px; background: var(--surface2); color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
    .numbers-table td { padding: 10px 14px; border-bottom: 1px solid var(--surface2); vertical-align: middle; }
    .numbers-table tr:last-child td { border-bottom: none; }
    .numbers-table tr:hover td { background: var(--surface2); }
    .num-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .num-badge.wa { background: #dcfce7; color: #16a34a; }
    .num-badge.tg { background: #dbeafe; color: #2563eb; }
    .num-badge.ig { background: #fce7f3; color: #db2777; }
    .num-badge.conn { background: #dcfce7; color: #16a34a; }
    .num-badge.disc { background: var(--surface2); color: var(--muted); }
    .num-badge.qual-green { background: #dcfce7; color: #16a34a; }
    .num-badge.qual-yellow { background: #fef9c3; color: #ca8a04; }
    .num-badge.qual-red { background: #fee2e2; color: #dc2626; }
    .btn-disconnect { padding: 4px 10px; font-size: 11px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all .15s; }
    .btn-disconnect:hover { border-color: #ef4444; color: #ef4444; background: #fee2e2; }
    .numbers-loading { text-align: center; padding: 24px; color: var(--muted); font-size: 13px; }

    /* ── 2026 ADMIN REFRESH ── */
    :root {

    .summary-metric {

    .client-card {
      border-radius: 11px;

      background: rgba(248,250,252,.68);
      border: 1px solid transparent;
    }
    .client-card.active {

    .ch-dot.off {
      background: #eef2f7;
      color: #98a2b3;
    }
    .ch-dot.ms { background: rgba(0,132,255,.12); color: var(--ms); }
    .ch-pill.ms { background: rgba(0,132,255,.08); color: var(--ms); border-color: rgba(0,132,255,.18); }
    .chat-ch.ms { color: var(--ms); }
    .num-badge.ms { background: rgba(0,132,255,.12); color: var(--ms); }
    .bot-mini-chip.ms { background: rgba(0,132,255,.08); color: var(--ms); }
    .main {
      background: transparent;
    }
    .empty-state {
      color: #98a2b3;
    }
    .cl-header {
      position: relative;
      padding: 20px 28px;
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(18px);
    }
    .cl-header::after {
      content: '';
      position: absolute;

      right: 28px;

      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(139,92,246,.22), transparent);
    }
    .cl-header-name { font-size: 18px; }
    .cl-header-sub { font-size: 12px; }
    .tabs {
      padding: 0 28px;
      background: rgba(255,255,255,.76);
      backdrop-filter: blur(14px);
    }
    .tab.active {
      color: var(--accent-strong);
      border-bottom-color: var(--accent);
    }
    .send-btn,
    .btn-primary,
    .bot-link-btn.primary {
      background: linear-gradient(135deg, #8b5cf6, #22d3ee);
      box-shadow: 0 14px 30px rgba(139,92,246,.18);
    }
    .send-btn:hover,
    .btn-primary:hover,
    .bot-link-btn.primary:hover {
      background: linear-gradient(135deg, #7c3aed, #0ea5e9);
    }
    .dash-wrap,
    .bots-wrap,
    .platform-wrap {
      padding: 28px 30px 44px;
    }
    .workspace-strip {
      padding: 18px 24px 20px;
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, .9fr);
      gap: 14px;
      background: rgba(255,255,255,.6);
      border-bottom: 1px solid rgba(15,23,42,.06);
      backdrop-filter: blur(16px);
    }
    .workspace-panel {
      border-radius: 18px;
      border: 1px solid rgba(148,163,184,.16);
      background: rgba(255,255,255,.94);
      box-shadow: 0 16px 38px rgba(15,23,42,.04);
      padding: 16px 18px;
    }
    .workspace-kicker {
      display:inline-flex; align-items:center; gap:8px; margin-bottom:10px;
      color: var(--accent-strong); font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
    }
    .workspace-title {
      font-family: var(--display-font);
      font-size: 24px;
      line-height: 1;
      letter-spacing: -.04em;
      margin-bottom: 8px;
    }
    .workspace-copy {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 60ch;
    }
    .workspace-actions {
      display:flex; flex-wrap:wrap; gap:8px; margin-top:14px;
    }
    .workspace-stats {
      display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:10px;
    }
    .workspace-stat {
      padding: 12px 13px;
      border-radius: 14px;
      background: #fbfcff;
      border: 1px solid rgba(148,163,184,.14);
    }
    .workspace-stat strong {
      display:block; font-family:var(--display-font); font-size:22px; letter-spacing:-.04em; margin-bottom:4px;
    }
    .workspace-stat span { display:block; font-size:11px; color:var(--muted); font-weight:600; }
    .workspace-stat small { display:block; margin-top:7px; font-size:11px; color:var(--muted); line-height:1.45; }
    .section-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(320px, .9fr);
      gap: 18px;
      margin-bottom: 26px;
    }
    .hero-panel,
    .hero-sidepanel {
      border-radius: 22px;
      border: 1px solid rgba(148,163,184,.14);
      background:
        linear-gradient(180deg, rgba(255,255,255,.98), rgba(252,250,255,.92)),
        radial-gradient(circle at top right, rgba(139,92,246,.12), transparent 34%);
      box-shadow: 0 24px 60px rgba(15,23,42,.05);
    }
    .hero-panel {
      padding: 24px 24px 22px;
    }
    .hero-sidepanel {
      padding: 18px;
    }
    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent-strong);
      margin-bottom: 14px;
    }
    .hero-title {
      font-family: var(--display-font);
      font-size: 34px;
      line-height: .96;
      letter-spacing: -.05em;
      color: var(--text);
      max-width: 11ch;
      margin-bottom: 12px;
    }
    .hero-copy {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.65;
      max-width: 60ch;
    }
    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }

    .hero-ghost {
      border-radius: 999px;

      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
    }
    .hero-btn {
      border: none;
      color: #fff;
      background: linear-gradient(135deg, #1769ff, #10c1a8);
      box-shadow: 0 12px 26px rgba(23,105,255,.18);
    }
    .hero-ghost {
      border: 1px solid rgba(148,163,184,.18);
      background: rgba(255,255,255,.92);
      color: var(--text);
    }
    .hero-metric-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .hero-metric {

      border-radius: 16px;
      background: rgba(255,255,255,.88);
      border: 1px solid rgba(148,163,184,.14);

      letter-spacing: -.05em;
      margin-bottom: 8px;

      display: block;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }
    .hero-metric small {
      display: block;
      margin-top: 10px;
      font-size: 11px;
      color: var(--muted);

    .dash-stats {

    }
    .stat-card {

      border-radius: 18px;
      background: var(--surface-glass);
      backdrop-filter: blur(18px);
      border-color: rgba(148,163,184,.14);
      box-shadow: 0 14px 30px rgba(15,23,42,.04);

    .stat-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;

      margin-bottom: 14px;
      color: #475569;
      font-size: 12px;
    }

      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }
    .signal-card,
    .dash-client-card {
      border-radius: 18px;
      padding: 18px;
      background: var(--surface-glass);
      border: 1px solid rgba(148,163,184,.14);
      box-shadow: 0 16px 40px rgba(15,23,42,.04);
    }

      min-height: 180px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .signal-card strong {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .signal-card p {
      font-size: 13px;
      color: var(--muted);

      border-radius: 16px;
      background: var(--surface-glass);
      border: 1px solid rgba(148,163,184,.14);
    }
    .coverage-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 12px;
      font-weight: 700;
    }
    .coverage-track {
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(148,163,184,.18);
    }
    .coverage-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #8b5cf6, #22d3ee);
    }
    .platform-wrap .platform-section,
    .bot-cardx,
    .bot-section,
    .info-card,
    .ch-card {
      background: var(--surface-glass);
      backdrop-filter: blur(16px);
      border-color: rgba(148,163,184,.14);
      box-shadow: 0 18px 44px rgba(15,23,42,.04);
    }
    .chat-list,
    .msgs-header,
    .input-area {
      background: rgba(255,255,255,.9);
    }
    .chat-item.active {
      background: rgba(139,92,246,.08);
    }
    .msgs-area {
      background: linear-gradient(180deg, #f8f9ff 0%, #f3f5fb 100%);
    }
    .msg.out .msg-bubble {
      background: linear-gradient(135deg, #8b5cf6, #22d3ee);
      border-color: transparent;
    }
    .sb-add {
      border-color: rgba(148,163,184,.22);
      color: #667085;
      background: rgba(255,255,255,.78);
    }
    .sb-add:hover {
      border-color: rgba(139,92,246,.24);
      color: var(--accent-strong);
      background: rgba(139,92,246,.06);
    }
    .sb-bottom {
      border-top-color: rgba(148,163,184,.16);
      background: rgba(255,255,255,.84);
    }
    .platform-row-val {
      background: rgba(255,255,255,.74);
    }
    @media (max-width: 1220px) {
      .section-hero { grid-template-columns: 1fr; }
      .dash-stats,
      .bots-stats,
      .coverage-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .workspace-strip { grid-template-columns: 1fr; }
    }
    @media (max-width: 980px) {
      body { overflow: auto; }
      .sidebar { width: 238px; }
      .dash-wrap,
      .bots-wrap,
      .platform-wrap { padding: 20px 18px 34px; }
      .hero-title { font-size: 28px; }
      .inbox-wrap { flex-direction: column; }
      .chat-list { width: 100%; max-height: 280px; border-right: none; border-bottom: 1px solid var(--border); }
      .preset-grid { grid-template-columns: 1fr; }
      .bot-step-grid, .bot-two-col, .flow-builder-shell, .flow-inline-grid { grid-template-columns:1fr; }

    @media (max-width: 760px) {
      body { display: block; height: auto; }
      .sidebar,
      .main { width: 100%; height: auto; }
      .sidebar { border-right: none; border-bottom: 1px solid rgba(255,255,255,.08); }
      .summary-metrics,
      .hero-metric-grid,
      .dash-stats,
      .bots-stats,
      .workspace-grid,
      .signal-grid,
      .coverage-grid { grid-template-columns: 1fr; }
    }

    }

    }

      padding: 22px 20px 18px;

      font-size: 15px;
      font-weight: 700;

      display: none;
    }

<script>
  const API = '/api/admin';
  let clients = [], activeClient = null, activeTab = 'inbox';
  let chats = [], activeChat = null, inboxFilter = 'all';
  let botsOverview = [];
  let botsFilter = 'all';
  let botsSearch = '';
  let searchQ = '';
  let currentSection = 'clients';

  function updateAdminUrl(extra = {}) {
    const params = new URLSearchParams(location.search);
    const nextSection = extra.section !== undefined ? extra.section : currentSection;
    const nextClientId = extra.clientId !== undefined ? extra.clientId : activeClient?.id || '';
    const nextTab = extra.tab !== undefined ? extra.tab : (nextSection === 'clients' && activeClient ? activeTab : '');

    if (nextSection) params.set('section', nextSection);
    else params.delete('section');

    if (nextSection === 'clients' && nextClientId) params.set('client', nextClientId);
    else params.delete('client');

    if (nextSection === 'clients' && nextTab) params.set('tab', nextTab);
    else params.delete('tab');

    const nextUrl = `${location.pathname}${params.toString() ? '?' + params.toString() : ''}`;
    history.replaceState({}, '', nextUrl);
  }

  // ── SECTION NAVIGATION ──
  function switchSection(section) {
    currentSection = 'clients';
    // Update nav items
    document.querySelectorAll('.sb-nav-item').forEach(el => el.classList.remove('active'));
    const navEl = document.getElementById('nav-clients');
    if (navEl) navEl.classList.add('active');
    // Show/hide client list panel
    const cp = document.getElementById('clientsPanel');
    cp.style.display = 'flex';
    updateAdminUrl({ section: 'clients', clientId: activeClient?.id || '', tab: activeTab });
    renderCurrentSection();
  }

  function renderCurrentSection() {
    if (activeClient) renderMain();
    else renderClientEmpty();
  }

  function renderSidebarMeta() {
    const el = document.getElementById('sidebarSummary');
    if (!el) return;
    const totalClients = clients.length;
    const totalConnectedChannels = clients.reduce((sum, client) => {
      return sum + clientChannels(client).filter(isConnected).length;
    }, 0);
    const liveBots = botsOverview.filter(bot => bot.state === 'live').length;
    const needsSetup = Math.max(0, totalClients - liveBots);
    el.innerHTML = `
      <div class="summary-eyebrow">Быстрый обзор</div>
      <div class="summary-title">${totalClients ? 'Все workspaces под рукой' : 'Создай первый workspace'}</div>
      <div class="summary-copy">${totalClients ? 'Слева список клиентов, справа их сообщения, каналы и настройки.' : 'После создания workspace здесь появится короткая сводка.'}</div>
      <div class="summary-metrics">
        <div class="summary-metric"><strong>${totalClients}</strong><span>Workspaces</span></div>
        <div class="summary-metric"><strong>${totalConnectedChannels}</strong><span>Channels</span></div>
        <div class="summary-metric"><strong>${liveBots}</strong><span>Live bots</span></div>
        <div class="summary-metric"><strong>${needsSetup}</strong><span>Нужно проверить</span></div>
      </div>
    `;
  }

  function renderClientEmpty() {
    document.getElementById('mainArea')?.classList.remove('inbox-mode');
    document.getElementById('mainArea').innerHTML = `
      <div class="empty-state">
        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.3" viewBox="0 0 24 24" style="opacity:.2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        <h3>Выбери workspace</h3>
        <p style="font-size:12px">Слева список клиентов. После выбора откроются сообщения, каналы и настройки.</p>
      </div>`;
  }

  function renderDashboard() {
    const total = clients.length;
    const botClientIds = new Set(botsOverview.map(bot => bot.client_id));
    const connectedChannels = clients.reduce((sum, c) => sum + clientChannels(c).filter(isConnected).length, 0);
    const liveBots = botsOverview.filter(bot => bot.state === 'live').length;
    const needsSetup = clients.filter(c => {
      const connected = clientChannels(c).some(isConnected);
      const hasBot = botClientIds.has(c.id);
      return !connected || !hasBot;
    });
    const coverage = {
      whatsapp: clients.filter(c => clientChannels(c).some(ch => ch.type === 'whatsapp' && isConnected(ch))).length,
      instagram: clients.filter(c => clientChannels(c).some(ch => ch.type === 'instagram' && isConnected(ch))).length,
      messenger: clients.filter(c => clientChannels(c).some(ch => ch.type === 'messenger' && isConnected(ch))).length,
      telegram: clients.filter(c => clientChannels(c).some(ch => ch.type === 'telegram' && isConnected(ch))).length,
    };
    const topClients = clients.slice(0, 6);
    const coverageItems = [
      { key: 'whatsapp', label: 'WhatsApp', value: coverage.whatsapp },
      { key: 'instagram', label: 'Instagram', value: coverage.instagram },
      { key: 'messenger', label: 'Messenger', value: coverage.messenger },
      { key: 'telegram', label: 'Telegram', value: coverage.telegram },
    ];
    const ma = document.getElementById('mainArea');
    ma.innerHTML = `
      <div class="dash-wrap">
        <div class="section-hero">
          <div class="hero-panel">
            <div class="hero-eyebrow">BotMatic HQ</div>
            <div class="hero-title">Admin panel, который не бесит.</div>
            <div class="hero-copy">Все ключевые штуки в одном месте: workspaces, inbox, каналы, live bots и readiness к запуску. Без прыжков по пяти экранам.</div>
            <div class="hero-actions">
              <button class="hero-btn" onclick="openAddModal()">Новый клиент</button>
              <button class="hero-ghost" onclick="switchSection('bots')">Открыть ботов</button>
              <button class="hero-ghost" onclick="switchSection('platform')">Платформа</button>
            </div>
          </div>
          <div class="hero-sidepanel">
            <div class="hero-metric-grid">
              <div class="hero-metric"><strong>${total}</strong><span>Всего workspaces</span><small>${needsSetup.length} требуют внимания до полного live.</small></div>
              <div class="hero-metric"><strong>${liveBots}</strong><span>Live bots</span><small>${botsOverview.length ? `${Math.round((liveBots / botsOverview.length) * 100)}%` : 0}% ботов уже с подключёнными каналами.</small></div>
              <div class="hero-metric"><strong>${connectedChannels}</strong><span>Connected channels</span><small>Суммарно по WhatsApp, Instagram, Messenger и Telegram.</small></div>
              <div class="hero-metric"><strong>${topClients.length}</strong><span>Активных карточек</span><small>Быстрый вход в inbox, bot config и connections.</small></div>
            </div>
          </div>
        </div>

        <div class="dash-stats">
          <div class="stat-card">
            <div class="stat-icon">👥</div>
            <div class="stat-val">${total}</div>
            <div class="stat-lbl">Workspaces</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">🤖</div>
            <div class="stat-val">${liveBots}</div>
            <div class="stat-lbl">Ботов в live</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">🔌</div>
            <div class="stat-val">${connectedChannels}</div>
            <div class="stat-lbl">Подключённых каналов</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">🛠</div>
            <div class="stat-val">${needsSetup.length}</div>
            <div class="stat-lbl">Нужно дозаполнить</div>
          </div>
        </div>

        <div class="dash-section-title">Требуют внимания</div>
        <div class="signal-grid" style="margin-bottom:20px">
          <div class="signal-card">
            <div>
              <strong>Запуски без каналов</strong>
              <p>${needsSetup.length ? `У ${needsSetup.length} клиентов не хватает бота или хотя бы одного подключённого канала. Добей это перед запуском.` : 'Все текущие карточки имеют минимум один бот и один подключённый канал.'}</p>
            </div>
            <div class="signal-actions">
              <button class="dash-mini-btn" onclick="switchSection('clients')">Открыть workspaces</button>
              <button class="dash-mini-btn" onclick="switchSection('bots')">Проверить ботов</button>
            </div>
          </div>
          <div class="signal-card">
            <div>
              <strong>Быстрые действия</strong>
              <p>Создать нового клиента, провалиться в bot config, проверить platform health или открыть inbox без лишних переходов.</p>
            </div>
            <div class="signal-actions">
              <button class="dash-mini-btn" onclick="openAddModal()">Новый клиент</button>
              <button class="dash-mini-btn" onclick="switchSection('platform')">Platform health</button>
            </div>
          </div>
        </div>

        <div class="dash-section-title">Охват каналов</div>
        <div class="coverage-grid" style="margin-bottom:24px">
          ${coverageItems.map(item => {
            const pct = total ? Math.round((item.value / total) * 100) : 0;
            return `<div class="coverage-card">
              <div class="coverage-top"><span>${item.label}</span><strong>${item.value}/${total}</strong></div>
              <div class="coverage-track"><div class="coverage-fill" style="width:${pct}%"></div></div>
            </div>`;
          }).join('')}
        </div>

        <div class="dash-section-title">Workspaces</div>
        <div class="workspace-grid">
          ${topClients.map(c => {
            const chs = c._channels || c.channels || [];
            const hasWa = chs.some(ch => ch.type==='whatsapp' && (ch.status==='active'||ch.status==='connected'));
            const hasTg = chs.some(ch => ch.type==='telegram' && (ch.status==='active'||ch.status==='connected'));
            const hasIg = chs.some(ch => ch.type==='instagram' && (ch.status==='active'||ch.status==='connected'));
            const hasMs = chs.some(ch => ch.type==='messenger' && (ch.status==='active'||ch.status==='connected'));
            const hasBot = botClientIds.has(c.id);
            return `<div class="dash-client-card">
              <div class="dash-client-top">
                <div class="dash-client-av ${avatarClass(c.id)}" style="background:linear-gradient(135deg,${avatarGrad(c.id)})">${initials(clientName(c))}</div>
                <div>
                  <div class="dash-client-name">${clientName(c)}</div>
                  <div class="dash-client-niche">${c.niche || 'Без ниши'}${c.contact_name ? ` · ${esc(c.contact_name)}` : ''}</div>
                </div>
              </div>
              <div class="dash-client-pills">
                ${hasWa ? '<span class="ch-dot wa">WA</span>' : ''}
                ${hasMs ? '<span class="ch-dot ms">FB</span>' : ''}
                ${hasTg ? '<span class="ch-dot tg">TG</span>' : ''}
                ${hasIg ? '<span class="ch-dot ig">IG</span>' : ''}
                ${!hasWa&&!hasTg&&!hasIg ? '<span class="ch-dot off">не подключено</span>' : ''}
                ${hasBot ? '<span class="ch-dot off" style="color:#0f766e;background:rgba(16,193,168,.12)">BOT</span>' : '<span class="ch-dot off">бот не создан</span>'}
              </div>
              <div class="dash-client-actions">
                <button class="dash-mini-btn" onclick="event.stopPropagation();openBotFromCard('${c.id}','inbox')">Сообщения</button>
                <button class="dash-mini-btn" onclick="event.stopPropagation();openBotFromCard('${c.id}','channels')">Подключения</button>
                <button class="dash-mini-btn" onclick="event.stopPropagation();openBotFromCard('${c.id}','bot')">Настройка бота</button>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  function avatarGrad(id) {
    const grads = [
      '#6c5ce7,#a855f7','#3b82f6,#06b6d4','#059669,#10b981','#d97706,#f59e0b','#dc2626,#f87171'
    ];
    let h = 0;
    for (let c of (id||'')) h = (h*31+c.charCodeAt(0))%grads.length;
    return grads[h];
  }

  function renderBroadcasts() {
    document.getElementById('mainArea').innerHTML = `
      <div class="dash-wrap">
        <div class="dash-title">Рассылки</div>

  async function loadNumbersTable() {
    const wrap = document.getElementById('numbersTableWrap');
    if (!wrap) return;
    try {
      const r = await fetch(`${API}/all-channels`);
      const d = await r.json();
      if (!d.ok || !d.channels || d.channels.length === 0) {
        wrap.innerHTML = '<div class="numbers-loading">Нет подключённых номеров</div>';
        return;
      }
      const typeIcon  = { whatsapp: '📱', messenger: '💙', telegram: '✈️', instagram: '📸' };
      const typeBadge = { whatsapp: 'wa', messenger: 'ms', telegram: 'tg', instagram: 'ig' };
      let html = `<table class="numbers-table">
        <thead><tr>
          <th>Компания</th><th>Тип</th><th>Номер / ID</th><th>Имя</th><th>Качество</th><th>Статус</th><th></th>
        </tr></thead><tbody>`;
      for (const ch of d.channels) {
        const isConn = ch.status === 'connected' || ch.status === 'active';
        const qualMap = { GREEN: 'qual-green', YELLOW: 'qual-yellow', RED: 'qual-red' };
        const qualClass = qualMap[ch.quality] || '';
        const qualLabel = ch.quality ? ch.quality.charAt(0) + ch.quality.slice(1).toLowerCase() : '—';
        const phone = ch.display_phone_number || ch.phone_number_id || '—';
        const name = ch.verified_name || '—';
        html += `<tr>
          <td><strong>${ch.company}</strong></td>
          <td><span class="num-badge ${typeBadge[ch.type] || 'wa'}">${typeIcon[ch.type] || '📱'} ${ch.type.toUpperCase()}</span></td>
          <td style="font-family:monospace;font-size:12px">${phone}</td>
          <td>${name}</td>
          <td>${ch.quality ? `<span class="num-badge ${qualClass}">${qualLabel}</span>` : '—'}</td>
          <td><span class="num-badge ${isConn ? 'conn' : 'disc'}">${isConn ? '🟢 Активен' : '🔴 Откл.'}</span></td>
          <td><button class="btn-disconnect" onclick="disconnectChannel('${ch.channel_id}','${ch.company}')">Отключить</button></td>
        </tr>`;
      }
      html += '</tbody></table>';
      wrap.innerHTML = html;
    } catch(e) {
      wrap.innerHTML = '<div class="numbers-loading" style="color:#ef4444">Ошибка: ' + e.message + '</div>';
    }
  }

  async function disconnectChannel(channelId, company) {
    if (!confirm(`Отключить канал для "${company}"?\nБот перестанет получать сообщения.`)) return;
    try {
      const r = await fetch(`${API}/channels/${channelId}`, { method: 'DELETE' });
      const d = await r.json();
      if (d.deleted || d.ok) {
        toast('Канал отключён');
        loadNumbersTable();
      } else {
        toast(d.error || 'Ошибка', 'error');
      }
    } catch(e) {
      toast('Ошибка: ' + e.message, 'error');
    }
  }

  // Avatar color by id hash
  function avatarClass(id) {
    const cls = ['', 'c1', 'c2', 'c3', 'c4'];
    let h = 0;
    for (let c of (id || '')) h = (h * 31 + c.charCodeAt(0)) % cls.length;
    return cls[h];
  }
  function initials(name) {
    return (name || '?').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  }
  function clientName(c) { return c.company || c.company_name || '?'; }
  function clientChannels(c) { return c._channels || c.channels || []; }
  function isConnected(ch) { return ch.status === 'active' || ch.status === 'connected'; }

  const chLabels = { whatsapp: 'WA', telegram: 'TG', instagram: 'IG', messenger: 'FB' };
  const chClass  = { whatsapp: 'wa', telegram: 'tg', instagram: 'ig', messenger: 'ms' };

  function toast(msg, type='ok') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show';
    setTimeout(() => el.className = 'toast', 2800);
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── SELECT CLIENT ──
  async function selectClient(id, preferredTab = null) {
    // Make sure we're in clients section
    if (currentSection !== 'clients') {
      switchSection('clients');
    }
    const r = await fetch(`${API}/clients/${id}`);
    const d = await r.json();
    activeClient = d.client || d;
    activeClient._channels = d.channels || activeClient.channels || [];
    activeClient._bots = d.bots || [];
    const allowedTabs = ['inbox', 'channels', 'bot', 'settings'];
    const nextTab = allowedTabs.includes(preferredTab)
      ? preferredTab
      : (allowedTabs.includes(activeTab) ? activeTab : 'inbox');
    activeTab = nextTab;
    updateAdminUrl({ section: 'clients', clientId: activeClient.id, tab: activeTab });
    renderClientList();
    renderMain();
    if (activeTab === 'inbox') loadInbox();
  }

      <div class="tab-panel ${activeTab==='channels'?'active':''}" id="tab-channels"></div>

  function updateWorkspaceStripVisibility(tab) {
    const strip = document.getElementById('workspaceStrip');
    if (!strip) return;
    strip.style.display = 'none';
  }

  function syncMainMode() {
    const main = document.getElementById('mainArea');
    if (!main) return;
    main.classList.toggle('inbox-mode', activeTab === 'inbox');
  }

  function switchTab(tab) {
    const prevTab = activeTab;
    activeTab = tab;
    updateAdminUrl({ section: 'clients', clientId: activeClient?.id || '', tab });
    activeChat = null;
    updateWorkspaceStripVisibility(tab);
    syncMainMode();
    const layoutChanged = (prevTab === 'inbox') !== (tab === 'inbox');
    if (layoutChanged) {
      renderMain();
      if (tab === 'inbox') loadInbox();
      return;
    }
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab[data-tab="${tab}"]`)?.classList.add('active');
    document.getElementById(`tab-${tab}`)?.classList.add('active');
    if (tab === 'inbox') loadInbox();
    if (tab === 'channels') loadChannels();
    if (tab === 'bot') loadBot();
    if (tab === 'settings') renderSettings();
  }

  function renderInboxEmptyState(title = 'Выбери диалог', text = 'Слева откроется список сообщений, справа сам чат.') {
    return `<div class="no-chat-sel">
      <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
      <strong>${title}</strong>
      <span>${text}</span>
    </div>`;
  }

  function getFilteredChats() {
    if (inboxFilter === 'unread') return chats.filter(ch => Number(ch.unread_count || 0) > 0);
    if (inboxFilter === 'buttons') return chats.filter(ch => chatHasButtons(ch));
    return chats;
  }

  function getInboxFilterCount(filter) {
    if (filter === 'unread') return chats.filter(ch => Number(ch.unread_count || 0) > 0).length;
    if (filter === 'buttons') return chats.filter(ch => chatHasButtons(ch)).length;
    return chats.length;
  }

  function setInboxFilter(filter) {
    inboxFilter = filter;
    const visibleChatIds = new Set(getFilteredChats().map(ch => ch.id));
    if (activeChat && !visibleChatIds.has(activeChat.id)) {
      activeChat = null;
      const area = document.getElementById('msgsArea');
      if (area) area.innerHTML = renderInboxEmptyState();
    }
    document.querySelectorAll('.inbox-filter-item').forEach(el => {
      el.classList.toggle('active', el.dataset.filter === filter);
    });
    renderChatList();
  }

  // ── INBOX ──
  async function loadInbox() {
    const el = document.getElementById('tab-inbox');
    if (!el) return;
    inboxFilter = 'all';
    el.innerHTML = `<div class="inbox-wrap">
      <aside class="inbox-rail">
        <div class="inbox-rail-head">
          <div class="inbox-rail-title">Inbox</div>
          <div class="inbox-rail-sub">${clientName(activeClient)}</div>
        </div>
        <div class="inbox-rail-label">Папки</div>
        <div class="inbox-filter-list">
          <button class="inbox-filter-item active" data-filter="all" type="button" onclick="setInboxFilter('all')">
            <span>Все диалоги</span>
            <strong id="filterCountAll">0</strong>
          </button>
          <button class="inbox-filter-item" data-filter="unread" type="button" onclick="setInboxFilter('unread')">
            <span>Непрочитанные</span>
            <strong id="filterCountUnread">0</strong>
          </button>
          <button class="inbox-filter-item" data-filter="buttons" type="button" onclick="setInboxFilter('buttons')">
            <span>С кнопками</span>
            <strong id="filterCountButtons">0</strong>
          </button>
        </div>
      </aside>
      <div class="chat-list-pane">
        <div class="chat-list-head">
          <div>
            <div class="chat-list-title">Диалоги</div>
            <div class="chat-list-sub" id="chatListMeta">Загрузка...</div>
          </div>
        </div>
        <div class="chat-list" id="chatList"><div class="loading" style="font-size:12px">loading...</div></div>
      </div>
      <div class="msgs-area" id="msgsArea">
        ${renderInboxEmptyState()}
      </div>
    </div>`;
    const r = await fetch(`${API}/chats?client_id=${activeClient.id}`);
    const d = await r.json();
    chats = d.chats || [];
    renderChatList();
    // update badge
    const unread = chats.reduce((s, c) => s + (c.unread_count || 0), 0);
    const badge = document.getElementById('inboxBadge');
    if (badge) { badge.style.display = unread ? 'flex' : 'none'; badge.textContent = unread; }
  }

  function chatDisplayName(chat) {
    const name = String(chat?.sender_name || '').trim();
    const id = String(chat?.sender_id || '').trim();
    return name && name !== id ? name : (id || 'Клиент');
  }

  function chatDisplayId(chat) {
    const name = String(chat?.sender_name || '').trim();
    const id = String(chat?.sender_id || '').trim();
    return name && id && name !== id ? id : '';
  }

  function renderMsgContent(m) {
    const text = esc(m?.text || '').replace(/\n/g, '<br>');
    let actions = '';
    try {
      const raw = m?.raw ? (typeof m.raw === 'string' ? JSON.parse(m.raw) : m.raw) : null;
      const buttons = raw?.interactive?.action?.buttons || [];
      const sections = raw?.interactive?.action?.sections || [];
      if (Array.isArray(buttons) && buttons.length) {
        actions = `<div class="msg-actions">${
          buttons.map(btn => `<div class="msg-action">${esc(btn?.reply?.title || btn?.title || '')}</div>`).join('')
        }</div>`;
      } else if (Array.isArray(sections) && sections.length) {
        const rows = sections.flatMap(sec => sec?.rows || []).slice(0, 10);
        if (rows.length) {
          actions = `<div class="msg-actions">${
            rows.map(row => `<div class="msg-action list"><div><div>${esc(row?.title || '')}</div>${row?.description ? `<small>${esc(row.description)}</small>` : ''}</div></div>`).join('')
          }</div>`;
        }
      }
    } catch (_) {}
    return `<div class="msg-bubble">${text}${actions}</div>`;
  }

  function chatHasButtons(chat) {
    try {
      const last = chats.find(c => c.id === chat?.id);
      const raw = last?.last_message_raw ? (typeof last.last_message_raw === 'string' ? JSON.parse(last.last_message_raw) : last.last_message_raw) : null;
      return Array.isArray(raw?.interactive?.action?.buttons) && raw.interactive.action.buttons.length > 0;
    } catch (_) {
      return false;
    }
  }

  function renderChatList() {
    const el = document.getElementById('chatList');
    if (!el) return;
    const filteredChats = getFilteredChats();
    const allCount = getInboxFilterCount('all');
    const unreadCount = getInboxFilterCount('unread');
    const buttonCount = getInboxFilterCount('buttons');
    document.getElementById('filterCountAll')?.replaceChildren(document.createTextNode(String(allCount)));
    document.getElementById('filterCountUnread')?.replaceChildren(document.createTextNode(String(unreadCount)));
    document.getElementById('filterCountButtons')?.replaceChildren(document.createTextNode(String(buttonCount)));
    const meta = document.getElementById('chatListMeta');
    if (meta) {
      const titles = { all: 'Все сообщения', unread: 'Только новые', buttons: 'Диалоги с кнопками' };
      meta.textContent = `${titles[inboxFilter] || 'Все сообщения'} · ${filteredChats.length}`;
    }
    if (!filteredChats.length) { el.innerHTML = '<div class="no-chats">Здесь пока пусто</div>'; return; }
    el.innerHTML = filteredChats.map(ch => {
      const cls = chClass[ch.channel] || 'wa';
      const lbl = chLabels[ch.channel] || (ch.channel||'').toUpperCase();
      const name = chatDisplayName(ch);
      const senderIdLine = chatDisplayId(ch);
      const preview = ch.last_message || '...';
      const hasButtons = chatHasButtons(ch);
      const time = ch.last_at ? new Date(ch.last_at).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}) : '';
      return `<div class="chat-item ${activeChat?.id === ch.id ? 'active' : ''}" onclick="openChat('${ch.id}')">
        <div class="chat-av">${name[0]?.toUpperCase() || '?'}</div>
        <div class="chat-info">
          <div class="chat-name">${name}</div>
          ${senderIdLine ? `<div class="chat-id-line">${senderIdLine}</div>` : ''}
          <div class="chat-preview-row">
            ${hasButtons ? `<span class="chat-quick-flag">Кнопки</span>` : ''}
            <div class="chat-preview">${preview}</div>
          </div>
        </div>
        <div class="chat-meta">
          <div class="chat-time">${time}</div>
          <div class="chat-ch ${cls}">${lbl}</div>
          ${ch.unread_count ? `<div class="chat-unread">${ch.unread_count}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  async function openChat(chatId) {
    activeChat = chats.find(c => c.id === chatId);
    renderChatList();
    const area = document.getElementById('msgsArea');
    if (!area) return;
    area.innerHTML = '<div class="loading" style="font-size:12px">loading...</div>';

    const msgsR = await fetch(`${API}/chats/${chatId}/messages`);
    const msgsD = await msgsR.json();
    const msgs = msgsD.messages || [];
    const chatData = msgsD.chat || activeChat || {};
    const isBot = (chatData.mode || activeChat?.mode) !== 'human';
    activeChat = { ...(activeChat || {}), ...chatData };

    const name = chatDisplayName(activeChat);
    const cls = chClass[activeChat?.channel] || 'wa';
    const lbl = chLabels[activeChat?.channel] || '';
    const senderIdLine = activeChat?.sender_id || '';

    area.innerHTML = `
      <div class="msgs-header">
        <div class="chat-av" style="width:30px;height:30px;font-size:11px">${name[0]?.toUpperCase() || '?'}</div>
        <div>
          <div class="msgs-header-name">${name}</div>
          <div class="msgs-header-sub">${lbl}${senderIdLine ? ' · ' + senderIdLine : ''}</div>
        </div>
        <div class="chat-head-tools">
          <button class="btn-secondary" onclick="renameActiveChat()">Переименовать</button>
          <button class="btn-danger" onclick="deleteActiveChat()">Удалить чат</button>
          <div class="mode-toggle">
            <span class="mode-label" id="modeLabel">${isBot ? '🤖 Бот' : '👤 Оператор'}</span>
            <div class="toggle-btn ${isBot ? '' : 'on'}" id="modeToggle" onclick="toggleMode()" title="Переключить режим"></div>
          </div>
        </div>
      </div>
      <div class="msgs-list" id="msgsList">
        ${msgs.length ? msgs.map(m => {
          const isOut = m.direction === 'out';
          const who = isOut ? (m.sent_by === 'human' ? '👤' : '🤖') : '';
          return `<div class="msg ${isOut ? 'out' : ''}">
            <div>
              ${who ? `<div class="msg-who" style="text-align:right">${who}</div>` : ''}
              ${renderMsgContent(m)}
              <div class="msg-time">${new Date(m.created_at || m.ts || 0).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'})}</div>
            </div>
          </div>`;
        }).join('') : '<div style="text-align:center;color:var(--muted);font-size:12px;padding:20px">Нет сообщений</div>'}
      </div>
      <div class="input-area">
        <textarea class="msg-input" id="msgInput" rows="1" placeholder="Напиши ответ от имени оператора..."
          oninput="autoResize(this)"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
        <button class="send-btn" onclick="sendMsg()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          Отправить
        </button>
      </div>`;
    const list = document.getElementById('msgsList');
    if (list) list.scrollTop = list.scrollHeight;
  }

  async function renameActiveChat() {
    if (!activeChat?.id) return;
    const current = chatDisplayName(activeChat);
    const next = prompt('Имя клиента', current);
    if (!next || !next.trim()) return;
    const r = await fetch(`${API}/chats/${activeChat.id}/name`, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ sender_name: next.trim() })
    });
    const d = await r.json().catch(() => ({}));
    if (!r.ok || d.ok === false) return toast(d.error || 'Не удалось сохранить имя', 'error');
    activeChat = { ...(activeChat || {}), ...(d.chat || {}), sender_name: next.trim() };
    chats = chats.map(ch => ch.id === activeChat.id ? { ...ch, sender_name: next.trim() } : ch);
    renderChatList();
    await openChat(activeChat.id);
    toast('Name saved');
  }

  async function deleteActiveChat() {
    if (!activeChat?.id) return;
    const label = chatDisplayName(activeChat);
    if (!confirm(`Delete chat "${label}"?`)) return;
    const chatId = activeChat.id;
    const r = await fetch(`${API}/chats/${chatId}`, { method: 'DELETE' });
    const d = await r.json().catch(() => ({}));
    if (!r.ok || d.ok === false) return toast(d.error || 'Не удалось удалить чат', 'error');
    toast('Чат удалён');
    activeChat = null;
    await loadInbox();
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  async function toggleMode() {
    if (!activeChat) return;
    const toggle = document.getElementById('modeToggle');
    const label = document.getElementById('modeLabel');
    const isNowBot = !toggle.classList.contains('on');
    const newMode = isNowBot ? 'human' : 'bot';
    await fetch(`${API}/chats/${activeChat.id}/${newMode === 'human' ? 'takeover' : 'release'}`, { method: 'POST' });
    toggle.classList.toggle('on', newMode === 'human');
    label.textContent = newMode === 'human' ? '👤 Оператор' : '🤖 Бот';
    activeChat.mode = newMode;
  }

  async function sendMsg() {
    const input = document.getElementById('msgInput');
    const text = input?.value?.trim();
    if (!text || !activeChat) return;
    input.value = ''; input.style.height = 'auto';
    const btn = document.querySelector('.send-btn');
    if (btn) btn.disabled = true;
    await fetch(`${API}/send-message`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ chat_id: activeChat.id, text, client_id: activeClient.id })
    });
    if (btn) btn.disabled = false;
    await openChat(activeChat.id);
  }

  async function refreshInboxLive(event) {
    const eventClientId = event.clientId || event.client_id;
    const eventChatId = event.chatId || event.chat_id;
    const eventSenderId = event.senderId || event.sender_id;

    await loadClients();

    if (currentSection !== 'clients' || activeTab !== 'inbox' || !activeClient) return;
    if (eventClientId !== activeClient.id) return;

    const prevChatId = activeChat?.id || null;
    const sameOpenThread =
      prevChatId &&
      (
        (eventChatId && prevChatId === eventChatId) ||
        (eventSenderId && activeChat?.sender_id === eventSenderId)
      );

    await loadInbox();

    if (sameOpenThread && prevChatId) {
      await openChat(prevChatId);
    } else if (!prevChatId && eventChatId) {
      await openChat(eventChatId);
    }
  }

  async function loadChannels() {
    const el = document.getElementById('tab-channels');
    if (!el) return;
    el.innerHTML = '<div class="loading">загрузка...</div>';
    const r = await fetch(`${API}/clients/${activeClient.id}/channels`);
    const d = await r.json();

  async function loadBot() {
    const el = document.getElementById('tab-bot');
    if (!el || !activeClient?.id) return;

    const cachedBots = Array.isArray(activeClient._bots) ? activeClient._bots : [];
    let bots = cachedBots;

    if (bots[0]) {
      renderBotEditor(el, bots[0]);
    } else {
      el.innerHTML = '<div class="loading">загрузка...</div>';
    }

    let timeoutId = null;
    try {
      const controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
      if (controller) {
        timeoutId = setTimeout(() => controller.abort(), 8000);
      }

      const r = await fetch(
        `${API}/clients/${activeClient.id}/bots`,
        controller ? { signal: controller.signal } : undefined
      );

      if (timeoutId) clearTimeout(timeoutId);

      const d = await r.json().catch(() => ({}));
      if (!r.ok || d.ok === false) {
        throw new Error(d.error || `Не удалось загрузить бота (${r.status})`);
      }

      bots = Array.isArray(d.bots) ? d.bots : [];
      activeClient._bots = bots;
    } catch (e) {
      if (timeoutId) clearTimeout(timeoutId);
      console.error('loadBot failed', e);
      if (!bots[0]) {
        renderBotErrorState(el);
      }
      return;
    }

    renderBotEditor(el, bots[0]);
  }

  const FLOW_BUILDER_TYPES = [
    { value: 'text', label: 'Короткий текст' },
    { value: 'textarea', label: 'Большой текст' },
    { value: 'email', label: 'Email' },

  function flowBuilderSupportsOptions(type) {
    return ['single', 'multi', 'dropdown'].includes(type);
  }

  function flowBuilderTypeLabel(type) {
    return FLOW_BUILDER_TYPES.find(t => t.value === type)?.label || 'Поле';
  }

  function sanitizeFlowKey(value) {
    const normalized = String(value || '')
      .trim()
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, '_')
      .replace(/^_+|_+$/g, '');
    return normalized || `field_${Math.random().toString(36).slice(2, 7)}`;
  }

  function createEmptyFlowBlock(index = 0) {
    return {
      id: `QUESTION_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 6)}`.toUpperCase(),
      title: `Вопрос ${index + 1}`,
      question: '',
      fieldKey: `question_${index + 1}`,
      answerType: 'text',
      required: true,
      options: [],
      buttonLabel: index === 0 ? 'Далее' : 'Продолжить',
    };
  }

  function normalizeFlowBuilderBlock(block, index = 0) {
    const title = String(block?.title || block?.question || `Вопрос ${index + 1}`).trim();
    return {
      id: String(block?.id || `QUESTION_${index + 1}`).trim() || `QUESTION_${index + 1}`,
      title,
      question: String(block?.question || '').trim(),
      fieldKey: sanitizeFlowKey(block?.fieldKey || title),
      answerType: FLOW_BUILDER_TYPES.some(t => t.value === block?.answerType) ? block.answerType : 'text',
      required: block?.required !== false,
      options: Array.isArray(block?.options) ? block.options.map(v => String(v || '').trim()).filter(Boolean) : [],
      buttonLabel: String(block?.buttonLabel || 'Продолжить').trim() || 'Продолжить',
    };
  }

  function parseExistingFlowToBuilder(flowRaw) {
    if (!flowRaw) return [createEmptyFlowBlock(0)];

    let parsed;
    try {
      parsed = typeof flowRaw === 'string' ? JSON.parse(flowRaw) : flowRaw;
    } catch (_) {
      return [createEmptyFlowBlock(0)];
    }

    const screens = Array.isArray(parsed?.screens) ? parsed.screens : [];
    const blocks = screens.map((screen, index) => {
      const children = Array.isArray(screen?.layout?.children) ? screen.layout.children : [];
      const headingNode = children.find(node => ['TextHeading', 'TextBody'].includes(node?.type));
      const footerNode = children.find(node => node?.type === 'Footer');
      const fieldNode = children.find(node => ['TextInput', 'TextArea', 'RadioButtonsGroup', 'CheckboxGroup', 'Dropdown'].includes(node?.type));

      let answerType = 'text';
      let options = [];
      let required = true;
      let fieldKey = '';

      if (fieldNode?.type === 'TextArea') {
        answerType = 'textarea';
      } else if (fieldNode?.type === 'TextInput') {
        const inputType = String(fieldNode.input_type || '').toLowerCase();
        if (inputType === 'email') answerType = 'email';
        else if (inputType === 'phone') answerType = 'phone';
        else answerType = 'text';
      } else if (fieldNode?.type === 'RadioButtonsGroup') {
        answerType = 'single';
        options = Array.isArray(fieldNode.data_source) ? fieldNode.data_source.map(opt => opt?.title || opt?.label || opt?.id || '').filter(Boolean) : [];
      } else if (fieldNode?.type === 'CheckboxGroup') {
        answerType = 'multi';
        options = Array.isArray(fieldNode.data_source) ? fieldNode.data_source.map(opt => opt?.title || opt?.label || opt?.id || '').filter(Boolean) : [];
      } else if (fieldNode?.type === 'Dropdown') {
        answerType = 'dropdown';
        options = Array.isArray(fieldNode.data_source) ? fieldNode.data_source.map(opt => opt?.title || opt?.label || opt?.id || '').filter(Boolean) : [];
      }

      required = fieldNode?.required !== false;
      fieldKey = fieldNode?.name || sanitizeFlowKey(screen?.title || headingNode?.text || `question_${index + 1}`);

      return normalizeFlowBuilderBlock({
        id: screen?.id,
        title: screen?.title || `Вопрос ${index + 1}`,
        question: headingNode?.text || fieldNode?.label || screen?.title || '',
        fieldKey,
        answerType,
        required,
        options,
        buttonLabel: footerNode?.label || 'Продолжить',
      }, index);
    }).filter(Boolean);

    return blocks.length ? blocks : [createEmptyFlowBlock(0)];
  }

  function buildFlowJsonFromBuilder() {
    const blocks = (botFlowBuilderState.screens || []).map((block, index) => normalizeFlowBuilderBlock(block, index));
    if (!blocks.length) {
      blocks.push(createEmptyFlowBlock(0));
    }

    const routing_model = {};
    const screens = blocks.map((block, index) => {
      const next = blocks[index + 1];
      const questionText = block.question || block.title || `Вопрос ${index + 1}`;
      const labelText = block.title || questionText;
      const children = [{ type: 'TextHeading', text: questionText }];

      if (block.answerType === 'textarea') {
        children.push({
          type: 'TextArea',
          name: block.fieldKey,
          label: labelText,
          required: block.required,
        });
      } else if (block.answerType === 'email' || block.answerType === 'phone' || block.answerType === 'text') {
        children.push({
          type: 'TextInput',
          name: block.fieldKey,
          label: labelText,
          input_type: block.answerType === 'text' ? 'text' : block.answerType,
          required: block.required,
        });
      } else {
        const data_source = (block.options || []).map((option, optionIndex) => ({
          id: sanitizeFlowKey(`${block.fieldKey}_${optionIndex + 1}_${option}`),
          title: option,
        }));

        const typeMap = {
          single: 'RadioButtonsGroup',
          multi: 'CheckboxGroup',
          dropdown: 'Dropdown',
        };

        children.push({
          type: typeMap[block.answerType] || 'RadioButtonsGroup',
          name: block.fieldKey,
          label: labelText,
          required: block.required,
          data_source,
        });
      }

      children.push(next
        ? {
            type: 'Footer',
            label: block.buttonLabel || 'Продолжить',
            on_click_action: { name: 'navigate', next: { type: 'screen', name: next.id } },
          }
        : {
            type: 'Footer',
            label: block.buttonLabel || 'Завершить',
            on_click_action: { name: 'complete', payload: { screen: block.id } },
          }
      );

      if (next) {
        routing_model[index === 0 ? 'START' : block.id] = [next.id];
      }

      return {
        id: block.id,
        title: block.title || `Вопрос ${index + 1}`,
        terminal: !next,
        layout: {
          type: 'SingleColumnLayout',
          children,
        },
      };
    });

    if (screens[0]) {
      routing_model.START = [screens[0].id];
      for (let i = 0; i < screens.length - 1; i++) {
        routing_model[screens[i].id] = [screens[i + 1].id];
      }
    }

    return {
      version: '7.1',
      data_api_version: '3.0',
      routing_model,
      screens,
    };
  }
