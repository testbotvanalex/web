  function initBotFlowBuilder(flowRaw) {
    const blocks = parseExistingFlowToBuilder(flowRaw);
    botFlowBuilderState = {
      screens: blocks,
      activeId: blocks[0]?.id || null,
    };
    renderBotFlowBuilder();
  }

  function selectBotFlowBlock(id) {
    botFlowBuilderState.activeId = id;
    renderBotFlowBuilder();
  }

  function updateBotFlowBlock(field, value) {
    const active = getActiveFlowBlock();
    if (!active) return;
    active[field] = field === 'fieldKey' ? sanitizeFlowKey(value) : value;
    renderBotFlowBuilder();
  }

  function updateBotFlowBlockOptions(value) {
    const active = getActiveFlowBlock();
    if (!active) return;
    active.options = String(value || '')
      .split('\n')
      .map(v => v.trim())
      .filter(Boolean);
    renderBotFlowBuilder();
  }

  function addBotFlowBlock() {
    const nextIndex = (botFlowBuilderState.screens || []).length;
    const block = createEmptyFlowBlock(nextIndex);
    botFlowBuilderState.screens.push(block);
    botFlowBuilderState.activeId = block.id;
    renderBotFlowBuilder();
  }

  function duplicateBotFlowBlock() {
    const active = getActiveFlowBlock();
    if (!active) return;
    const index = botFlowBuilderState.screens.findIndex(block => block.id === active.id);
    if (index === -1) return;
    const copy = normalizeFlowBuilderBlock({
      ...active,
      id: `${active.id}_COPY_${Math.random().toString(36).slice(2, 5)}`.toUpperCase(),
      title: `${active.title} Copy`,
    }, index + 1);
    botFlowBuilderState.screens.splice(index + 1, 0, copy);
    botFlowBuilderState.activeId = copy.id;
    renderBotFlowBuilder();
  }

  function moveBotFlowBlock(direction) {
    const active = getActiveFlowBlock();
    if (!active) return;
    const index = botFlowBuilderState.screens.findIndex(block => block.id === active.id);
    const targetIndex = index + direction;
    if (index === -1 || targetIndex < 0 || targetIndex >= botFlowBuilderState.screens.length) return;
    const [item] = botFlowBuilderState.screens.splice(index, 1);
    botFlowBuilderState.screens.splice(targetIndex, 0, item);
    botFlowBuilderState.activeId = item.id;
    renderBotFlowBuilder();
  }

  function removeBotFlowBlock() {
    if ((botFlowBuilderState.screens || []).length <= 1) {
      return toast('Нужен хотя бы один вопрос', 'error');
    }
    const active = getActiveFlowBlock();
    if (!active) return;
    const index = botFlowBuilderState.screens.findIndex(block => block.id === active.id);
    if (index === -1) return;
    botFlowBuilderState.screens.splice(index, 1);
    botFlowBuilderState.activeId = botFlowBuilderState.screens[Math.max(0, index - 1)]?.id || botFlowBuilderState.screens[0]?.id || null;
    renderBotFlowBuilder();
  }

        kb: `Магазин: ${company}\nКаталог: [заполни]\nДоставка: [заполни]\nОплата: [заполни]\nВозврат: [заполни]\nКонтакты: [заполни]\n`,
        buttons: ['Каталог','Доставка','Контакты']
      }
    };
    const p = presets[type];
    if (!p) return;
    const promptEl = document.getElementById('botPromptInput');
    const kbEl = document.getElementById('botKnowledgeInput');
    const btnEl = document.getElementById('botButtonsInput');
    if (promptEl) promptEl.value = p.prompt;
    if (kbEl) kbEl.value = p.kb;
    if (btnEl) btnEl.value = p.buttons.join('\n');
    renderBotButtonPreview();
    toast('Шаблон применён');
  }

  async function saveBotConfig() {
    const botId = getActiveBotId();
    if (!botId) return toast('Бот не найден', 'error');
    const data = getBotFormData();
    if (!data.name) return toast('Укажи название бота', 'error');
    if (!data.prompt) return toast('Заполни системный промпт', 'error');
    const r = await fetch(`${API}/bots/${botId}`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(data)
    });
    const d = await r.json().catch(() => ({}));
    if (!r.ok || d.ok === false) return toast(d.error || 'Ошибка сохранения', 'error');
    toast('Бот сохранён');
    await selectClient(activeClient.id);
    switchTab('bot');
  }

  async function createBotForClient() {
    if (!activeClient) return;
    const name = prompt('Как назвать бота?', clientName(activeClient));
    if (!name || !name.trim()) return;
    const r = await fetch(`${API}/clients/${activeClient.id}/bots`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ name: name.trim() })
    });
    const d = await r.json().catch(() => ({}));
    if (!r.ok || d.ok === false) return toast(d.error || 'Не удалось создать бота', 'error');
    toast('Бот создан');
    await selectClient(activeClient.id);
    switchTab('bot');
  }

  async function deleteBotFromPanel() {
    const botId = getActiveBotId();
    if (!botId || !activeClient) return toast('Бот не найден', 'error');
    if (!confirm(`Удалить бота у клиента "${clientName(activeClient)}"?`)) return;
    const r = await fetch(`${API}/bots/${botId}`, { method: 'DELETE' });
    const d = await r.json().catch(() => ({}));
    if (!r.ok || d.ok === false) return toast(d.error || 'Не удалось удалить бота', 'error');
    toast('Бот удалён');
    activeClient._bots = [];
    switchTab('bot');
  }

  async function testBotReply() {
    const botId = getActiveBotId();
    const box = document.getElementById('botTestReply');
    const message = (document.getElementById('botTestMessage')?.value || '').trim();
    if (!botId) return toast('Бот не найден', 'error');
    if (!message) return toast('Напиши тестовое сообщение', 'error');
    if (box) box.textContent = 'Генерирую ответ...';
    const r = await fetch(`${API}/bots/${botId}/preview`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ message, ...getBotFormData() })
    });
    const d = await r.json().catch(() => ({}));
    if (!r.ok || d.ok === false) {
      if (box) box.textContent = d.error || 'Ошибка теста';
      return toast(d.error || 'Ошибка теста', 'error');
    }
    if (box) box.textContent = d.reply || 'Пустой ответ';
  }

  // ── SETTINGS ──
  function renderSettings() {
    const el = document.getElementById('tab-settings');
    if (!el || !activeClient) return;
    const c = activeClient;
    const status = c.pipeline_status || c.status || 'new';
    const statusCls = ['live','new','test','setup'].includes(status) ? status : 'new';

    el.innerHTML = `<div class="settings-wrap">
      <div class="workspace-view-head">
        <div class="workspace-view-title">Данные</div>
        <div class="workspace-view-copy">Основные данные workspace, техническая информация и опасные действия собраны в одном месте.</div>
      </div>
      <div class="info-card">
        <div class="info-card-head">Workspace</div>
        <div class="info-row">
          <div class="info-label">Компания</div>
          <div class="info-value">${clientName(c)}</div>
        </div>
        <div class="info-row">
          <div class="info-label">Ниша</div>
          <div class="info-value">${c.niche || '—'}</div>
        </div>
        <div class="info-row">
          <div class="info-label">Контакт</div>
          <div class="info-value">${c.contact_name || '—'}</div>
        </div>
        <div class="info-row">
          <div class="info-label">Статус</div>
          <div class="info-value"><span class="status-badge ${statusCls}">${status}</span></div>
        </div>
      </div>
      <div class="info-card">
        <div class="info-card-head">Технические данные</div>
        <div class="info-row">
          <div class="info-label">ID клиента</div>
          <div class="info-value"><span class="id-code">${c.id}</span></div>
        </div>
        ${c.portal_login ? `<div class="info-row">
          <div class="info-label">Логин клиента</div>
          <div class="info-value">${c.portal_login}</div>
        </div>` : ''}
        <div class="info-row">
          <div class="info-label">Создан</div>
          <div class="info-value">${c.created_at ? new Date(c.created_at).toLocaleDateString('ru') : '—'}</div>
        </div>
      </div>
      <div class="info-card">
        <div class="info-card-head">Удаление</div>
        <div style="padding:16px; display:flex; flex-direction:column; gap:12px;">
          <div class="danger-note">Удаление уберёт этот workspace из панели. Используй только если клиент больше не нужен.</div>
          <div>
            <button class="btn-danger" onclick="deleteClientFromPanel()">Удалить клиента</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  async function deleteClientFromPanel() {
    if (!activeClient) return;
    const clientId = activeClient.id;
    const name = clientName(activeClient);
    if (!confirm(`Удалить клиента "${name}"?`)) return;
    const r = await fetch(`${API}/clients/${clientId}`, { method: 'DELETE' });
    const d = await r.json().catch(() => ({}));
    if (!r.ok || d.ok === false) return toast(d.error || 'Не удалось удалить клиента', 'error');
    toast('Клиент удалён');
    activeClient = null;
    activeChat = null;
    await loadClients();
    if (clients.length > 0) {
      await selectClient(clients[0].id);
    } else {
      document.getElementById('mainArea').innerHTML = '<div class="loading" style="color:var(--muted)">Пока нет клиентов</div>';
      renderClientList();
    }
  }

  // ── ADD CLIENT ──
  function openAddModal() { document.getElementById('addModal').classList.add('open'); }
  function closeAddModal() { document.getElementById('addModal').classList.remove('open'); }
  document.getElementById('addModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeAddModal(); });

  async function createClient() {
    const name = document.getElementById('newName').value.trim();
    if (!name) return;
    const r = await fetch(`${API}/clients`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        company: name,
        niche: document.getElementById('newNiche').value,
        contact_name: document.getElementById('newContact').value,
        status: 'new'
      })
    });
    if (r.ok) {
      const d = await r.json();
      closeAddModal();
      ['newName','newNiche','newContact'].forEach(id => document.getElementById(id).value = '');
      toast('Клиент создан');
      await loadClients();
      selectClient((d.client || d).id);
    } else toast('Ошибка создания');
  }

  // ── SSE real-time ──
  let sseConn = null;
  let sseRetryTimer = null;
  function connectSSE() {
    if (sseConn) {
      try { sseConn.close(); } catch {}
      sseConn = null;
    }
    const es = new EventSource(`${API}/sse`);
    sseConn = es;
    es.onmessage = async e => {
      try {
        const d = JSON.parse(e.data);
        if (d.type === 'new_message') {
          await refreshInboxLive(d);
        }
      } catch {}
    };
    es.onerror = () => {
      try { es.close(); } catch {}
      if (sseConn === es) sseConn = null;
      clearTimeout(sseRetryTimer);
      sseRetryTimer = setTimeout(connectSSE, 5000);
    };
  }

  setInterval(() => {
    if (currentSection !== 'clients' || activeTab !== 'inbox' || !activeClient) return;
    const prevChatId = activeChat?.id || null;
    loadInbox().then(() => {
      if (prevChatId) openChat(prevChatId).catch(() => {});
    }).catch(() => {});
  }, 30000);

  // ── WHATSAPP EMBEDDED SIGNUP ──
  let fbReady = false;
  window.fbAsyncInit = function() {
    FB.init({ appId: '2015841775662491', autoLogAppEvents: true, xfbml: true, version: 'v23.0' });
    fbReady = true;
  };
  (function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(d.getElementById(id))return;js=d.createElement(s);js.id=id;js.src="https://connect.facebook.net/en_US/sdk.js";fjs.parentNode.insertBefore(js,fjs);}(document,'script','facebook-jssdk'));

  function connectWhatsApp() {
    if (!activeClient) return;
    const APP_ID = '2015841775662491';
    const CONFIG_ID = '26805258609077987';
    const REDIRECT_URI = encodeURIComponent('https://admin.botmatic.be/api/whatsapp/oauth-callback');
    const state = encodeURIComponent(JSON.stringify({ client_id: activeClient.id }));
    const url = `https://www.facebook.com/dialog/oauth?client_id=${APP_ID}&config_id=${CONFIG_ID}&response_type=code&override_default_response_type=true&redirect_uri=${REDIRECT_URI}&state=${state}`;

    const popup = window.open(url, 'whatsapp_signup', 'width=700,height=700,scrollbars=yes');
    if (!popup) { toast('Разрешите всплывающие окна в браузере', 'error'); return; }

    toast('Открываю Facebook...');
    const timer = setInterval(function() {
      if (popup.closed) {
        clearInterval(timer);
        selectClient(activeClient.id).then(function() { switchTab('channels'); });
      }
    }, 1000);
  }

  function showTgConnect() {
    const token = prompt('Введи токен бота от @BotFather:');
    if (!token?.trim()) return;
    fetch(`${API}/clients/${activeClient.id}/channels`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ type: 'telegram', token: token.trim(), client_id: activeClient.id })
    }).then(r => r.json()).then(d => {
      if (d.ok || d.success) { toast('Telegram подключён!'); selectClient(activeClient.id); switchTab('channels'); }
      else toast('Ошибка: ' + (d.error || ''), 'error');
    });
  }

  function connectMessenger() {
    if (!activeClient) return;
    window.location.href = `/auth/messenger/login?client_id=${encodeURIComponent(activeClient.id)}`;
  }

  // ── INIT ──
  async function initAdmin() {
    const params = new URLSearchParams(location.search);
    const clientId = params.get('client');
    const tab = params.get('tab');

    switchSection('clients');
    await loadClients();

    if (clientId) {
      await selectClient(clientId, tab).catch(() => {});
    } else if (clients.length > 0) {
      await selectClient(clients[0].id, tab).catch(() => {});
    }
  }

  initAdmin();
  connectSSE();
</script>
</body>
