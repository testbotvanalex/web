<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BotMatic — Inbox</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f5efe3;
    --ink: #12151f;
    --panel: rgba(255,255,255,0.72);
    --panel-strong: rgba(255,255,255,0.88);
    --border: rgba(18,21,31,0.1);
    --muted: #5f6779;
    --accent: #6d28d9;
    --shadow: 0 8px 32px rgba(36,31,24,0.1);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    height: 100vh; overflow: hidden;
    font-family: "Manrope", sans-serif; color: var(--ink);
    background:
      radial-gradient(circle at top left, rgba(255,159,90,0.2), transparent 30%),
      radial-gradient(circle at bottom right, rgba(68,131,255,0.15), transparent 30%),
      linear-gradient(180deg, #f7f2e8 0%, #efe4d3 100%);
  }
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(18,21,31,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(18,21,31,0.02) 1px, transparent 1px);
    background-size: 28px 28px;
    mask-image: radial-gradient(circle at center, black, transparent 80%);
  }

  /* ── Layout ── */
  .layout { display: flex; flex-direction: column; height: 100vh; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    background: rgba(255,255,255,0.74); backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border); flex-shrink: 0; position: relative; z-index: 10;
  }
  .topbar-logo { font-family: "Syne", sans-serif; font-weight: 800; font-size: 18px;
    background: linear-gradient(135deg, #7c3aed, #db2777);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .topbar-company { font-size: 13px; font-weight: 700; color: var(--muted);
    background: rgba(255,255,255,0.7); border: 1px solid var(--border);
    padding: 5px 12px; border-radius: 999px; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .btn-logout { font-size: 13px; font-weight: 600; color: var(--muted);
    background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: 8px; }
  .btn-logout:hover { background: rgba(0,0,0,0.05); color: var(--ink); }

  .body { display: flex; flex: 1; min-height: 0; }

  /* ── Sidebar ── */
  .sidebar {
    width: 320px; flex-shrink: 0; display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
    background: rgba(255,255,255,0.5); backdrop-filter: blur(10px);
  }
  .sidebar-head { padding: 16px 16px 12px; border-bottom: 1px solid var(--border); }
  .sidebar-title { font-family: "Syne", sans-serif; font-weight: 700; font-size: 15px; margin-bottom: 10px; }
  .search-input {
    width: 100%; padding: 9px 12px; border-radius: 10px;
    border: 1px solid var(--border); background: rgba(255,255,255,0.7);
    font-family: "Manrope", sans-serif; font-size: 13px; outline: none;
  }
  .search-input:focus { border-color: var(--accent); }
  .filters { display: flex; gap: 6px; padding: 10px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .ftab {
    padding: 5px 12px; border-radius: 999px; font-size: 12px; font-weight: 700;
    border: 1px solid var(--border); background: none; cursor: pointer; color: var(--muted);
    transition: all .15s;
  }
  .ftab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .chat-list { flex: 1; overflow-y: auto; }
  .chat-item {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background .12s; display: flex; gap: 12px; align-items: flex-start;
  }
  .chat-item:hover { background: rgba(255,255,255,0.5); }
  .chat-item.active { background: rgba(109,40,217,0.07); border-left: 2px solid var(--accent); }
  .chat-avatar {
    width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, #7c3aed, #db2777);
    display: flex; align-items: center; justify-content: center;
    font-family: "Syne", sans-serif; font-weight: 700; font-size: 13px; color: #fff;
  }
  .chat-info { flex: 1; min-width: 0; }
  .chat-name { font-weight: 700; font-size: 13px; margin-bottom: 3px; display: flex; justify-content: space-between; }
  .chat-time { font-size: 11px; color: var(--muted); font-weight: 400; }
  .chat-channel { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .chat-preview { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chat-badges { display: flex; gap: 4px; margin-top: 4px; }
  .badge {
    padding: 2px 7px; border-radius: 999px; font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .badge-wa { background: rgba(74,236,123,0.15); color: #1eb954; }
  .badge-tg { background: rgba(56,189,248,0.15); color: #0284c7; }
  .badge-ig { background: rgba(219,39,119,0.12); color: #db2777; }
  .badge-ms { background: rgba(69,141,255,0.15); color: #458dff; }
  .badge-bot { background: rgba(109,40,217,0.1); color: #6d28d9; }
  .badge-human { background: rgba(249,115,22,0.12); color: #ea580c; }
  .badge-unread {
    width: 18px; height: 18px; border-radius: 50%; background: var(--accent);
    color: #fff; font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .empty-list { padding: 40px 16px; text-align: center; color: var(--muted); font-size: 13px; }

  /* ── Chat panel ── */
  .chat-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .chat-empty {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--muted); gap: 10px;
  }
  .chat-empty svg { opacity: .3; }
  .chat-empty p { font-size: 14px; font-weight: 500; }

  .chat-head {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.6); backdrop-filter: blur(10px); flex-shrink: 0;
  }
  .chat-head-name { font-family: "Syne", sans-serif; font-weight: 700; font-size: 15px; }
  .chat-head-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
  .msg { display: flex; flex-direction: column; max-width: 70%; }
  .msg.out { align-self: flex-end; align-items: flex-end; }
  .msg.in  { align-self: flex-start; }
  .msg-bubble {
    padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.45; word-break: break-word;
  }
  .msg.in  .msg-bubble { background: rgba(255,255,255,0.85); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.out .msg-bubble { background: linear-gradient(135deg, #7c3aed, #9f5cf0); color: #fff; border-bottom-right-radius: 4px; }
  .msg-meta { font-size: 11px; color: var(--muted); margin-top: 4px; padding: 0 2px; }

  .date-sep { text-align: center; font-size: 11px; color: var(--muted); font-weight: 600;
    background: rgba(255,255,255,0.5); border: 1px solid var(--border);
    display: inline-block; margin: 8px auto; padding: 3px 12px; border-radius: 999px; align-self: center; }

  /* ── Compose ── */
  .compose {
    padding: 14px 20px; border-top: 1px solid var(--border);
    background: rgba(255,255,255,0.74); backdrop-filter: blur(10px);
    display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0;
  }
  .compose-input {
    flex: 1; padding: 11px 14px; border-radius: 12px;
    border: 1px solid var(--border); background: rgba(255,255,255,0.8);
    font-family: "Manrope", sans-serif; font-size: 14px; outline: none;
    resize: none; max-height: 120px; line-height: 1.4;
    transition: border-color .2s;
  }
  .compose-input:focus { border-color: var(--accent); }
  .btn-send {
    padding: 11px 20px; border-radius: 12px;
    background: linear-gradient(135deg, #7c3aed, #db2777);
    color: #fff; border: none; font-family: "Syne", sans-serif;
    font-weight: 700; font-size: 13px; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: opacity .2s;
    flex-shrink: 0;
  }
  .btn-send:hover:not(:disabled) { opacity: .9; }
  .btn-send:disabled { opacity: .5; cursor: default; }

  .count-badge { background: rgba(109,40,217,0.1); color: var(--accent);
    font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 999px; }
</style>
</head>
<body>
<div class="layout">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-logo">BotMatic</div>
    <div class="topbar-right">
      <span class="topbar-company" id="companyName">—</span>
      <button class="btn-logout" onclick="location.href='/client/logout'">Выйти</button>
    </div>
  </div>

  <div class="body">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-head">
        <div class="sidebar-title">Conversations <span class="count-badge" id="countBadge">0</span></div>
        <input class="search-input" id="searchInput" placeholder="Поиск по имени или ID...">
      </div>
      <div class="filters">
        <button class="ftab active" data-f="all">Все</button>
        <button class="ftab" data-f="open">Открытые</button>
        <button class="ftab" data-f="bot">Бот</button>
        <button class="ftab" data-f="human">Человек</button>
      </div>
      <div class="chat-list" id="chatList"></div>
    </div>

    <!-- Chat panel -->
    <div class="chat-panel" id="chatPanel">
      <div class="chat-empty" id="emptyState">
        <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="#999" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z"/>
        </svg>
        <p>Выберите диалог</p>
      </div>
    </div>
  </div>

  <!-- Compose (hidden until chat selected) -->
  <div class="compose" id="compose" style="display:none">
    <textarea class="compose-input" id="composeInput" placeholder="Написать ответ... (Enter — отправить)" rows="1"></textarea>
    <button class="btn-send" id="sendBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
      Отправить
    </button>
  </div>
</div>

<script>
const S = { chats: [], filtered: [], active: null, filter: 'all', q: '' };

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function initials(name) {
  return (name||'?').trim().split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase();
}
function channelBadge(ch) {
  const map = { whatsapp:'wa', telegram:'tg', instagram:'ig', messenger:'ms' };
  const cls = { wa:'badge-wa', tg:'badge-tg', ig:'badge-ig', ms:'badge-ms' };
  const k = map[ch] || ch;
  return `<span class="badge ${cls[k]||''}">${k}</span>`;
}
function timeAgo(ts) {
  if (!ts) return '';
  const d = new Date(ts), now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'только что';
  if (diff < 3600000) return Math.floor(diff/60000) + ' мин';
  if (diff < 86400000) return d.toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('ru', {day:'numeric',month:'short'});
}

async function loadChats() {
  const r = await fetch(`/api/client/chats?mode=${S.filter}&search=${encodeURIComponent(S.q)}`);
  if (!r.ok) return;
  const d = await r.json();
  S.chats = d.chats || [];
  renderList();
}

function renderList() {
  let rows = S.chats.filter(c => {
    if (S.filter !== 'all' && c.mode !== S.filter) return false;
    if (S.q) {
      const q = S.q.toLowerCase();
      return (c.sender_name||'').toLowerCase().includes(q) || (c.sender_id||'').toLowerCase().includes(q);
    }
    return true;
  });
  document.getElementById('countBadge').textContent = rows.length;
  const el = document.getElementById('chatList');
  if (!rows.length) { el.innerHTML = '<div class="empty-list">Диалогов нет</div>'; return; }
  el.innerHTML = rows.map(c => {
    const name = c.sender_name || c.sender_id || '?';
    const isActive = S.active?.id === c.id;
    return `<div class="chat-item${isActive?' active':''}" data-id="${c.id}" onclick="openChat('${c.id}')">
      <div class="chat-avatar">${esc(initials(name))}</div>
      <div class="chat-info">
        <div class="chat-name">
          <span>${esc(name)}</span>
          <span class="chat-time">${timeAgo(c.last_message_at)}</span>
        </div>
        <div class="chat-channel">${c.channel}</div>
        <div class="chat-preview">${esc(c.last_message_text||'')}</div>
        <div class="chat-badges">
          ${channelBadge(c.channel)}
          <span class="badge ${c.mode==='bot'?'badge-bot':'badge-human'}">${c.mode==='bot'?'бот':'человек'}</span>
          ${c.unread_count>0?`<span class="badge-unread">${c.unread_count}</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

async function openChat(id) {
  S.active = S.chats.find(c => c.id === id) || S.active;
  renderList();

  const r = await fetch(`/api/client/chats/${id}/messages`);
  if (!r.ok) return;
  const d = await r.json();
  renderChat(d.messages || []);
  document.getElementById('compose').style.display = 'flex';
}

function renderChat(msgs) {
  const c = S.active;
  const name = c.sender_name || c.sender_id || '?';

  let html = `
    <div class="chat-head">
      <div class="chat-head-name">${esc(name)}</div>
      <div class="chat-head-sub">${c.channel} · ${c.mode === 'bot' ? '🤖 Бот отвечает' : '👤 Ручной режим'}</div>
    </div>
    <div class="messages" id="messages">
  `;

  let lastDate = '';
  for (const m of msgs) {
    const d = new Date(m.created_at);
    const dateStr = d.toLocaleDateString('ru', {day:'numeric', month:'long'});
    if (dateStr !== lastDate) {
      html += `<div class="date-sep">${dateStr}</div>`;
      lastDate = dateStr;
    }
    const dir = m.direction === 'out' ? 'out' : 'in';
    const time = d.toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit'});
    html += `<div class="msg ${dir}">
      <div class="msg-bubble">${esc(m.text)}</div>
      <div class="msg-meta">${time}</div>
    </div>`;
  }
  html += `</div>`;

  const panel = document.getElementById('chatPanel');
  panel.innerHTML = html;
  document.getElementById('emptyState')?.remove();

  const messagesEl = document.getElementById('messages');
  if (messagesEl) messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendMessage() {
  if (!S.active) return;
  const input = document.getElementById('composeInput');
  const text = input.value.trim();
  if (!text) return;
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  try {
    const r = await fetch('/api/client/send-message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: S.active.id, text })
    });
    if (!r.ok) { const d = await r.json(); throw new Error(d.error || 'Ошибка'); }
    input.value = ''; input.style.height = 'auto';
    await loadChats();
    await openChat(S.active.id);
  } catch(e) {
    alert(e.message);
  } finally {
    btn.disabled = false;
  }
}

document.getElementById('sendBtn').addEventListener('click', sendMessage);
document.getElementById('composeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('composeInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
document.querySelectorAll('.ftab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ftab').forEach(x => x.classList.remove('active'));
    btn.classList.add('active');
    S.filter = btn.dataset.f;
    renderList();
  });
});
document.getElementById('searchInput').addEventListener('input', e => { S.q = e.target.value; renderList(); });

// Load company name
fetch('/api/client/me').then(r=>r.json()).then(d => {
  document.getElementById('companyName').textContent = d.company || 'Клиент';
  document.title = `${d.company} — BotMatic`;
}).catch(()=>{});

// Init + polling
loadChats();
setInterval(async () => {
  await loadChats();
  if (S.active) {
    const r = await fetch(`/api/client/chats/${S.active.id}/messages`);
    if (!r.ok) return;
    const d = await r.json();
    const msgs = d.messages || [];
    if (!msgs.length) return;
    const el = document.getElementById('messages');
    if (!el) return;
    const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60;
    renderChat(msgs);
    if (atBottom && el) el.scrollTop = el.scrollHeight;
  }
}, 4000);
</script>
</body>
</html>
