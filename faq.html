<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAQ | BotMatic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="container header-inner">
      <a href="index.html" class="logo">BotMatic</a>
      <div class="nav-wrapper">
        <nav id="main-nav">
          <a href="chatbots.html" data-i18n="navServices">Diensten</a>
          <a href="prijzen.html" data-i18n="navPricing">Abonnementen</a>
          <a href="faq.html" data-i18n="navFaq">FAQ</a>
          <a href="contact.html" class="btn btn-primary" data-i18n="navContact">Contact</a>
        </nav>
        <select id="lang-select" class="lang-select">
          <option value="nl">NL</option>
          <option value="fr">FR</option>
          <option value="en">EN</option>
        </select>
        <button class="mobile-nav-toggle" id="mobile-nav-toggle" aria-label="Menu">
            <span class="icon-bar"></span><span class="icon-bar"></span><span class="icon-bar"></span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <section id="faq" class="faq">
        <div class="container animate-on-scroll">
            <h1 class="section-title" data-i18n="faqTitle">Veelgestelde Vragen</h1>
            <p class="section-sub" data-i18n="faqSub">Vind hier antwoorden op de meest voorkomende vragen. Staat uw vraag er niet tussen? <a href="contact.html">Neem dan contact met ons op</a>.</p>
            <div class="faq-container">
                <div class="faq-item"><button class="faq-question" data-i18n="faq1q"></button><div class="faq-answer"><p data-i18n="faq1a"></p></div></div>
                <div class="faq-item"><button class="faq-question" data-i18n="faq2q"></button><div class="faq-answer"><p data-i18n="faq2a"></p></div></div>
                <div class="faq-item"><button class="faq-question" data-i18n="faq3q"></button><div class="faq-answer"><p data-i18n="faq3a"></p></div></div>
                <div class="faq-item"><button class="faq-question" data-i18n="faq4q"></button><div class="faq-answer"><p data-i18n="faq4a"></p></div></div>
            </div>
        </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <div class="footer-links">
        <a href="#" data-i18n="footerLink1">Over ons</a>
        <a href="#" data-i18n="footerLink2">Privacybeleid</a>
        <a href="#" data-i18n="footerLink3">Algemene voorwaarden</a>
      </div>
      <p>&copy; <span id="year"></span> BotMatic. <span data-i18n="footerCopyright">Alle rechten voorbehouden.</span></p>
    </div>
  </footer>

  <script>
    const translations = {
      nl: {
        navServices: 'Diensten', navPricing: 'Abonnementen', navFaq: 'FAQ', navContact: 'Contact',
        faqTitle: 'Veelgestelde Vragen', faqSub: 'Vind hier antwoorden op de meest voorkomende vragen. Staat uw vraag er niet tussen? Neem dan contact met ons op.',
        faq1q: 'Hoe lang duurt het om een chatbot te bouwen?', faq1a: 'Een basischatbot kan al binnen 48 uur live zijn. Voor complexere chatbots met geavanceerde integraties hangt de doorlooptijd af van de specifieke vereisten, maar we streven altijd naar een snelle en efficiënte lancering.',
        faq2q: 'Kan de chatbot gekoppeld worden met mijn systemen?', faq2a: 'Absoluut. We kunnen onze chatbots integreren met een breed scala aan systemen, zoals uw CRM, agenda, e-commerceplatform en meer. Dit zorgt voor een naadloze workflow en data-uitwisseling.',
        faq3q: 'Wat gebeurt er na de lancering?', faq3a: 'Onze service stopt niet na de lancering. We bieden doorlopende ondersteuning en optimalisatie om ervoor te zorgen dat uw chatbot effectief blijft presteren en meegroeit met uw bedrijf.',
        faq4q: 'Is de chatbot meertalig?', faq4a: 'Jazeker. We kunnen chatbots bouwen die meerdere talen ondersteunen, zodat u een breder, internationaal publiek kunt bereiken en bedienen.',
        footerLink1: 'Over ons', footerLink2: 'Privacybeleid', footerLink3: 'Algemene voorwaarden', footerCopyright: 'Alle rechten voorbehouden.'
      },
      fr: {
        navServices: 'Services', navPricing: 'Tarifs', navFaq: 'FAQ', navContact: 'Contact',
        faqTitle: 'Questions Fréquemment Posées', faqSub: 'Trouvez ici les réponses aux questions les plus courantes. Votre question n\'est pas listée ? Contactez-nous.',
        faq1q: 'Combien de temps faut-il pour construire un chatbot ?', faq1a: 'Un chatbot de base peut être mis en ligne en 48 heures. Pour les chatbots plus complexes avec des intégrations avancées, le délai dépend des exigences spécifiques, mais nous visons toujours un lancement rapide et efficace.',
        faq2q: 'Le chatbot peut-il être connecté à mes systèmes ?', faq2a: 'Absolument. Nous pouvons intégrer nos chatbots à une large gamme de systèmes, tels que votre CRM, votre calendrier, votre plateforme de commerce électronique, etc. Cela garantit un flux de travail et un échange de données fluides.',
        faq3q: 'Que se passe-t-il après le lancement ?', faq3a: 'Notre service ne s\'arrête pas après le lancement. Nous offrons un soutien et une optimisation continus pour garantir que votre chatbot reste performant et évolue avec votre entreprise.',
        faq4q: 'Le chatbot est-il multilingue ?', faq4a: 'Oui, bien sûr. Nous pouvons créer des chatbots qui prennent en charge plusieurs langues, vous permettant d\'atteindre et de servir un public plus large et international.',
        footerLink1: 'À propos de nous', footerLink2: 'Politique de confidentialité', footerLink3: 'Conditions générales', footerCopyright: 'Tous droits réservés.'
      },
      en: {
        navServices: 'Services', navPricing: 'Pricing', navFaq: 'FAQ', navContact: 'Contact',
        faqTitle: 'Frequently Asked Questions', faqSub: 'Find answers to the most common questions here. Is your question not listed? Contact us.',
        faq1q: 'How long does it take to build a chatbot?', faq1a: 'A basic chatbot can be live within 48 hours. For more complex chatbots with advanced integrations, the lead time depends on the specific requirements, but we always aim for a quick and efficient launch.',
        faq2q: 'Can the chatbot be connected to my systems?', faq2a: 'Absolutely. We can integrate our chatbots with a wide range of systems, such as your CRM, calendar, e-commerce platform, and more. This ensures a seamless workflow and data exchange.',
        faq3q: 'What happens after the launch?', faq3a: 'Our service doesn\'t stop after launch. We provide ongoing support and optimization to ensure your chatbot continues to perform effectively and grows with your business.',
        faq4q: 'Is the chatbot multilingual?', faq4a: 'Yes, indeed. We can build chatbots that support multiple languages, allowing you to reach and serve a broader, international audience.',
        footerLink1: 'About Us', footerLink2: 'Privacy Policy', footerLink3: 'Terms & Conditions', footerCopyright: 'All rights reserved.'
      }
    };

    let currentLang = 'nl';

    function setLanguage(lang) {
      currentLang = lang;
      document.documentElement.lang = lang;
      const elems = document.querySelectorAll('[data-i18n]');
      elems.forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang] && translations[lang][key]) { el.textContent = translations[lang][key]; }
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      const langSelect = document.getElementById('lang-select');
      const yearSpan = document.getElementById('year');
      const mobileNavToggle = document.getElementById('mobile-nav-toggle');
      const mainNav = document.getElementById('main-nav');
      const faqItems = document.querySelectorAll('.faq-item');
      const animatedEls = document.querySelectorAll('.animate-on-scroll');

      setLanguage(langSelect.value);
      if (yearSpan) { yearSpan.textContent = new Date().getFullYear(); }
      langSelect.addEventListener('change', (e) => { setLanguage(e.target.value); });
      mobileNavToggle.addEventListener('click', () => {
          mainNav.classList.toggle('active');
          mobileNavToggle.classList.toggle('active');
      });
      mainNav.addEventListener('click', (e) => {
          if (e.target.tagName === 'A') {
              mainNav.classList.remove('active');
              mobileNavToggle.classList.remove('active');
          }
      });
      
      faqItems.forEach(item => {
          const question = item.querySelector('.faq-question');
          question.addEventListener('click', () => {
              const wasActive = item.classList.contains('active');
              faqItems.forEach(i => i.classList.remove('active'));
              if (!wasActive) {
                  item.classList.add('active');
              }
          });
      });

      const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
              if (entry.isIntersecting) {
                  entry.target.classList.add('visible');
                  observer.unobserve(entry.target);
              }
          });
      }, { threshold: 0.1 });
      animatedEls.forEach(el => observer.observe(el));
    });
  </script>
</body>
</html>
