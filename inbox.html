<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BotMatic — Inbox</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f5f9; --surface: #ffffff; --surface2: #f0f1f6; --surface3: #e8eaf2;
      --border: #e2e4ed; --accent: #7c3aed; --accent2: #db2777;
      --accent-glow: rgba(124,58,237,0.2); --text: #1a1a2e; --muted: #6b7280;
      --green: #059669; --yellow: #d97706; --red: #dc2626; --blue: #2563eb;
      --ig: #e1306c; --tg: #0088cc; --wa: #25d366;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow: hidden; }

    /* ── Layout ── */
    .layout { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px; flex-shrink: 0; background: var(--surface);
      border-right: 1px solid var(--border); padding: 24px 0;
      display: flex; flex-direction: column; gap: 4px;
    }
    .sidebar-logo {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      padding: 0 20px 20px; letter-spacing: -0.5px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px; color: var(--muted); text-decoration: none;
      font-size: 14px; transition: all .15s;
      cursor: pointer; border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { color: var(--text); background: var(--surface2); }
    .nav-item.active { color: var(--accent); background: rgba(124,108,252,0.1); border-left: 2px solid var(--accent); }
    .nav-sep { height: 1px; background: var(--border); margin: 8px 0; }
    .nav-badge {
      margin-left: auto; background: var(--accent); color: #fff;
      font-size: 10px; font-weight: 700; padding: 2px 6px;
      border-radius: 999px; min-width: 18px; text-align: center;
    }

    /* ── Main area ── */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

    /* ── Topbar ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 28px; border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .topbar-left h1 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; }
    .online-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; flex-shrink: 0; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .bot-pill {
      font-size: 12px; color: var(--muted); background: var(--surface2);
      padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
    }
    .btn-logout {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      padding: 6px 14px; border-radius: 8px; cursor: pointer;
      font-size: 13px; font-family: inherit; transition: all .15s;
    }
    .btn-logout:hover { border-color: var(--accent); color: var(--text); }

    /* ── Inbox shell ── */
    .shell { display: flex; flex: 1; min-height: 0; overflow: hidden; }

    /* ── Chat List Panel ── */
    .panel-left {
      width: 320px; flex-shrink: 0; background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .panel-left-head {
      padding: 16px; border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 10px; flex-shrink: 0;
    }
    .panel-left-title {
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
      display: flex; align-items: center; justify-content: space-between;
    }
    .total-badge {
      font-size: 11px; font-weight: 500; color: var(--muted);
      background: var(--surface2); border: 1px solid var(--border);
      padding: 2px 8px; border-radius: 99px;
    }
    .search-wrap { position: relative; }
    .search-wrap svg {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 8px 12px 8px 32px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; font-size: 13px; color: var(--text);
      font-family: inherit; outline: none; transition: border-color .15s;
    }
    .search-input:focus { border-color: var(--accent); background: #fff; }
    .search-input::placeholder { color: var(--muted); }

    .filter-tabs { display: flex; gap: 6px; }
    .ftab {
      padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
      background: var(--surface2); border: 1px solid var(--border);
      cursor: pointer; transition: all .15s; color: var(--muted); font-family: inherit;
    }
    .ftab:hover { border-color: var(--accent); color: var(--text); }
    .ftab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .chat-list { flex: 1; overflow-y: auto; }
    .chat-list::-webkit-scrollbar { width: 4px; }
    .chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .chat-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 16px; cursor: pointer; position: relative;
      border-bottom: 1px solid var(--border); transition: background .1s;
    }
    .chat-item:hover { background: var(--surface2); }
    .chat-item.active { background: rgba(124,58,237,0.08); border-left: 3px solid var(--accent); }
    .trash-btn {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      opacity: 0; transition: opacity .12s; background: none; border: none;
      cursor: pointer; color: var(--muted); padding: 5px; border-radius: 6px;
      display: flex; align-items: center;
    }
    .chat-item:hover .trash-btn { opacity: 1; }
    .trash-btn:hover { color: var(--red); background: rgba(220,38,38,0.09); }

    .avatar {
      width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; font-family: 'Syne', sans-serif;
      position: relative;
    }
    .av-ig { background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); color:#fff; }
    .av-tg { background: #0088cc; color:#fff; }
    .av-wa { background: #25d366; color:#fff; }
    .av-default { background: rgba(124,58,237,0.12); color: var(--accent); }

    .ch-dot {
      position: absolute; bottom: -2px; right: -2px;
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid var(--surface);
      display: flex; align-items: center; justify-content: center; font-size: 8px;
    }
    .dot-ig { background: var(--ig); }
    .dot-tg { background: var(--tg); }
    .dot-wa { background: var(--wa); }

    .chat-info { flex: 1; min-width: 0; }
    .chat-name-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 6px; margin-bottom: 2px;
    }
    .chat-name { font-weight: 600; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chat-time { font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
    .chat-preview { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 5px; }
    .chat-chips { display: flex; align-items: center; gap: 5px; }

    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 500;
    }
    .badge-ig { background: #fce7f3; color: #be185d; }
    .badge-tg { background: #e0f2fe; color: #0369a1; }
    .badge-wa { background: #dcfce7; color: #15803d; }
    .badge-bot { background: #f3f4f6; color: var(--muted); }
    .badge-human { background: #fee2e2; color: var(--red); }
    .badge-unread { background: var(--accent); color: #fff; margin-left: auto; min-width: 18px; text-align: center; }

    /* ── Chat View ── */
    .panel-right {
      flex: 1; display: flex; flex-direction: column;
      background: var(--bg); min-width: 0; overflow: hidden;
    }

    .chat-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px; border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0; gap: 16px;
    }
    .chat-topbar-main { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .chat-topbar-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }
    .chat-topbar-sub { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
    .mode-pill {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
    }
    .mode-pill.bot { background: #f3f4f6; color: var(--muted); }
    .mode-pill.human { background: #fee2e2; color: var(--red); }

    /* ── Messages ── */
    .messages-area {
      flex: 1; overflow-y: auto; padding: 20px 28px;
      display: flex; flex-direction: column; gap: 6px; background: var(--bg);
    }
    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .day-sep {
      text-align: center; font-size: 11px; color: var(--muted);
      margin: 12px 0 8px; position: relative;
    }
    .day-sep span { position: relative; z-index: 1; background: var(--bg); padding: 0 12px; }
    .day-sep::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border); }

    .msg-group { display: flex; flex-direction: column; }
    .msg-group.out { align-items: flex-end; }
    .msg-group.in { align-items: flex-start; }
    .msg-sender {
      font-size: 11px; font-weight: 700; color: var(--muted);
      margin: 0 2px 4px;
      text-transform: uppercase; letter-spacing: .03em;
    }

    .msg {
      max-width: 62%; padding: 10px 14px;
      font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-word;
    }
    .msg.in {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 12px 12px 12px 3px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .msg.out {
      background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #fff;
      border-radius: 12px 12px 3px 12px;
      box-shadow: 0 2px 8px rgba(124,58,237,0.3);
    }
    .msg-time { font-size: 10px; color: var(--muted); margin-top: 3px; padding: 0 2px; }

    /* ── Composer ── */
    .composer {
      border-top: 1px solid var(--border); padding: 14px 24px;
      display: flex; align-items: flex-end; gap: 10px;
      background: var(--surface); flex-shrink: 0;
    }
    .compose-input {
      flex: 1; min-height: 42px; max-height: 140px; resize: none;
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
      font-size: 14px; color: var(--text); font-family: inherit;
      outline: none; line-height: 1.45; transition: border-color .15s;
    }
    .compose-input::placeholder { color: var(--muted); }
    .compose-input:focus { border-color: var(--accent); background: #fff; }
    .btn-send {
      background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #fff;
      border: none; border-radius: 10px; padding: 10px 22px;
      font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
      box-shadow: 0 2px 8px rgba(124,58,237,0.3); transition: all .15s;
      white-space: nowrap; flex-shrink: 0; display: flex; align-items: center; gap: 6px;
    }
    .btn-send:hover:not(:disabled) { box-shadow: 0 4px 16px rgba(124,58,237,0.4); }
    .btn-send:disabled { opacity: .5; cursor: default; }

    /* ── AI Suggestion Panel ── */
    .suggestion-panel {
      border-top: 1px solid var(--border);
      padding: 12px 24px 14px;
      background: linear-gradient(135deg, rgba(124,58,237,0.04) 0%, rgba(219,39,119,0.03) 100%);
      flex-shrink: 0;
    }
    .suggestion-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .suggestion-label {
      font-size: 10px; font-weight: 700; letter-spacing: .07em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      display: flex; align-items: center; gap: 5px;
    }
    .suggestion-label svg { flex-shrink: 0; }
    .sug-generating {
      font-size: 12px; color: var(--muted);
      display: flex; align-items: center; gap: 5px;
    }
    .sug-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); animation: sugPulse 1s infinite;
    }
    @keyframes sugPulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .suggestion-text {
      font-size: 14px; color: var(--text); line-height: 1.5;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 8px; padding: 10px 13px; margin-bottom: 10px;
      white-space: pre-wrap; word-break: break-word;
      min-height: 38px; outline: none; transition: border-color .15s;
    }
    .suggestion-text:focus,
    .suggestion-text[contenteditable="true"]:focus { border-color: var(--accent); background: #fff; }

    .suggestion-actions { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .sug-btn {
      padding: 6px 13px; border-radius: 8px; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all .15s;
      border: 1px solid var(--border); background: var(--surface2); color: var(--text);
      display: inline-flex; align-items: center; gap: 5px;
    }
    .sug-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(124,58,237,0.06); }
    .sug-btn:disabled { opacity: .45; cursor: default; pointer-events: none; }
    .sug-btn-send {
      background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #fff;
      border-color: transparent;
      box-shadow: 0 2px 8px rgba(124,58,237,0.28);
    }
    .sug-btn-send:hover { box-shadow: 0 4px 14px rgba(124,58,237,0.38); color: #fff; background: linear-gradient(135deg,#6d28d9,#5b21b6); border-color: transparent; }
    .sug-btn-edit.is-editing { border-color: var(--accent); color: var(--accent); background: rgba(124,58,237,0.08); }
    .sug-btn-dismiss { margin-left: auto; color: var(--muted); }
    .sug-btn-dismiss:hover { border-color: var(--red); color: var(--red); background: rgba(220,38,38,0.06); }

    /* ── Empty states ── */
    .empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; flex: 1; gap: 10px;
      color: var(--muted); font-size: 14px; text-align: center;
    }
    .empty-icon { font-size: 44px; opacity: .3; }
    .empty h3 { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); opacity: .5; }
  </style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">BotMatic</div>
    <a href="/admin/clients" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Workspaces
    </a>
    <a href="/dashboard" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="/inbox" class="nav-item active">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Inbox
      <span class="nav-badge" id="sideUnread" style="display:none">0</span>
    </a>
    <a href="/bots" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>
      Bots
    </a>
    <div class="nav-sep"></div>
    <a href="/auth/connect" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v2"/><path d="M8 20H6a2 2 0 0 1-2-2v-2"/><path d="M20 16v2a2 2 0 0 1-2 2h-2"/><path d="M4 8V6a2 2 0 0 1 2-2h2"/><circle cx="12" cy="12" r="3"/></svg>
      Channels
    </a>
    <a href="/analytics" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Analytics
    </a>
  </nav>

  <!-- Main -->
  <div class="main">
    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="online-dot"></div>
        <h1>Inbox</h1>
      </div>
      <div class="topbar-right">
        <div class="bot-pill" id="botPill">Loading…</div>
        <form action="/api/auth/logout" method="post">
          <button class="btn-logout">Logout</button>
        </form>
      </div>
    </div>

    <!-- Shell -->
    <div class="shell">

      <!-- Left: Chat List -->
      <div class="panel-left">
        <div class="panel-left-head">
          <div class="panel-left-title">
            Conversations
            <span class="total-badge" id="totalBadge">0</span>
          </div>
          <div class="search-wrap">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input id="searchInput" class="search-input" type="search" placeholder="Search by name or ID…" />
          </div>
          <div class="filter-tabs">
            <button class="ftab active" data-f="all">All</button>
            <button class="ftab" data-f="open">Open</button>
            <button class="ftab" data-f="bot">Bot</button>
            <button class="ftab" data-f="human">Human</button>
          </div>
        </div>
        <div id="chatList" class="chat-list">
          <div class="empty" style="padding:40px 0;">
            <div class="empty-icon">💬</div>
            <div>Loading…</div>
          </div>
        </div>
      </div>

      <!-- Right: Chat View -->
      <div class="panel-right">
        <div id="chatTopbar" class="chat-topbar">
          <div class="empty" style="flex-direction:row;gap:8px;flex:1;justify-content:flex-start;padding:0;">
            <span style="font-size:22px;opacity:.3;">←</span>
            <span style="color:var(--muted);font-size:14px;">Select a conversation</span>
          </div>
        </div>
        <div id="messagesArea" class="messages-area">
          <div class="empty">
            <div class="empty-icon">✉️</div>
            <h3>No conversation selected</h3>
            <div>Pick one from the left</div>
          </div>
        </div>
        <!-- AI Suggestion Panel -->
        <div id="suggestionPanel" class="suggestion-panel" style="display:none;">
          <div class="suggestion-header">
            <span class="suggestion-label">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" style="-webkit-text-fill-color:unset;background:none;"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6L12 2z"/></svg>
              AI Suggestion
            </span>
            <span id="sugGenerating" class="sug-generating" style="display:none;">
              <span class="sug-dot"></span> Generating…
            </span>
          </div>
          <div id="sugText" class="suggestion-text" contenteditable="false"></div>
          <div class="suggestion-actions">
            <button class="sug-btn sug-btn-send" id="sugSendBtn" onclick="sendSuggestion()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              Use reply
            </button>
            <button class="sug-btn sug-btn-edit" id="sugEditBtn" onclick="toggleSugEdit()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Edit
            </button>
            <button class="sug-btn sug-btn-regen" id="sugRegenBtn" onclick="regenerateSuggestion()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.6"/></svg>
              Regenerate
            </button>
            <button class="sug-btn sug-btn-dismiss" onclick="dismissSuggestion()">Dismiss</button>
          </div>
        </div>

        <div class="composer">
          <textarea id="composeInput" class="compose-input" placeholder="Type your reply… (Enter to send)" rows="1"></textarea>
          <button id="sendBtn" class="btn-send">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Send
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const API = '/api/admin';
const pageParams = new URLSearchParams(location.search);
const scopedBotId = pageParams.get('botId') || '';
const S = { chats: [], filtered: [], active: null, filter: 'all', q: '' };

// ── AI Suggestion state ───────────────────────────────────────────────────────
let _sug = null;           // current suggestion object
let _sugEditing = false;   // edit mode flag

const sugPanel    = () => document.getElementById('suggestionPanel');
const sugTextEl   = () => document.getElementById('sugText');
const sugGenEl    = () => document.getElementById('sugGenerating');
const sugEditBtn  = () => document.getElementById('sugEditBtn');
const sugSendBtn  = () => document.getElementById('sugSendBtn');
const sugRegenBtn = () => document.getElementById('sugRegenBtn');

function _showSuggestion(sug) {
  _sug = sug;
  _sugEditing = false;
  const el = sugTextEl();
  el.contentEditable = 'false';
  el.textContent = sug.suggestion_text || '';
  sugEditBtn().classList.remove('is-editing');
  sugGenEl().style.display = 'none';
  sugPanel().style.display = '';
}

function _hideSuggestion() {
  sugPanel().style.display = 'none';
  _sug = null;
  _sugEditing = false;
}

function _setRegenLoading(on) {
  sugGenEl().style.display = on ? '' : 'none';
  if (on) { sugTextEl().textContent = ''; }
  [sugSendBtn(), sugEditBtn(), sugRegenBtn()].forEach(b => { if (b) b.disabled = on; });
}

async function loadSuggestion(chatId) {
  try {
    const d = await fetch(`${API}/chats/${chatId}/suggestion`).then(r => r.json());
    if (d.suggestion) {
      _showSuggestion(d.suggestion);
    } else {
      _hideSuggestion();
    }
  } catch (_) {
    _hideSuggestion();
  }
}

function sendSuggestion() {
  if (!_sug) return;
  const text = (sugTextEl().textContent || '').trim();
  if (!text) return;
  // Put text into the compose box and send
  composeEl.value = text;
  composeEl.style.height = 'auto';
  composeEl.style.height = Math.min(composeEl.scrollHeight, 140) + 'px';
  _hideSuggestion();
  sendMessage();
}

function toggleSugEdit() {
  _sugEditing = !_sugEditing;
  const el = sugTextEl();
  el.contentEditable = _sugEditing ? 'true' : 'false';
  sugEditBtn().classList.toggle('is-editing', _sugEditing);
  if (_sugEditing) {
    el.focus();
    // Move cursor to end
    const range = document.createRange();
    range.selectNodeContents(el);
    range.collapse(false);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }
}

async function regenerateSuggestion() {
  if (!S.active) return;
  _setRegenLoading(true);
  sugPanel().style.display = '';
  try {
    const d = await fetch(`${API}/chats/${S.active.id}/suggestion/regenerate`, {
      method: 'POST',
    }).then(r => r.json());
    if (d.suggestion) {
      _showSuggestion(d.suggestion);
    } else {
      _hideSuggestion();
    }
  } catch (_) {
    _hideSuggestion();
  } finally {
    _setRegenLoading(false);
  }
}

async function dismissSuggestion() {
  if (!S.active) return _hideSuggestion();
  _hideSuggestion();
  try {
    await fetch(`${API}/chats/${S.active.id}/suggestion/discard`, { method: 'POST' });
  } catch (_) {}
}

const $ = id => document.getElementById(id);
const chatListEl   = $('chatList');
const chatTopbarEl = $('chatTopbar');
const messagesEl   = $('messagesArea');
const composeEl    = $('composeInput');
const sendBtnEl    = $('sendBtn');

function esc(v) {
  return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts); if (isNaN(d)) return '';
  const diff = Date.now() - d;
  if (diff < 60000)    return 'just now';
  if (diff < 3600000)  return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString([], {day:'numeric',month:'short'});
}
function initials(name) {
  const n = String(name||'?');
  return n.match(/^\d+$/) ? '#' : n.charAt(0).toUpperCase();
}
function avClass(ch) {
  return ch==='instagram'?'av-ig':ch==='telegram'?'av-tg':ch==='whatsapp'?'av-wa':'av-default';
}
function chIcon(ch) {
  return ch==='instagram'?'📷':ch==='telegram'?'✈️':ch==='whatsapp'?'💬':'💬';
}
function chDot(ch) {
  const cls = ch==='instagram'?'dot-ig':ch==='telegram'?'dot-tg':ch==='whatsapp'?'dot-wa':'';
  return cls ? `<div class="ch-dot ${cls}">${chIcon(ch)}</div>` : '';
}
function chBadge(ch) {
  const cls = ch==='instagram'?'badge-ig':ch==='telegram'?'badge-tg':ch==='whatsapp'?'badge-wa':'';
  return `badge ${cls}`;
}
function displayCustomer(chat) {
  return chat.sender_name || chat.sender_id || 'Unknown';
}
function prettifyRouteValue(value) {
  const raw = String(value || '').trim();
  if (!raw) return '';
  return raw
    .replace(/^Imported\s*·\s*/i, '')
    .replace(/^client-wa-/i, 'WhatsApp ')
    .replace(/^bot-wa-/i, 'WhatsApp ')
    .replace(/[-_]+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}
function displayBotRoute(chat) {
  const route = prettifyRouteValue(chat.company || chat.client_id || '');
  if (!route) return 'Bot route unavailable';
  return chat.channel === 'whatsapp'
    ? `Bot number: ${route}`
    : chat.channel === 'instagram'
      ? `Instagram account: ${route}`
      : chat.channel === 'telegram'
        ? `Telegram bot: ${route}`
        : `Bot account: ${route}`;
}
function displayPreview(chat) {
  return chat.last_message_text || '—';
}
function displayChannelRoute(chat) {
  const route = prettifyRouteValue(chat.company || chat.client_id || '');
  if (chat.channel === 'whatsapp') return route || 'Unknown bot number';
  if (chat.channel === 'instagram') return route || 'Unknown Instagram account';
  if (chat.channel === 'telegram') return route || 'Unknown Telegram bot';
  return route || 'Unknown route';
}

function applyFilters() {
  const q = S.q.toLowerCase().trim();
  S.filtered = S.chats.filter(c => {
    if (S.filter==='open'  && c.status!=='open')  return false;
    if (S.filter==='bot'   && c.mode!=='bot')      return false;
    if (S.filter==='human' && c.mode!=='human')    return false;
    if (!q) return true;
    return `${c.sender_name||''} ${c.sender_id||''} ${c.company||''}`.toLowerCase().includes(q);
  });
}

function renderList() {
  applyFilters();
  $('totalBadge').textContent = S.chats.length;

  const unread = S.chats.reduce((a,c)=>a+(c.unread_count||0), 0);
  const su = $('sideUnread');
  su.style.display = unread > 0 ? '' : 'none';
  su.textContent = unread;
  document.title = unread > 0 ? `(${unread}) BotMatic — Inbox` : 'BotMatic — Inbox';

  if (!S.filtered.length) {
    chatListEl.innerHTML = `<div class="empty" style="padding:40px 0;"><div class="empty-icon">🔍</div><div>No chats found</div></div>`;
    return;
  }
  chatListEl.innerHTML = S.filtered.map(c => {
    const active = S.active?.id === c.id ? ' active' : '';
    return `
      <div class="chat-item${active}" data-id="${c.id}">
        <div class="avatar ${avClass(c.channel)}">
          ${initials(c.sender_name||c.sender_id)}
          ${chDot(c.channel)}
        </div>
        <div class="chat-info">
          <div class="chat-name-row">
            <div class="chat-name">${esc(displayCustomer(c))}</div>
            <div class="chat-time">${fmtTime(c.last_message_at)}</div>
          </div>
          <div class="chat-preview">${esc(displayPreview(c))}</div>
          <div class="chat-chips">
            <span class="badge ${c.mode==='human'?'badge-human':'badge-bot'}">${c.mode==='human'?'👤':'🤖'} ${c.mode||'bot'}</span>
            ${c.unread_count>0?`<span class="badge badge-unread">${c.unread_count}</span>`:''}
          </div>
        </div>
        <button class="trash-btn" title="Delete chat" onclick="deleteChat('${c.id}',event)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>`;
  }).join('');

  chatListEl.querySelectorAll('.chat-item').forEach(el =>
    el.addEventListener('click', () => openChat(el.dataset.id))
  );
}

async function loadChats() {
  try {
    const query = scopedBotId ? `?botId=${encodeURIComponent(scopedBotId)}` : '';
    const d = await fetch(`${API}/chats${query}`).then(r=>r.json());
    S.chats = Array.isArray(d.chats) ? d.chats : [];
    renderList();
    if (S.active) {
      const r = S.chats.find(x=>x.id===S.active.id);
      if (r) S.active = r;
    }
  } catch(e) {}
}

function renderMessages(msgs) {
  if (!msgs.length) {
    messagesEl.innerHTML = `<div class="empty"><div class="empty-icon">💬</div><div>No messages yet</div></div>`;
    return;
  }
  const activeChat = S.active || {};
  let html = '';
  msgs.forEach((m, i) => {
    const prev = msgs[i-1];
    if (!prev || new Date(m.created_at).toDateString() !== new Date(prev.created_at).toDateString()) {
      const lbl = new Date(m.created_at).toLocaleDateString([], {weekday:'long',day:'numeric',month:'long'});
      html += `<div class="day-sep"><span>${lbl}</span></div>`;
    }
    const dir = m.direction==='out' ? 'out' : 'in';
    const senderLabel = dir === 'out'
      ? `Bot · ${displayChannelRoute(activeChat)}`
      : `Customer · ${displayCustomer(activeChat)}`;
    html += `
      <div class="msg-group ${dir}">
        <div class="msg-sender">${esc(senderLabel)}</div>
        <div class="msg ${dir}">${esc(m.text||'')}</div>
        <div class="msg-time">${fmtTime(m.created_at)}</div>
      </div>`;
  });
  messagesEl.innerHTML = html;
}

async function openChat(chatId) {
  const chat = S.chats.find(x=>x.id===chatId);
  if (!chat) return;
  S.active = chat;
  _hideSuggestion(); // clear previous chat's suggestion
  renderList();

  chatTopbarEl.innerHTML = `
    <div class="chat-topbar-main">
      <div class="chat-topbar-name">${esc(displayCustomer(chat))}</div>
      <div class="chat-topbar-sub">${chIcon(chat.channel)} ${esc(chat.channel)}</div>
    </div>`;
  messagesEl.innerHTML = `<div class="empty"><div class="empty-icon" style="font-size:28px;opacity:.2;">⏳</div></div>`;

  try {
    const d = await fetch(`${API}/chats/${chat.id}/messages?limit=300`).then(r=>r.json());
    const msgs = Array.isArray(d.messages) ? d.messages : [];
    const mode = d.chat?.mode || chat.mode || 'bot';
    const route = displayChannelRoute(chat);

    chatTopbarEl.innerHTML = `
      <div class="chat-topbar-main">
        <div class="chat-topbar-name">${esc(displayCustomer(chat))}</div>
        <div class="chat-topbar-sub">
          ${chIcon(chat.channel)} ${esc(chat.channel)}
          ${route ? `· ${esc(route)}` : ''}
          · <span class="mode-pill ${mode}">${mode==='human'?'👤 Human':'🤖 Bot'}</span>
        </div>
      </div>`;

    renderMessages(msgs);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    // Load AI suggestion for this chat
    loadSuggestion(chat.id);
  } catch(e) {}
}

async function sendMessage() {
  if (!S.active) return;
  const text = composeEl.value.trim();
  if (!text) return;
  sendBtnEl.disabled = true;
  sendBtnEl.innerHTML = 'Sending…';
  try {
    const r = await fetch(`${API}/send-message`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ chat_id: S.active.id, text })
    });
    const data = await r.json();
    if (!r.ok || !data.ok) throw new Error(data.error||'Send failed');
    composeEl.value = '';
    composeEl.style.height = 'auto';
    await loadChats();
    await openChat(S.active.id);
  } catch(e) {
    alert(e.message||'Send failed');
  } finally {
    sendBtnEl.disabled = false;
    sendBtnEl.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Send';
  }
}

sendBtnEl.addEventListener('click', sendMessage);
composeEl.addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
composeEl.addEventListener('input', () => {
  composeEl.style.height = 'auto';
  composeEl.style.height = Math.min(composeEl.scrollHeight, 140) + 'px';
});
document.querySelectorAll('.ftab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ftab').forEach(x=>x.classList.remove('active'));
    btn.classList.add('active');
    S.filter = btn.dataset.f;
    renderList();
  });
});
$('searchInput').addEventListener('input', e => { S.q = e.target.value; renderList(); });

async function deleteChat(chatId, event) {
  event.stopPropagation();
  if (!confirm('Delete this conversation and all its messages?')) return;
  try {
    const r = await fetch(`${API}/chats/${chatId}`, { method: 'DELETE' });
    if (!r.ok) throw new Error('Delete failed');
    if (S.active?.id === chatId) {
      S.active = null;
      _hideSuggestion();
      chatTopbarEl.innerHTML = `
        <div class="empty" style="flex-direction:row;gap:8px;flex:1;justify-content:flex-start;padding:0;">
          <span style="font-size:22px;opacity:.3;">←</span>
          <span style="color:var(--muted);font-size:14px;">Select a conversation</span>
        </div>`;
      messagesEl.innerHTML = `<div class="empty"><div class="empty-icon">✉️</div><h3>No conversation selected</h3><div>Pick one from the left</div></div>`;
    }
    S.chats = S.chats.filter(c => c.id !== chatId);
    renderList();
  } catch(e) { alert('Could not delete chat'); }
}

async function init() {
  try {
    const query = scopedBotId ? `?botId=${encodeURIComponent(scopedBotId)}` : '';
    const d = await fetch(`/auth/api/bots${query}`).then(r=>r.json());
    const active = (d.bots||[]).find(b=>b.id === (scopedBotId || d.activeBotId)) || (d.bots||[]).find(b=>b.id===d.activeBotId);
    $('botPill').textContent = active ? active.name : 'BotMatic';
  } catch(e) { $('botPill').textContent = 'BotMatic'; }

  await loadChats();

  setInterval(async () => {
    const prevId = S.active?.id || null;
    await loadChats();
    if (prevId && S.active?.id === prevId) {
      try {
        const d = await fetch(`${API}/chats/${prevId}/messages?limit=300`).then(r=>r.json());
        const msgs = Array.isArray(d.messages) ? d.messages : [];
        if (!msgs.length) return;
        const atBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 60;
        renderMessages(msgs);
        if (atBottom) messagesEl.scrollTop = messagesEl.scrollHeight;
        // Refresh suggestion if none is currently showing
        if (!_sug) loadSuggestion(prevId);
      } catch(e) {}
    }
  }, 4000);
}

init();
</script>
</body>
</html>
