</head>
<body>
  <!-- body content omitted for brevity -->
  
  <script>
// Robust, idempotent init — safe on re-exec and avoids duplicate variables
(() => {
  if (window.__botmaticInit_v2) return; // prevent duplicate runs
  window.__botmaticInit_v2 = true;

  const I18N = {
    en:{nav_solutions:'Solutions',nav_platforms:'Platforms',nav_cases:'Cases',nav_pricing:'Pricing',nav_resources:'Resources',nav_about:'About',cta_demo:'Get a Demo',cta_pricing:'See Pricing',hero_title:'Custom chatbots for WhatsApp, Telegram, Websites & Instagram — built in 7–14 days',hero_sub:'We build bots that capture leads, qualify them and auto‑book. Simple setup, rapid turnaround, ongoing support.',badge_speed:'7–14 days delivery',badge_flows:'Fully custom flows',badge_integrations:'CRM & payments',how_kicker:'How it works',how_title:'From brief to leads in 3 steps',how_1_t:'1) Quick brief',how_1_d:'Tell us your goals, channels and CRM. 10–15 minutes.',how_2_t:'2) Build & connect',how_2_d:'We design flows, add AI, integrate payments and your CRM.',how_3_t:'3) Go live',how_3_d:'Launch in 7–14 days and start getting qualified leads.'},
    nl:{nav_solutions:'Oplossingen',nav_platforms:'Platforms',nav_cases:'Cases',nav_pricing:'Prijzen',nav_resources:'Resources',nav_about:'Over',cta_demo:'Vraag een demo',cta_pricing:'Bekijk prijzen',hero_title:'Maatwerk chatbots voor WhatsApp, Telegram, Websites & Instagram — klaar in 7–14 dagen',hero_sub:'Wij bouwen bots die leads vangen, kwalificeren en automatisch boeken.',badge_speed:'Levering in 7–14 dagen',badge_flows:'Volledig maatwerk',badge_integrations:'CRM & betalingen',how_kicker:'Zo werkt het',how_title:'Van briefing naar leads in 3 stappen',how_1_t:'1) Korte briefing',how_1_d:'Doelen, kanalen en CRM. 10–15 minuten.',how_2_t:'2) Bouwen & koppelen',how_2_d:'Flows, AI, betalingen en CRM‑integratie.',how_3_t:'3) Live',how_3_d:'Start in 7–14 dagen en ontvang gekwalificeerde leads.'},
    fr:{nav_solutions:'Solutions',nav_platforms:'Plateformes',nav_cases:'Cas',nav_pricing:'Tarifs',nav_resources:'Ressources',nav_about:'À propos',cta_demo:'Demander une démo',cta_pricing:'Voir les tarifs',hero_title:'Chatbots sur mesure pour WhatsApp, Telegram, Sites & Instagram — en 7–14 jours',hero_sub:'Nous créons des bots qui captent, qualifient et réservent automatiquement.',badge_speed:'Livraison 7–14 jours',badge_flows:'Parcours personnalisés',badge_integrations:'CRM & paiements',how_kicker:'Comment ça marche',how_title:'De la brief aux leads en 3 étapes',how_1_t:'1) Brief rapide',how_1_d:'Objectifs, canaux, CRM. 10–15 minutes.',how_2_t:'2) Construire & connecter',how_2_d:'Flows, IA, paiements et intégration CRM.',how_3_t:'3) Mise en ligne',how_3_d:'Lancement en 7–14 jours et leads qualifiés.'},
    ru:{nav_solutions:'Решения',nav_platforms:'Платформы',nav_cases:'Кейсы',nav_pricing:'Цены',nav_resources:'Ресурсы',nav_about:'О нас',cta_demo:'Получить демо',cta_pricing:'Смотреть цены',hero_title:'Кастомные чат‑боты для WhatsApp, Telegram, сайтов и Instagram — за 7–14 дней',hero_sub:'Строим ботов, которые собирают лиды, квалифицируют и записывают автоматически.',badge_speed:'Готово за 7–14 дней',badge_flows:'Полностью кастомные флоу',badge_integrations:'CRM и платежи',how_kicker:'Как это работает',how_title:'От брифа к лидам за 3 шага',how_1_t:'1) Короткий бриф',how_1_d:'Цели, каналы и CRM. 10–15 минут.',how_2_t:'2) Сборка и интеграция',how_2_d:'Флоу, AI, платежи и CRM‑интеграция.',how_3_t:'3) Запуск',how_3_d:'Старт за 7–14 дней и поток квалифицированных лидов.'}
  };

  function applyLang(lang){
    const dict = I18N[lang] || I18N.en;
    // Query fresh each time to also update dynamically-added nodes
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (dict[key]) el.textContent = dict[key];
    });
    document.documentElement.lang = lang;
    try{ localStorage.setItem('lang', lang); }catch(_){/* ignore */}
  }

  function initLang(){
    const sel = document.getElementById('lang');
    if (!sel) return;
    if (!sel.dataset.listenerAttached){
      sel.addEventListener('change', () => applyLang(sel.value));
      sel.dataset.listenerAttached = '1';
    }
    const saved = (()=>{try{return localStorage.getItem('lang')}catch(_){return null}})();
    const br = (navigator.language||'en').slice(0,2).toLowerCase();
    const start = (saved && I18N[saved]) ? saved : (I18N[br] ? br : 'en');
    sel.value = start; applyLang(start);
  }

  function initScroll(){
    if (window.__bmScrollInited) return; window.__bmScrollInited = true;
    document.querySelectorAll('a[href^="#"]').forEach(a=>a.addEventListener('click', e=>{
      const id = a.getAttribute('href').slice(1);
      const t = document.getElementById(id) || document.querySelector(`[name="${id}"]`);
      if(t){ e.preventDefault(); t.scrollIntoView({behavior:'smooth', block:'start'}); }
    }));
  }

  if (!window.toggleMenu) window.toggleMenu = function(){ alert('Mobile menu placeholder — we can expand into an overlay.'); };

  const yearEl = document.getElementById('year'); if (yearEl) yearEl.textContent = new Date().getFullYear();

  // Init
  initLang();
  initScroll();

  // Minimal runtime tests
  try {
    const prev = document.documentElement.lang;
    applyLang('en');
    console.assert(document.documentElement.lang === 'en', '[TEST] html lang → en');
    applyLang(prev);
    console.assert(document.documentElement.lang === prev, '[TEST] html lang restored');
  } catch (e) { console.warn('[TEST] failed', e); }
})();
</script>
</body>
</html>
